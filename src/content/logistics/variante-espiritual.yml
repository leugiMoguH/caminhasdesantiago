i18n:
  en:
    metaTitle: "Spiritual Variant (Variante Espiritual) 2026: Boat, Stages & the Compostela"
    metaDescription: "The Spiritual Variant branches off the Portuguese Camino at Pontevedra: three stages via the Armenteira monastery to Vilanova de Arousa, then the Traslatio boat to Padrón. Route, distances, the boat and how it counts for the Compostela."
    h1: "The Spiritual Variant: Pontevedra, the Armenteira monastery and the Traslatio boat"
    lead: "The Variante Espiritual is the most distinctive branch of the Portuguese Camino. It leaves the main route at Pontevedra, climbs to the Armenteira monastery and a riverside path, and ends with the Traslatio — the only officially recognised maritime stage of any Camino, retracing the sea voyage of Saint James's remains to Padrón."
    sections:
      - heading: "Where it branches off — and rejoins"
        body: "The Spiritual Variant leaves the main Portuguese Camino just after Pontevedra and rejoins it near Padrón, so it slots neatly into the Coastal route this guide covers: walk north to Pontevedra, take the variant, then step back onto the main path for the final stretch to Santiago."
      - heading: "The three stages (~74 km: ~46 km on foot, ~28 km by boat)"
        body: "It is usually walked in three days. Day 1, Pontevedra to Armenteira (~21 km), passes the seaside village of Combarro and climbs through vineyards to the Santa María de Armenteira monastery. Day 2, Armenteira to Vilanova de Arousa (~24 km), follows the Ruta da Pedra e da Auga, a beautiful path along the Armenteira river past old watermills, then down to the Arousa estuary. Day 3 is the Traslatio boat from Vilanova de Arousa to Pontecesures, with a short walk into Padrón to rejoin the main Camino."
      - heading: "The Traslatio boat"
        body: "The Traslatio retraces the legendary voyage that carried Saint James's remains up the Ría de Arousa and the River Ulla. It is the only Camino stage officially recognised as a maritime pilgrimage, and the estuary is lined with stone crosses (cruceiros) forming a maritime Via Crucis. The crossing takes roughly one to one and a half hours; the pilgrim boat costs around €30 per person and runs mainly from spring to autumn, so book ahead and check the season."
      - heading: "Does it count for the Compostela?"
        body: "Yes. At the end of the crossing you receive a special Traslatio stamp in your credential, and the Spiritual Variant still qualifies you for the Compostela — provided you have walked at least the last 100 km of the overall route on foot. The boat is a recognised symbolic stage, not a shortcut around the walking requirement, so keep collecting two stamps a day over the final 100 km as usual."
    howTo:
      - name: "Walk to Pontevedra"
        text: "Follow the Coastal (or Central) Camino north to Pontevedra, where the Spiritual Variant begins."
      - name: "Take the variant via Armenteira"
        text: "Walk Pontevedra → Armenteira → Vilanova de Arousa over two days, through Combarro, the Armenteira monastery and the riverside Ruta da Pedra e da Auga."
      - name: "Book the Traslatio boat"
        text: "Reserve the pilgrim boat from Vilanova de Arousa to Pontecesures in advance (around €30, roughly 1–1.5 hours, mainly spring to autumn)."
      - name: "Rejoin the Camino at Padrón"
        text: "From Pontecesures walk into Padrón to rejoin the main route for the final stage to Santiago."
    faq:
      - q: "Where does the Spiritual Variant start and end?"
        a: "It branches off the Portuguese Camino just after Pontevedra and rejoins the main route near Padrón, before the final stretch to Santiago."
      - q: "How long is the Spiritual Variant?"
        a: "About 74 km over three days — roughly 46 km on foot (Pontevedra–Armenteira–Vilanova de Arousa) plus the ~28 km Traslatio boat from Vilanova de Arousa to Pontecesures."
      - q: "Does the Traslatio boat count for the Compostela?"
        a: "Yes. You receive a special Traslatio stamp, and the Spiritual Variant qualifies for the Compostela as long as you have walked at least the last 100 km on foot. Keep two stamps a day over that final stretch."
      - q: "How much is the pilgrim boat and when does it run?"
        a: "The pilgrim boat from Vilanova de Arousa to Pontecesures costs around €30 per person and takes about one to one and a half hours. It runs mainly from spring to autumn, so book ahead and confirm the season."
  es:
    metaTitle: "Variante Espiritual (2026): Barco Traslatio, Etapas y la Compostela"
    metaDescription: "La Variante Espiritual se desvía del Camino Portugués en Pontevedra: tres etapas por el monasterio de Armenteira hasta Vilanova de Arousa y luego el barco de la Traslatio hasta Padrón. Recorrido, distancias, el barco y cómo cuenta para la Compostela."
    h1: "La Variante Espiritual: Pontevedra, el monasterio de Armenteira y el barco de la Traslatio"
    lead: "La Variante Espiritual es el ramal más singular del Camino Portugués. Deja la ruta principal en Pontevedra, sube al monasterio de Armenteira y un sendero junto al río, y termina con la Traslatio — la única etapa marítima reconocida oficialmente de todo el Camino, que rememora el viaje por mar de los restos del Apóstol Santiago hasta Padrón."
    sections:
      - heading: "Dónde se desvía — y dónde se reincorpora"
        body: "La Variante Espiritual deja el Camino Portugués principal justo después de Pontevedra y se reincorpora cerca de Padrón, así que encaja bien en la ruta de la Costa que cubre esta guía: caminas hacia el norte hasta Pontevedra, haces la variante y luego vuelves al camino principal para el tramo final hasta Santiago."
      - heading: "Las tres etapas (~74 km: ~46 km a pie, ~28 km en barco)"
        body: "Suele hacerse en tres días. Día 1, Pontevedra a Armenteira (~21 km), pasa por el pueblo marinero de Combarro y sube entre viñedos hasta el monasterio de Santa María de Armenteira. Día 2, Armenteira a Vilanova de Arousa (~24 km), sigue la Ruta da Pedra e da Auga, un sendero precioso junto al río Armenteira entre antiguos molinos, y baja hasta la ría de Arousa. El Día 3 es el barco de la Traslatio de Vilanova de Arousa a Pontecesures, con una breve caminata hasta Padrón para reincorporarse al Camino principal."
      - heading: "El barco de la Traslatio"
        body: "La Traslatio rememora el viaje legendario que llevó los restos del Apóstol Santiago por la ría de Arousa y el río Ulla. Es la única etapa del Camino reconocida oficialmente como peregrinación marítima, y la ría está jalonada de cruceiros de piedra que forman un Via Crucis marítimo. El cruce dura aproximadamente entre una hora y hora y media; el barco del peregrino cuesta unos 30 € por persona y opera sobre todo de primavera a otoño, así que reserva con antelación y comprueba la temporada."
      - heading: "¿Cuenta para la Compostela?"
        body: "Sí. Al final del cruce recibes un sello especial de la Traslatio en tu credencial, y la Variante Espiritual sigue dando derecho a la Compostela — siempre que hayas caminado al menos los últimos 100 km del recorrido total a pie. El barco es una etapa simbólica reconocida, no un atajo para saltarse el requisito de caminar, así que sigue consiguiendo dos sellos al día en los últimos 100 km como de costumbre."
    howTo:
      - name: "Camina hasta Pontevedra"
        text: "Sigue el Camino de la Costa (o el Central) hacia el norte hasta Pontevedra, donde empieza la Variante Espiritual."
      - name: "Haz la variante por Armenteira"
        text: "Camina Pontevedra → Armenteira → Vilanova de Arousa en dos días, por Combarro, el monasterio de Armenteira y la Ruta da Pedra e da Auga junto al río."
      - name: "Reserva el barco de la Traslatio"
        text: "Reserva con antelación el barco del peregrino de Vilanova de Arousa a Pontecesures (unos 30 €, en torno a 1–1,5 horas, sobre todo de primavera a otoño)."
      - name: "Reincorpórate al Camino en Padrón"
        text: "Desde Pontecesures camina hasta Padrón para reincorporarte a la ruta principal en la etapa final hasta Santiago."
    faq:
      - q: "¿Dónde empieza y termina la Variante Espiritual?"
        a: "Se desvía del Camino Portugués justo después de Pontevedra y se reincorpora a la ruta principal cerca de Padrón, antes del tramo final hasta Santiago."
      - q: "¿Cuánto mide la Variante Espiritual?"
        a: "Unos 74 km en tres días — aproximadamente 46 km a pie (Pontevedra–Armenteira–Vilanova de Arousa) más el barco de la Traslatio de ~28 km de Vilanova de Arousa a Pontecesures."
      - q: "¿Cuenta el barco de la Traslatio para la Compostela?"
        a: "Sí. Recibes un sello especial de la Traslatio, y la Variante Espiritual da derecho a la Compostela siempre que hayas caminado al menos los últimos 100 km a pie. Consigue dos sellos al día en ese tramo final."
      - q: "¿Cuánto cuesta el barco del peregrino y cuándo opera?"
        a: "El barco del peregrino de Vilanova de Arousa a Pontecesures cuesta unos 30 € por persona y dura entre una hora y hora y media. Opera sobre todo de primavera a otoño, así que reserva con antelación y confirma la temporada."
  pt:
    metaTitle: "Variante Espiritual (2026): Barco Traslatio, Etapas e a Compostela"
    metaDescription: "A Variante Espiritual desvia-se do Caminho Português em Pontevedra: três etapas pelo mosteiro de Armenteira até Vilanova de Arousa e depois o barco da Traslatio até Padrón. Percurso, distâncias, o barco e como conta para a Compostela."
    h1: "A Variante Espiritual: Pontevedra, o mosteiro de Armenteira e o barco da Traslatio"
    lead: "A Variante Espiritual é o ramo mais singular do Caminho Português. Deixa a rota principal em Pontevedra, sobe ao mosteiro de Armenteira e a um trilho junto ao rio, e termina com a Traslatio — a única etapa marítima reconhecida oficialmente de todo o Caminho, que recria a viagem por mar dos restos do Apóstolo Santiago até Padrón."
    sections:
      - heading: "Onde se desvia — e onde regressa"
        body: "A Variante Espiritual deixa o Caminho Português principal logo após Pontevedra e regressa perto de Padrón, por isso encaixa bem na rota da Costa que este guia cobre: caminhas para norte até Pontevedra, fazes a variante e voltas ao caminho principal para o troço final até Santiago."
      - heading: "As três etapas (~74 km: ~46 km a pé, ~28 km de barco)"
        body: "Costuma fazer-se em três dias. Dia 1, Pontevedra a Armenteira (~21 km), passa pela aldeia piscatória de Combarro e sobe por vinhas até ao mosteiro de Santa María de Armenteira. Dia 2, Armenteira a Vilanova de Arousa (~24 km), segue a Ruta da Pedra e da Auga, um trilho lindíssimo junto ao rio Armenteira entre antigos moinhos, e desce até à ria de Arousa. O Dia 3 é o barco da Traslatio de Vilanova de Arousa a Pontecesures, com uma curta caminhada até Padrón para regressar ao Caminho principal."
      - heading: "O barco da Traslatio"
        body: "A Traslatio recria a viagem lendária que levou os restos do Apóstolo Santiago pela ria de Arousa e pelo rio Ulla. É a única etapa do Caminho reconhecida oficialmente como peregrinação marítima, e a ria está pontuada por cruzeiros de pedra que formam uma Via Sacra marítima. A travessia dura cerca de uma hora a hora e meia; o barco do peregrino custa cerca de 30 € por pessoa e opera sobretudo da primavera ao outono, por isso reserva com antecedência e confirma a época."
      - heading: "Conta para a Compostela?"
        body: "Sim. No fim da travessia recebes um carimbo especial da Traslatio na credencial, e a Variante Espiritual continua a dar direito à Compostela — desde que tenhas caminhado pelo menos os últimos 100 km do percurso total a pé. O barco é uma etapa simbólica reconhecida, não um atalho para contornar a exigência de caminhar, por isso continua a obter dois carimbos por dia nos últimos 100 km como de costume."
    howTo:
      - name: "Caminha até Pontevedra"
        text: "Segue o Caminho da Costa (ou o Central) para norte até Pontevedra, onde começa a Variante Espiritual."
      - name: "Faz a variante por Armenteira"
        text: "Caminha Pontevedra → Armenteira → Vilanova de Arousa em dois dias, por Combarro, o mosteiro de Armenteira e a Ruta da Pedra e da Auga junto ao rio."
      - name: "Reserva o barco da Traslatio"
        text: "Reserva com antecedência o barco do peregrino de Vilanova de Arousa a Pontecesures (cerca de 30 €, à volta de 1–1,5 horas, sobretudo da primavera ao outono)."
      - name: "Regressa ao Caminho em Padrón"
        text: "De Pontecesures caminha até Padrón para regressar à rota principal na etapa final até Santiago."
    faq:
      - q: "Onde começa e termina a Variante Espiritual?"
        a: "Desvia-se do Caminho Português logo após Pontevedra e regressa à rota principal perto de Padrón, antes do troço final até Santiago."
      - q: "Qual é a distância da Variante Espiritual?"
        a: "Cerca de 74 km em três dias — aproximadamente 46 km a pé (Pontevedra–Armenteira–Vilanova de Arousa) mais o barco da Traslatio de ~28 km de Vilanova de Arousa a Pontecesures."
      - q: "O barco da Traslatio conta para a Compostela?"
        a: "Sim. Recebes um carimbo especial da Traslatio, e a Variante Espiritual dá direito à Compostela desde que tenhas caminhado pelo menos os últimos 100 km a pé. Obtém dois carimbos por dia nesse troço final."
      - q: "Quanto custa o barco do peregrino e quando opera?"
        a: "O barco do peregrino de Vilanova de Arousa a Pontecesures custa cerca de 30 € por pessoa e dura entre uma hora e hora e meia. Opera sobretudo da primavera ao outono, por isso reserva com antecedência e confirma a época."
