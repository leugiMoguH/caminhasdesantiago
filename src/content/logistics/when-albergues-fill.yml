i18n:
  en:
    metaTitle: "What Time Do Albergues Fill Up on the Camino Portugués? (2026)"
    metaDescription: "What time do albergues fill up on the Camino Portugués? The real check-in and sell-out times by season and town size, the hour to aim for, and how to never arrive too late. Practical 2026 timings."
    h1: "What time do albergues fill up on the Camino Portugués?"
    lead: "Knowing the clock is half the battle. Municipal albergues open early afternoon and fill in arrival order, so the question is simple: what time is too late? Here are the real timings by season and town size."
    sections:
      - heading: "Check-in opens around 13:00–14:00"
        body: "Most municipal and Xunta albergues open for check-in between 13:00 and 14:00. Pilgrims who finish a stage in the morning often queue or leave a pack in line before opening. Private albergues usually check in a little earlier or hold your booked bed regardless of arrival time."
      - heading: "The sell-out window by season"
        body: "In low season (roughly November–March) beds rarely fill at all — you can arrive late afternoon and still find space. In shoulder season (April–June, September–October) popular municipal albergues can fill between 16:00 and 18:00 on busy days. In peak summer (July–August) and on any weekend, the small and mid-size municipal albergues can be full by 14:00–15:00, right as they open."
      - heading: "Town size changes everything"
        body: "Small coastal villages (Oia, Baiona) have only a handful of beds and can sell out earliest — sometimes the moment check-in opens in summer. Big-city public albergues (Vigo's 90-plus beds, Pontevedra, Padrón) absorb far more pilgrims and fill later, if at all. The last 100 km into Santiago runs busy in every season regardless of town size."
      - heading: "The hour to aim for"
        body: "Aim to arrive by 14:00 in summer and on weekends, by 16:00 in shoulder season, and any reasonable hour in winter. Start at first light, keep stages sensible, and you stay ahead of the rush. If you cannot arrive early — you walk slowly, finish late, or it is a tight town — book a private bed the night before and walk without the clock pressure."
    faq:
      - q: "What time do albergues fill up on the Camino Portugués?"
        a: "In peak summer and on weekends, small and mid-size municipal albergues can be full by 14:00–15:00 as they open. In shoulder season they tend to fill between 16:00 and 18:00 on busy days. In winter they rarely fill at all. Small coastal villages sell out earliest; big-city public albergues fill latest."
      - q: "What time should I arrive at an albergue?"
        a: "Aim for before 14:00 in summer and on weekends, before 16:00 in spring and autumn, and any reasonable hour in winter. Starting at first light and keeping stages sensible keeps you ahead of the afternoon rush."
      - q: "When do albergues open for check-in?"
        a: "Most municipal and Xunta albergues open for check-in between 13:00 and 14:00. Private albergues often check in a little earlier and hold reserved beds regardless of your arrival time."
  es:
    metaTitle: "¿A qué hora se llenan los albergues en el Camino Portugués? (2026)"
    metaDescription: "¿A qué hora se llenan los albergues en el Camino Portugués? Las horas reales de registro y de llenado por temporada y tamaño de pueblo, la hora a la que apuntar y cómo no llegar tarde. Tiempos prácticos 2026."
    h1: "¿A qué hora se llenan los albergues en el Camino Portugués?"
    lead: "Conocer el reloj es media batalla. Los albergues municipales abren a primera hora de la tarde y se llenan por orden de llegada, así que la pregunta es simple: ¿qué hora es demasiado tarde? Estos son los tiempos reales por temporada y tamaño de pueblo."
    sections:
      - heading: "El registro abre hacia las 13:00–14:00"
        body: "La mayoría de albergues municipales y de la Xunta abren para registro entre las 13:00 y las 14:00. Los peregrinos que terminan etapa por la mañana suelen hacer cola o dejar la mochila en fila antes de la apertura. Los albergues privados suelen registrar un poco antes o te guardan la cama reservada sin importar la hora de llegada."
      - heading: "La franja de llenado por temporada"
        body: "En temporada baja (más o menos noviembre–marzo) las camas casi no se llenan — puedes llegar a media tarde y aún encontrar sitio. En temporada media (abril–junio, septiembre–octubre) los albergues municipales populares pueden llenarse entre las 16:00 y las 18:00 en días concurridos. En pleno verano (julio–agosto) y en cualquier fin de semana, los albergues municipales pequeños y medianos pueden estar llenos a las 14:00–15:00, justo al abrir."
      - heading: "El tamaño del pueblo lo cambia todo"
        body: "Los pueblos costeros pequeños (Oia, Baiona) tienen pocas camas y pueden agotarse antes — a veces en el momento en que abre el registro en verano. Los albergues públicos de ciudad (las más de 90 plazas de Vigo, Pontevedra, Padrón) absorben muchos más peregrinos y se llenan más tarde, si es que se llenan. Los últimos 100 km hasta Santiago van concurridos en cualquier temporada, sea cual sea el tamaño del pueblo."
      - heading: "La hora a la que apuntar"
        body: "Intenta llegar antes de las 14:00 en verano y fines de semana, antes de las 16:00 en temporada media y a cualquier hora razonable en invierno. Sal al amanecer, mantén etapas sensatas y te adelantarás a la avalancha. Si no puedes llegar temprano —caminas despacio, terminas tarde o es un pueblo difícil—, reserva una cama privada la noche anterior y camina sin la presión del reloj."
    faq:
      - q: "¿A qué hora se llenan los albergues en el Camino Portugués?"
        a: "En pleno verano y fines de semana, los albergues municipales pequeños y medianos pueden estar llenos a las 14:00–15:00 al abrir. En temporada media suelen llenarse entre las 16:00 y las 18:00 en días concurridos. En invierno casi no se llenan. Los pueblos costeros pequeños se agotan antes; los albergues públicos de ciudad, más tarde."
      - q: "¿A qué hora debería llegar al albergue?"
        a: "Apunta a antes de las 14:00 en verano y fines de semana, antes de las 16:00 en primavera y otoño y a cualquier hora razonable en invierno. Salir al amanecer y mantener etapas sensatas te adelanta a la avalancha de la tarde."
      - q: "¿A qué hora abren los albergues para registro?"
        a: "La mayoría de albergues municipales y de la Xunta abren para registro entre las 13:00 y las 14:00. Los privados suelen registrar un poco antes y guardan las camas reservadas sin importar tu hora de llegada."
  pt:
    metaTitle: "A que horas enchem os albergues no Caminho Português? (2026)"
    metaDescription: "A que horas enchem os albergues no Caminho Português? As horas reais de registo e de esgotamento por época e tamanho da vila, a hora a que apontar e como nunca chegar tarde. Tempos práticos 2026."
    h1: "A que horas enchem os albergues no Caminho Português?"
    lead: "Conhecer o relógio é meia batalha. Os albergues municipais abrem ao início da tarde e enchem por ordem de chegada, por isso a pergunta é simples: que hora é tarde demais? Eis os tempos reais por época e tamanho da vila."
    sections:
      - heading: "O registo abre por volta das 13:00–14:00"
        body: "A maioria dos albergues municipais e da Xunta abre para registo entre as 13:00 e as 14:00. Os peregrinos que terminam a etapa de manhã costumam fazer fila ou deixar a mochila na fila antes da abertura. Os albergues privados costumam registar um pouco mais cedo ou guardam a cama reservada independentemente da hora de chegada."
      - heading: "A faixa de esgotamento por época"
        body: "Na época baixa (mais ou menos novembro–março) as camas quase não enchem — podes chegar a meio da tarde e ainda encontrar lugar. Na época intermédia (abril–junho, setembro–outubro) os albergues municipais populares podem encher entre as 16:00 e as 18:00 em dias movimentados. Em pleno verão (julho–agosto) e em qualquer fim de semana, os albergues municipais pequenos e médios podem estar cheios às 14:00–15:00, mesmo ao abrir."
      - heading: "O tamanho da vila muda tudo"
        body: "As pequenas vilas costeiras (Oia, Baiona) têm poucas camas e podem esgotar mais cedo — às vezes no momento em que o registo abre no verão. Os albergues públicos de cidade (as mais de 90 camas de Vigo, Pontevedra, Padrón) absorvem muito mais peregrinos e enchem mais tarde, se é que enchem. Os últimos 100 km até Santiago são movimentados em qualquer época, seja qual for o tamanho da vila."
      - heading: "A hora a que apontar"
        body: "Tenta chegar antes das 14:00 no verão e fins de semana, antes das 16:00 na época intermédia e a qualquer hora razoável no inverno. Sai ao nascer do dia, mantém etapas sensatas e ficas à frente da enxurrada. Se não conseguires chegar cedo —caminhas devagar, terminas tarde ou é uma vila apertada—, reserva uma cama privada na noite anterior e caminha sem a pressão do relógio."
    faq:
      - q: "A que horas enchem os albergues no Caminho Português?"
        a: "Em pleno verão e fins de semana, os albergues municipais pequenos e médios podem estar cheios às 14:00–15:00 ao abrir. Na época intermédia costumam encher entre as 16:00 e as 18:00 em dias movimentados. No inverno quase não enchem. As pequenas vilas costeiras esgotam mais cedo; os albergues públicos de cidade, mais tarde."
      - q: "A que horas devo chegar ao albergue?"
        a: "Aponta para antes das 14:00 no verão e fins de semana, antes das 16:00 na primavera e outono e a qualquer hora razoável no inverno. Sair ao nascer do dia e manter etapas sensatas coloca-te à frente da enxurrada da tarde."
      - q: "A que horas abrem os albergues para registo?"
        a: "A maioria dos albergues municipais e da Xunta abre para registo entre as 13:00 e as 14:00. Os privados costumam registar um pouco mais cedo e guardam as camas reservadas independentemente da tua hora de chegada."
