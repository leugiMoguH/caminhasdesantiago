i18n:
  en:
    metaTitle: "Are Municipal Albergues Reliable on the Camino Portugués? (2026)"
    metaDescription: "Can you trust municipal albergues on the Camino Portugués? What they're really like — price, beds, the first-come catch — and exactly when to rely on them and when to back them up. Honest 2026 guide."
    h1: "Are municipal albergues reliable on the Camino Portugués?"
    lead: "Municipal albergues are the cheapest, most authentic beds on the Camino — and the source of most pilgrim anxiety, because you cannot book them. So can you actually rely on them? Mostly yes, with one habit and one backup."
    sections:
      - heading: "What a municipal albergue actually is"
        body: "Municipal (and Xunta de Galicia) albergues are public pilgrim hostels run by the town or regional government. On the Camino Portugués they cost about €8–10 a night, have dormitory bunks, basic kitchens or microwaves, hot showers and laundry, and are open to anyone with a pilgrim credential. They are clean, safe and staffed by hospitaleros — not a gamble on quality. The catch is purely about availability."
      - heading: "The one real limitation: first-come, no booking"
        body: "You cannot reserve a municipal bed. They open for check-in around 13:00–14:00 and fill in order of arrival. In quiet seasons this is a non-issue. In peak summer, on weekends, or in towns with few beds, they can be full by mid-afternoon — so a late-arriving pilgrim who counted on the municipal can be left searching. Reliability is entirely about when and how early you arrive, not about the albergues themselves."
      - heading: "When you can rely on them"
        body: "From roughly October to May, on weekdays, and in the bigger towns with large public albergues (Vigo's holds over 90 beds; Pontevedra and Padrón are also large), municipal beds are a dependable default. Start early, arrive by early afternoon, and you will get one the vast majority of nights."
      - heading: "How to make them reliable in peak season"
        body: "Treat the municipal as plan A and a bookable private albergue as plan B. Leave at first light, aim to arrive before 14:00, and on any tight night (weekend, July–August, small village) reserve a private bed ahead so you are never stranded. Done this way, municipal albergues are both the cheapest and a perfectly reliable backbone for the walk."
    faq:
      - q: "Are municipal albergues reliable on the Camino Portugués?"
        a: "Yes, with a caveat. They're clean, cheap (about €8–10) and safe, but first-come and unbookable. From autumn to spring and on weekdays they're a dependable default. In peak summer, on weekends or in small towns, arrive before 14:00 and keep a bookable private bed as backup."
      - q: "Can you book a municipal albergue in advance?"
        a: "No. Municipal and Xunta albergues are first-come, first-served and cannot be reserved. They open for check-in around 13:00–14:00 and fill in arrival order, so arriving early is how you secure a bed in busy periods."
      - q: "What if the municipal albergue is full?"
        a: "Switch to a private albergue (about €15–22, bookable) or a guesthouse/hotel room on Booking.com. Asking the hospitalero usually helps — they often know who in town still has beds and will call ahead for you."
  es:
    metaTitle: "¿Son fiables los albergues municipales en el Camino Portugués? (2026)"
    metaDescription: "¿Te puedes fiar de los albergues municipales en el Camino Portugués? Cómo son de verdad — precio, plazas, el truco del orden de llegada — y cuándo confiar en ellos y cuándo respaldarlos. Guía honesta 2026."
    h1: "¿Son fiables los albergues municipales en el Camino Portugués?"
    lead: "Los albergues municipales son las camas más baratas y auténticas del Camino — y la fuente de la mayor angustia del peregrino, porque no se pueden reservar. ¿Te puedes fiar realmente de ellos? Casi siempre sí, con un hábito y un respaldo."
    sections:
      - heading: "Qué es realmente un albergue municipal"
        body: "Los albergues municipales (y de la Xunta de Galicia) son hostales públicos de peregrinos gestionados por el ayuntamiento o el gobierno regional. En el Camino Portugués cuestan unos 8–10 € la noche, tienen literas en dormitorio, cocinas básicas o microondas, duchas calientes y lavandería, y están abiertos a cualquiera con credencial de peregrino. Son limpios, seguros y atendidos por hospitaleros — no una apuesta de calidad. El truco es solo de disponibilidad."
      - heading: "La única limitación real: por orden de llegada, sin reserva"
        body: "No puedes reservar una plaza municipal. Abren para registro hacia las 13:00–14:00 y se llenan por orden de llegada. En temporada tranquila no es problema. En pleno verano, en fines de semana o en pueblos con pocas camas, pueden estar llenos a media tarde — así que un peregrino que llega tarde y contaba con el municipal puede quedarse buscando. La fiabilidad depende por completo de cuándo y cómo de temprano llegas, no de los albergues en sí."
      - heading: "Cuándo puedes confiar en ellos"
        body: "De octubre a mayo aproximadamente, entre semana y en los pueblos grandes con albergues públicos amplios (el de Vigo tiene más de 90 plazas; Pontevedra y Padrón también son grandes), las plazas municipales son una opción fiable por defecto. Sal temprano, llega a primera hora de la tarde y la conseguirás la gran mayoría de las noches."
      - heading: "Cómo hacerlos fiables en temporada alta"
        body: "Trata el municipal como plan A y un albergue privado reservable como plan B. Sal al amanecer, intenta llegar antes de las 14:00 y, en cualquier noche difícil (fin de semana, julio–agosto, pueblo pequeño), reserva una cama privada por adelantado para no quedarte tirado. Así, los albergues municipales son a la vez lo más barato y una columna vertebral perfectamente fiable para el camino."
    faq:
      - q: "¿Son fiables los albergues municipales en el Camino Portugués?"
        a: "Sí, con un matiz. Son limpios, baratos (unos 8–10 €) y seguros, pero por orden de llegada y no reservables. De otoño a primavera y entre semana son una opción fiable por defecto. En pleno verano, fines de semana o pueblos pequeños, llega antes de las 14:00 y ten una cama privada reservable como respaldo."
      - q: "¿Se puede reservar un albergue municipal con antelación?"
        a: "No. Los albergues municipales y de la Xunta son por orden de llegada y no se pueden reservar. Abren para registro hacia las 13:00–14:00 y se llenan por orden de llegada, así que llegar temprano es como aseguras cama en periodos concurridos."
      - q: "¿Qué hago si el albergue municipal está lleno?"
        a: "Cambia a un albergue privado (unos 15–22 €, reservable) o a una habitación de pensión u hotel en Booking.com. Preguntar al hospitalero suele ayudar — a menudo sabe quién en el pueblo tiene camas y llama por ti."
  pt:
    metaTitle: "Os albergues municipais são de confiança no Caminho Português? (2026)"
    metaDescription: "Podes confiar nos albergues municipais do Caminho Português? Como são na realidade — preço, camas, o senão da ordem de chegada — e quando confiar neles e quando os reforçar. Guia honesto 2026."
    h1: "Os albergues municipais são de confiança no Caminho Português?"
    lead: "Os albergues municipais são as camas mais baratas e autênticas do Caminho — e a fonte da maior ansiedade do peregrino, porque não se podem reservar. Podes mesmo confiar neles? Quase sempre sim, com um hábito e um apoio."
    sections:
      - heading: "O que é realmente um albergue municipal"
        body: "Os albergues municipais (e da Xunta de Galiza) são hostels públicos de peregrinos geridos pela câmara ou pelo governo regional. No Caminho Português custam cerca de 8–10 € por noite, têm beliches em dormitório, cozinhas básicas ou micro-ondas, duches quentes e lavandaria, e estão abertos a qualquer pessoa com credencial de peregrino. São limpos, seguros e com hospitaleiros — não uma aposta de qualidade. O senão é só de disponibilidade."
      - heading: "A única limitação real: por ordem de chegada, sem reserva"
        body: "Não podes reservar uma cama municipal. Abrem para registo por volta das 13:00–14:00 e enchem por ordem de chegada. Em época tranquila não é problema. Em pleno verão, aos fins de semana ou em vilas com poucas camas, podem encher a meio da tarde — por isso um peregrino que chega tarde e contava com o municipal pode ficar à procura. A fiabilidade depende por completo de quando e quão cedo chegas, não dos albergues em si."
      - heading: "Quando podes confiar neles"
        body: "De outubro a maio aproximadamente, durante a semana e nas vilas maiores com albergues públicos amplos (o de Vigo tem mais de 90 camas; Pontevedra e Padrón também são grandes), as camas municipais são uma opção fiável por omissão. Sai cedo, chega ao início da tarde e consegui-la-ás na grande maioria das noites."
      - heading: "Como torná-los fiáveis em época alta"
        body: "Trata o municipal como plano A e um albergue privado reservável como plano B. Sai ao nascer do dia, tenta chegar antes das 14:00 e, em qualquer noite apertada (fim de semana, julho–agosto, vila pequena), reserva uma cama privada com antecedência para nunca ficares sem nada. Feito assim, os albergues municipais são ao mesmo tempo o mais barato e uma espinha dorsal perfeitamente fiável para o caminho."
    faq:
      - q: "Os albergues municipais são de confiança no Caminho Português?"
        a: "Sim, com uma ressalva. São limpos, baratos (cerca de 8–10 €) e seguros, mas por ordem de chegada e não reserváveis. De outono a primavera e durante a semana são uma opção fiável por omissão. Em pleno verão, fins de semana ou vilas pequenas, chega antes das 14:00 e tem uma cama privada reservável como apoio."
      - q: "Pode reservar-se um albergue municipal com antecedência?"
        a: "Não. Os albergues municipais e da Xunta são por ordem de chegada e não se podem reservar. Abrem para registo por volta das 13:00–14:00 e enchem por ordem de chegada, por isso chegar cedo é como garantes cama em períodos movimentados."
      - q: "O que faço se o albergue municipal estiver cheio?"
        a: "Muda para um albergue privado (cerca de 15–22 €, reservável) ou um quarto de pensão ou hotel no Booking.com. Perguntar ao hospitaleiro costuma ajudar — muitas vezes sabe quem na vila tem camas e telefona por ti."
