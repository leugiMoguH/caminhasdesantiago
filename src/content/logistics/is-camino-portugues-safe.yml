i18n:
  en:
    metaTitle: "Is the Camino Portugués Safe? Honest Answer for 2026"
    metaDescription: "Is the Camino Portugués safe to walk, including solo and for women? The honest 2026 answer: the real risks (and they're mostly your feet and traffic), plus simple habits that keep you safe."
    h1: "Is the Camino Portugués safe?"
    lead: "Blunt answer: yes — it is one of the safest long walks in Europe, including for solo walkers and women. The real risks are not crime; they are blisters, traffic on a few road sections, and the heat. Here is the honest picture and how to manage it."
    sections:
      - heading: "The honest risk picture"
        body: "💡 Violent crime against pilgrims is very rare. Spain and Portugal are safe countries, the route is busy with fellow walkers, and albergues are staffed and secure. The genuine hazards are mundane: foot injuries from overdoing it, a few stretches beside busy roads (notably the N-550 in Galicia), dehydration in summer, and the occasional slippery cobble or boardwalk after rain."
      - heading: "Solo and women pilgrims"
        body: "Thousands walk the Camino Portugués alone every year, and a large share are women, often solo. Most report feeling safe and rarely alone for long, because you fall in with the same faces each day. Normal travel sense applies — trust your instincts, keep someone informed of your plan — but fear of the route itself is not warranted."
      - heading: "Petty theft and your stuff"
        body: "⚠️ The realistic crime risk is petty theft, not assault — an unattended phone or wallet in a busy café or dorm. Keep valuables on you or in a locker, don't leave a pack unwatched in a bar, and you remove almost all of it. Pilgrim culture is trusting, but a little care costs nothing."
      - heading: "The risks that actually stop people"
        body: "⚡ What ends Caminos is feet and pace, not danger. Break your boots in before you start, treat hot spots before they blister, ease into the daily distance, carry water in summer, and wear something visible on road sections. Manage those and the Camino Portugués is as safe as a walk gets."
    faq:
      - q: "Is the Camino Portugués safe to walk?"
        a: "Yes — it's one of the safest long walks in Europe. Violent crime against pilgrims is very rare. The real risks are blisters, a few road sections (like the N-550), summer heat and slippery surfaces after rain, all of which are manageable with basic care."
      - q: "Is the Camino Portugués safe for solo female pilgrims?"
        a: "Yes. Thousands of women walk it alone each year and most report feeling safe and rarely alone for long, since you meet the same pilgrims daily. Normal travel sense applies, but fear of the route itself isn't warranted."
      - q: "What are the real dangers on the Camino Portugués?"
        a: "Mundane ones: foot injuries from overdoing it, a few stretches beside busy roads, dehydration in summer, slippery cobbles or boardwalks after rain, and petty theft of unattended belongings. None are about violent crime."
      - q: "How do I stay safe on the Camino Portugués?"
        a: "Break in your boots, treat hot spots early, ease into the distance, carry water in summer, wear something visible on roads, and keep valuables with you. Those habits cover almost all the real risk."
  es:
    metaTitle: "¿Es seguro el Camino Portugués? Respuesta honesta para 2026"
    metaDescription: "¿Es seguro hacer el Camino Portugués, también en solitario y para mujeres? La respuesta honesta de 2026: los riesgos reales (sobre todo tus pies y el tráfico) y los hábitos que te mantienen seguro."
    h1: "¿Es seguro el Camino Portugués?"
    lead: "Respuesta directa: sí — es una de las caminatas largas más seguras de Europa, también en solitario y para mujeres. Los riesgos reales no son el crimen; son las ampollas, el tráfico en algunos tramos de carretera y el calor. Esta es la foto honesta y cómo gestionarla."
    sections:
      - heading: "La foto honesta del riesgo"
        body: "💡 El crimen violento contra peregrinos es muy raro. España y Portugal son países seguros, la ruta está concurrida de caminantes y los albergues tienen personal y son seguros. Los peligros reales son mundanos: lesiones de pies por excederse, algunos tramos junto a carreteras con tráfico (sobre todo la N-550 en Galicia), deshidratación en verano y algún adoquín o pasarela resbaladiza tras la lluvia."
      - heading: "Peregrinos en solitario y mujeres"
        body: "Miles hacen el Camino Portugués solos cada año, y una gran parte son mujeres, a menudo en solitario. La mayoría dice sentirse segura y rara vez sola mucho rato, porque te encuentras con las mismas caras cada día. Aplica el sentido común del viajero —fíate de tu instinto, que alguien sepa tu plan—, pero el miedo a la ruta en sí no está justificado."
      - heading: "Hurtos y tus cosas"
        body: "⚠️ El riesgo real es el hurto, no la agresión — un móvil o cartera desatendidos en un café o dormitorio concurrido. Lleva los objetos de valor encima o en una taquilla, no dejes la mochila sin vigilar en un bar, y eliminas casi todo. La cultura peregrina es confiada, pero un poco de cuidado no cuesta nada."
      - heading: "Los riesgos que de verdad paran a la gente"
        body: "⚡ Lo que acaba con los Caminos son los pies y el ritmo, no el peligro. Doma las botas antes de salir, trata los puntos calientes antes de que ampollen, ve metiéndote en la distancia diaria, lleva agua en verano y ponte algo visible en los tramos de carretera. Gestiona eso y el Camino Portugués es de lo más seguro que hay."
    faq:
      - q: "¿Es seguro hacer el Camino Portugués?"
        a: "Sí — es una de las caminatas largas más seguras de Europa. El crimen violento contra peregrinos es muy raro. Los riesgos reales son las ampollas, algunos tramos de carretera (como la N-550), el calor del verano y las superficies resbaladizas tras la lluvia, todos manejables con cuidado básico."
      - q: "¿Es seguro el Camino Portugués para mujeres en solitario?"
        a: "Sí. Miles de mujeres lo hacen solas cada año y la mayoría dice sentirse segura y rara vez sola mucho rato, ya que te encuentras con los mismos peregrinos a diario. Aplica el sentido común del viajero, pero el miedo a la ruta en sí no está justificado."
      - q: "¿Cuáles son los peligros reales del Camino Portugués?"
        a: "Los mundanos: lesiones de pies por excederse, algunos tramos junto a carreteras con tráfico, deshidratación en verano, adoquines o pasarelas resbaladizas tras la lluvia, y hurtos de objetos desatendidos. Ninguno tiene que ver con el crimen violento."
      - q: "¿Cómo me mantengo seguro en el Camino Portugués?"
        a: "Doma las botas, trata los puntos calientes pronto, ve metiéndote en la distancia, lleva agua en verano, ponte algo visible en las carreteras y lleva los objetos de valor encima. Esos hábitos cubren casi todo el riesgo real."
  pt:
    metaTitle: "O Caminho Português é seguro? Resposta honesta para 2026"
    metaDescription: "É seguro fazer o Caminho Português, também sozinho e para mulheres? A resposta honesta de 2026: os riscos reais (sobretudo os teus pés e o trânsito) e os hábitos que te mantêm seguro."
    h1: "O Caminho Português é seguro?"
    lead: "Resposta direta: sim — é uma das grandes caminhadas mais seguras da Europa, também sozinho e para mulheres. Os riscos reais não são o crime; são as bolhas, o trânsito em alguns troços de estrada e o calor. Eis o retrato honesto e como geri-lo."
    sections:
      - heading: "O retrato honesto do risco"
        body: "💡 O crime violento contra peregrinos é muito raro. Espanha e Portugal são países seguros, o percurso está movimentado de caminhantes e os albergues têm pessoal e são seguros. Os perigos reais são banais: lesões nos pés por exagero, alguns troços junto a estradas com trânsito (sobretudo a N-550 na Galiza), desidratação no verão e algum paralelo ou passadiço escorregadio depois da chuva."
      - heading: "Peregrinos sozinhos e mulheres"
        body: "Milhares fazem o Caminho Português sozinhos todos os anos, e grande parte são mulheres, muitas vezes a sós. A maioria diz sentir-se segura e raramente sozinha por muito tempo, porque te cruzas com as mesmas caras todos os dias. Aplica o bom senso do viajante —confia no teu instinto, que alguém saiba o teu plano—, mas o medo do percurso em si não se justifica."
      - heading: "Furtos e as tuas coisas"
        body: "⚠️ O risco real é o furto, não a agressão — um telemóvel ou carteira deixados num café ou dormitório movimentado. Leva os objetos de valor contigo ou num cacifo, não deixes a mochila sem vigilância num bar, e eliminas quase tudo. A cultura peregrina é confiante, mas um pouco de cuidado não custa nada."
      - heading: "Os riscos que de facto travam as pessoas"
        body: "⚡ O que acaba com os Caminhos são os pés e o ritmo, não o perigo. Amacia as botas antes de partir, trata os pontos quentes antes de criarem bolha, vai entrando na distância diária, leva água no verão e usa algo visível nos troços de estrada. Gere isso e o Caminho Português é tão seguro quanto uma caminhada pode ser."
    faq:
      - q: "É seguro fazer o Caminho Português?"
        a: "Sim — é uma das grandes caminhadas mais seguras da Europa. O crime violento contra peregrinos é muito raro. Os riscos reais são as bolhas, alguns troços de estrada (como a N-550), o calor do verão e as superfícies escorregadias depois da chuva, todos geríveis com cuidado básico."
      - q: "O Caminho Português é seguro para mulheres sozinhas?"
        a: "Sim. Milhares de mulheres fazem-no sozinhas todos os anos e a maioria diz sentir-se segura e raramente sozinha por muito tempo, já que te cruzas com os mesmos peregrinos diariamente. Aplica o bom senso do viajante, mas o medo do percurso em si não se justifica."
      - q: "Quais são os perigos reais do Caminho Português?"
        a: "Os banais: lesões nos pés por exagero, alguns troços junto a estradas com trânsito, desidratação no verão, paralelos ou passadiços escorregadios depois da chuva, e furtos de bens deixados sem vigilância. Nenhum tem a ver com crime violento."
      - q: "Como me mantenho seguro no Caminho Português?"
        a: "Amacia as botas, trata os pontos quentes cedo, vai entrando na distância, leva água no verão, usa algo visível nas estradas e leva os objetos de valor contigo. Esses hábitos cobrem quase todo o risco real."
