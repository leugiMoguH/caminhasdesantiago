i18n:
  en:
    metaTitle: "Camino Portugués Stages: Distances & Difficulty (Coastal, 2026)"
    metaDescription: "How hard is the Camino Portugués Coastal route? Honest 2026 take on stage distances, the difficulty rating, the toughest sections and how to plan stages that won't wreck your feet."
    h1: "Camino Portugués stages: distances and difficulty"
    lead: "Blunt answer: the Coastal Camino Portugués is one of the easier major Caminos — mostly flat, well-marked and walkable by anyone with reasonable fitness. Stages run 15–28 km. Here is how the difficulty really breaks down and how to plan it."
    sections:
      - heading: "Overall difficulty: moderate, leaning easy"
        body: "💡 The northern Coastal route is gently graded — seafront boardwalks, country lanes and a few short climbs rather than mountains. There is no high-altitude or technical terrain. If you can comfortably walk 20 km in a day, you can walk this route; the challenge is consecutive days, not any single hill."
      - heading: "Typical stage distances"
        body: "Stages on this stretch run roughly 15–28 km, four to seven hours each. The longest classic day is Viana do Castelo to Caminha (about 28 km); most others sit in the comfortable 18–22 km band. You can shorten almost any stage by stopping in an intermediate town — the route has frequent places to break."
      - heading: "The sections that need care"
        body: "⚠️ Not gradient but surface and traffic: stretches beside the busy N-550 in Galicia (around Cesantes), the cobbled Canicouva climb before Pontevedra, slippery boardwalks and cobbles after rain, and the river crossing at Caminha into Spain, which depends on a water taxi. Walk visibly on roads and take the wet cobbles slowly."
      - heading: "How to plan stages that don't hurt"
        body: "⚡ Most injuries come from doing too much too soon. Start with shorter days, build up gradually, and split a long stage if your feet are talking to you. The route's frequent towns make this easy — there is rarely a forced long day. Match daily distance to your slowest companion, not your fittest."
    faq:
      - q: "How hard is the Camino Portugués Coastal route?"
        a: "It's one of the easier major Caminos — mostly flat, well-marked, with seafront boardwalks and country lanes rather than mountains. Anyone with reasonable fitness who can walk 20 km a day can do it. The challenge is consecutive days, not any single climb."
      - q: "How long are the stages on the Camino Portugués?"
        a: "Roughly 15–28 km each, four to seven hours. The longest classic day is Viana do Castelo to Caminha (about 28 km); most sit in a comfortable 18–22 km band, and you can shorten almost any stage by stopping in an intermediate town."
      - q: "What are the hardest parts of the Coastal Camino?"
        a: "Not the gradient but surfaces and traffic: stretches beside the busy N-550 in Galicia, the cobbled Canicouva climb before Pontevedra, slippery boardwalks and cobbles after rain, and the Caminha river crossing into Spain by water taxi."
      - q: "How do I avoid injury on the Camino Portugués?"
        a: "Start with shorter days and build up, split a long stage if your feet hurt, and match the daily distance to your slowest companion. The route's frequent towns mean you rarely face a forced long day."
  es:
    metaTitle: "Etapas del Camino Portugués: distancias y dificultad (Costa, 2026)"
    metaDescription: "¿Qué tan duro es el Camino Portugués de la Costa? Visión honesta de 2026 sobre distancias de etapa, la dificultad, los tramos más exigentes y cómo planificar etapas que no destrocen tus pies."
    h1: "Etapas del Camino Portugués: distancias y dificultad"
    lead: "Respuesta directa: el Camino Portugués de la Costa es de los Caminos importantes más fáciles — casi llano, bien señalizado y transitable por cualquiera con forma razonable. Las etapas van de 15 a 28 km. Así se reparte de verdad la dificultad y cómo planificarla."
    sections:
      - heading: "Dificultad general: moderada, tirando a fácil"
        body: "💡 La ruta norte de la Costa es de pendiente suave — pasarelas junto al mar, caminos rurales y alguna subida corta, no montañas. No hay terreno de altura ni técnico. Si caminas 20 km en un día con comodidad, puedes hacer esta ruta; el reto son los días seguidos, no ninguna cuesta concreta."
      - heading: "Distancias típicas de etapa"
        body: "Las etapas de este tramo van de unos 15 a 28 km, de cuatro a siete horas cada una. El día clásico más largo es Viana do Castelo a Caminha (unos 28 km); la mayoría se queda en la franja cómoda de 18–22 km. Puedes acortar casi cualquier etapa parando en un pueblo intermedio — la ruta tiene muchos sitios para descansar."
      - heading: "Los tramos que requieren cuidado"
        body: "⚠️ No la pendiente, sino el firme y el tráfico: tramos junto a la concurrida N-550 en Galicia (hacia Cesantes), la subida empedrada de la Canicouva antes de Pontevedra, pasarelas y adoquines resbaladizos tras la lluvia, y el cruce del río en Caminha hacia España, que depende de un taxi-marítimo. Camina visible en las carreteras y toma con calma los adoquines mojados."
      - heading: "Cómo planificar etapas que no duelan"
        body: "⚡ La mayoría de las lesiones vienen de hacer demasiado demasiado pronto. Empieza con días más cortos, ve subiendo poco a poco y parte una etapa larga si tus pies te avisan. Los frecuentes pueblos de la ruta lo facilitan — rara vez hay un día largo forzado. Ajusta la distancia diaria a tu compañero más lento, no al más en forma."
    faq:
      - q: "¿Qué tan duro es el Camino Portugués de la Costa?"
        a: "Es de los Caminos importantes más fáciles — casi llano, bien señalizado, con pasarelas junto al mar y caminos rurales, no montañas. Cualquiera con forma razonable que camine 20 km al día puede hacerlo. El reto son los días seguidos, no ninguna subida."
      - q: "¿Cuánto miden las etapas del Camino Portugués?"
        a: "Unos 15–28 km cada una, de cuatro a siete horas. El día clásico más largo es Viana do Castelo a Caminha (unos 28 km); la mayoría se queda en la franja cómoda de 18–22 km, y puedes acortar casi cualquier etapa parando en un pueblo intermedio."
      - q: "¿Cuáles son las partes más duras de la Costa?"
        a: "No la pendiente, sino el firme y el tráfico: tramos junto a la concurrida N-550 en Galicia, la subida empedrada de la Canicouva antes de Pontevedra, pasarelas y adoquines resbaladizos tras la lluvia, y el cruce del río en Caminha hacia España en taxi-marítimo."
      - q: "¿Cómo evito lesionarme en el Camino Portugués?"
        a: "Empieza con días más cortos y ve subiendo, parte una etapa larga si te duelen los pies, y ajusta la distancia diaria a tu compañero más lento. Los frecuentes pueblos de la ruta hacen que rara vez tengas un día largo forzado."
  pt:
    metaTitle: "Etapas do Caminho Português: distâncias e dificuldade (Costa, 2026)"
    metaDescription: "Quão difícil é o Caminho Português da Costa? Visão honesta de 2026 sobre distâncias de etapa, a dificuldade, os troços mais exigentes e como planear etapas que não destruam os teus pés."
    h1: "Etapas do Caminho Português: distâncias e dificuldade"
    lead: "Resposta direta: o Caminho Português da Costa é dos Caminhos importantes mais fáceis — quase plano, bem sinalizado e caminhável por qualquer pessoa com forma razoável. As etapas vão de 15 a 28 km. Eis como se reparte mesmo a dificuldade e como planeá-la."
    sections:
      - heading: "Dificuldade geral: moderada, a puxar para fácil"
        body: "💡 A rota norte da Costa é de declive suave — passadiços junto ao mar, caminhos rurais e alguma subida curta, não montanhas. Não há terreno de altitude nem técnico. Se caminhas 20 km num dia com conforto, podes fazer esta rota; o desafio são os dias seguidos, não nenhuma subida concreta."
      - heading: "Distâncias típicas de etapa"
        body: "As etapas deste troço vão de cerca de 15 a 28 km, de quatro a sete horas cada. O dia clássico mais longo é Viana do Castelo a Caminha (cerca de 28 km); a maioria fica na faixa confortável de 18–22 km. Podes encurtar quase qualquer etapa parando numa vila intermédia — a rota tem muitos sítios para descansar."
      - heading: "Os troços que pedem cuidado"
        body: "⚠️ Não o declive, mas o piso e o trânsito: troços junto à movimentada N-550 na Galiza (perto de Cesantes), a subida empedrada da Canicouva antes de Pontevedra, passadiços e paralelos escorregadios depois da chuva, e a travessia do rio em Caminha para Espanha, que depende de um táxi fluvial. Caminha visível nas estradas e leva com calma os paralelos molhados."
      - heading: "Como planear etapas que não doam"
        body: "⚡ A maioria das lesões vem de fazer demasiado cedo demais. Começa com dias mais curtos, vai subindo aos poucos e divide uma etapa longa se os teus pés avisarem. As frequentes vilas da rota facilitam isto — raramente há um dia longo forçado. Ajusta a distância diária ao teu companheiro mais lento, não ao mais em forma."
    faq:
      - q: "Quão difícil é o Caminho Português da Costa?"
        a: "É dos Caminhos importantes mais fáceis — quase plano, bem sinalizado, com passadiços junto ao mar e caminhos rurais, não montanhas. Qualquer pessoa com forma razoável que caminhe 20 km por dia consegue. O desafio são os dias seguidos, não nenhuma subida."
      - q: "Qual o comprimento das etapas do Caminho Português?"
        a: "Cerca de 15–28 km cada, de quatro a sete horas. O dia clássico mais longo é Viana do Castelo a Caminha (cerca de 28 km); a maioria fica na faixa confortável de 18–22 km, e podes encurtar quase qualquer etapa parando numa vila intermédia."
      - q: "Quais são as partes mais difíceis da Costa?"
        a: "Não o declive, mas o piso e o trânsito: troços junto à movimentada N-550 na Galiza, a subida empedrada da Canicouva antes de Pontevedra, passadiços e paralelos escorregadios depois da chuva, e a travessia do rio em Caminha para Espanha de táxi fluvial."
      - q: "Como evito lesionar-me no Caminho Português?"
        a: "Começa com dias mais curtos e vai subindo, divide uma etapa longa se os pés doerem, e ajusta a distância diária ao teu companheiro mais lento. As frequentes vilas da rota fazem com que raramente tenhas um dia longo forçado."
