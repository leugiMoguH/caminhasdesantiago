i18n:
  en:
    metaTitle: "Pilgrim Credential on the Portuguese Camino (2026): Where to Get It & Stamps"
    metaDescription: "What the pilgrim credential (passport) is, where to get yours in Porto, Tui or along the coast, how many stamps you need, and the 100 km rule for the Compostela on the Portuguese Coastal Camino."
    h1: "The Pilgrim Credential: your passport for the Portuguese Camino"
    lead: "The credencial (pilgrim passport) is the small document that turns a walk into a recognised Camino: it lets you sleep in pilgrim albergues and, stamped along the way, earns you the Compostela in Santiago. Here is where to get one, how to stamp it, and what the last 100 km rule means on the Coastal route."
    sections:
      - heading: "What the credential is — and why you need it"
        body: "The pilgrim credential is an official card that records your journey with dated stamps (sellos in Spain, carimbos in Portugal). You need it for two things: to be admitted to pilgrim albergues, which only take credentialed pilgrims, and to claim the Compostela certificate at the Pilgrim's Office in Santiago. Keep it somewhere dry and easy to reach — you will present it every day."
      - heading: "Where to get your credential"
        body: "Most pilgrims pick one up at the start. In Porto, the Sé (cathedral) and the city's tourism offices issue them; if you fly into Lisbon, the Sé de Lisboa does too. Starting in Galicia, the cathedral and pilgrim associations in Tui provide them. You can also order one in advance from a Confraternity of St James in your own country. Along the Coastal route, some albergues and tourist offices can supply a credential if you arrive without one."
      - heading: "Collecting stamps (sellos / carimbos)"
        body: "Get at least one stamp per day for most of the route, and two stamps per day over the final 100 km — this is what the Pilgrim's Office checks. Stamps are free and easy to find: albergues, churches, tourist offices, town halls, and many cafés and bars give them. On this route you can stamp in Caminha before the crossing, in A Guarda on arrival in Spain, and in every Galician town through to Santiago."
      - heading: "The 100 km rule and the Compostela"
        body: "To receive the Compostela you must walk at least the last 100 km into Santiago (or cycle 200 km). On the Portuguese Camino the usual minimum-distance start is Tui, about 115 km out. If you are walking the Coastal route from Caminha and A Guarda, you comfortably exceed the 100 km minimum — just keep two stamps a day from the 100 km point onward so your credential proves the distance."
    howTo:
      - name: "Get your credential before you start"
        text: "Pick up a pilgrim passport in Porto (the Sé or a tourism office), in Tui, or order one in advance from a Confraternity of St James."
      - name: "Stamp it daily"
        text: "Collect at least one stamp a day, and two per day over the final 100 km, at albergues, churches, cafés, tourist offices or town halls."
      - name: "Walk the last 100 km"
        text: "Cover at least the final 100 km on foot — Tui is the classic minimum-distance start. On the Coastal route from Caminha and A Guarda you are well past that minimum."
      - name: "Claim the Compostela in Santiago"
        text: "Present your stamped credential at the Pilgrim's Office in Santiago to receive your Compostela certificate."
    faq:
      - q: "Do I need a pilgrim credential to walk the Portuguese Camino?"
        a: "You can walk without one, but you need it to sleep in pilgrim albergues and to receive the Compostela in Santiago. It is inexpensive and easy to get at the start, so almost every pilgrim carries one."
      - q: "Where can I get a pilgrim passport in Porto?"
        a: "The Sé do Porto (cathedral) and the city's tourism offices issue credentials. If you start further south, the Sé de Lisboa does too; in Galicia, get one in Tui."
      - q: "How many stamps do I need per day?"
        a: "At least one per day for most of the route, and two per day over the final 100 km into Santiago — the Pilgrim's Office uses these to verify you walked the qualifying distance."
      - q: "Is A Guarda to Santiago more than 100 km?"
        a: "Yes. Walking the Coastal route from A Guarda through Vigo, Redondela, Pontevedra and Padrón to Santiago comfortably exceeds the 100 km minimum needed for the Compostela."
  es:
    metaTitle: "Credencial del Peregrino en el Camino Portugués (2026): Dónde Conseguirla y Sellos"
    metaDescription: "Qué es la credencial del peregrino, dónde conseguirla en Oporto, Tui o a lo largo de la costa, cuántos sellos necesitas y la regla de los 100 km para la Compostela en el Camino Portugués de la Costa."
    h1: "La Credencial del Peregrino: tu pasaporte en el Camino Portugués"
    lead: "La credencial (pasaporte del peregrino) es el pequeño documento que convierte una caminata en un Camino reconocido: te permite dormir en albergues de peregrinos y, sellada por el camino, te da derecho a la Compostela en Santiago. Aquí tienes dónde conseguirla, cómo sellarla y qué significa la regla de los últimos 100 km en la ruta de la Costa."
    sections:
      - heading: "Qué es la credencial — y por qué la necesitas"
        body: "La credencial del peregrino es un documento oficial que registra tu viaje con sellos fechados (sellos en España, carimbos en Portugal). La necesitas para dos cosas: para acceder a los albergues de peregrinos, que solo admiten a peregrinos con credencial, y para solicitar la Compostela en la Oficina del Peregrino de Santiago. Llévala en un lugar seco y accesible — la presentarás cada día."
      - heading: "Dónde conseguir la credencial"
        body: "La mayoría la consigue al inicio. En Oporto la expiden la Sé (catedral) y las oficinas de turismo de la ciudad; si vuelas a Lisboa, también la Sé de Lisboa. Si empiezas en Galicia, la facilitan la catedral y las asociaciones de peregrinos en Tui. También puedes pedirla con antelación a una Asociación de Amigos del Camino de tu país. A lo largo de la ruta de la Costa, algunos albergues y oficinas de turismo pueden darte una credencial si llegas sin ella."
      - heading: "Conseguir sellos (sellos / carimbos)"
        body: "Consigue al menos un sello al día durante la mayor parte de la ruta, y dos sellos al día en los últimos 100 km — es lo que comprueba la Oficina del Peregrino. Los sellos son gratuitos y fáciles de encontrar: albergues, iglesias, oficinas de turismo, ayuntamientos y muchos cafés y bares los dan. En esta ruta puedes sellar en Caminha antes del cruce, en A Guarda al llegar a España y en cada pueblo gallego hasta Santiago."
      - heading: "La regla de los 100 km y la Compostela"
        body: "Para recibir la Compostela debes caminar al menos los últimos 100 km hasta Santiago (o pedalear 200 km). En el Camino Portugués el inicio habitual de distancia mínima es Tui, a unos 115 km. Si haces la ruta de la Costa desde Caminha y A Guarda, superas con holgura el mínimo de 100 km — basta con que consigas dos sellos al día a partir del punto de los 100 km para que tu credencial demuestre la distancia."
    howTo:
      - name: "Consigue la credencial antes de empezar"
        text: "Recoge un pasaporte del peregrino en Oporto (la Sé o una oficina de turismo), en Tui, o pídela con antelación a una Asociación de Amigos del Camino."
      - name: "Séllala a diario"
        text: "Consigue al menos un sello al día, y dos al día en los últimos 100 km, en albergues, iglesias, cafés, oficinas de turismo o ayuntamientos."
      - name: "Camina los últimos 100 km"
        text: "Recorre al menos los últimos 100 km a pie — Tui es el inicio clásico de distancia mínima. En la ruta de la Costa desde Caminha y A Guarda estás muy por encima de ese mínimo."
      - name: "Solicita la Compostela en Santiago"
        text: "Presenta tu credencial sellada en la Oficina del Peregrino de Santiago para recibir tu certificado de la Compostela."
    faq:
      - q: "¿Necesito credencial para hacer el Camino Portugués?"
        a: "Puedes caminar sin ella, pero la necesitas para dormir en albergues de peregrinos y para recibir la Compostela en Santiago. Es barata y fácil de conseguir al inicio, así que casi todos los peregrinos la llevan."
      - q: "¿Dónde consigo el pasaporte del peregrino en Oporto?"
        a: "La Sé do Porto (catedral) y las oficinas de turismo de la ciudad expiden credenciales. Si empiezas más al sur, también la Sé de Lisboa; en Galicia, consíguela en Tui."
      - q: "¿Cuántos sellos necesito al día?"
        a: "Al menos uno al día durante la mayor parte de la ruta, y dos al día en los últimos 100 km hasta Santiago — la Oficina del Peregrino los usa para verificar que caminaste la distancia exigida."
      - q: "¿A Guarda a Santiago son más de 100 km?"
        a: "Sí. Caminar la ruta de la Costa desde A Guarda pasando por Vigo, Redondela, Pontevedra y Padrón hasta Santiago supera con holgura el mínimo de 100 km necesario para la Compostela."
  pt:
    metaTitle: "Credencial do Peregrino no Caminho Português (2026): Onde Obter e Carimbos"
    metaDescription: "O que é a credencial do peregrino, onde a obter no Porto, em Tui ou ao longo da costa, quantos carimbos precisas e a regra dos 100 km para a Compostela no Caminho Português da Costa."
    h1: "A Credencial do Peregrino: o teu passaporte no Caminho Português"
    lead: "A credencial (passaporte do peregrino) é o pequeno documento que transforma uma caminhada num Caminho reconhecido: permite dormir em albergues de peregrinos e, carimbada pelo caminho, dá direito à Compostela em Santiago. Aqui tens onde a obter, como a carimbar e o que significa a regra dos últimos 100 km na rota da Costa."
    sections:
      - heading: "O que é a credencial — e porque precisas dela"
        body: "A credencial do peregrino é um documento oficial que regista a tua viagem com carimbos datados (sellos em Espanha, carimbos em Portugal). Precisas dela para duas coisas: para entrar nos albergues de peregrinos, que só recebem peregrinos com credencial, e para pedir a Compostela na Oficina do Peregrino em Santiago. Guarda-a num sítio seco e acessível — vais apresentá-la todos os dias."
      - heading: "Onde obter a credencial"
        body: "A maioria obtém-na no início. No Porto, a Sé (catedral) e os postos de turismo da cidade emitem-na; se voares para Lisboa, também a Sé de Lisboa. Se começares na Galiza, a catedral e as associações de peregrinos em Tui fornecem-na. Podes também pedi-la com antecedência a uma Associação de Amigos do Caminho do teu país. Ao longo da rota da Costa, alguns albergues e postos de turismo podem dar-te uma credencial se chegares sem ela."
      - heading: "Obter carimbos (carimbos / sellos)"
        body: "Obtém pelo menos um carimbo por dia na maior parte da rota, e dois carimbos por dia nos últimos 100 km — é o que a Oficina do Peregrino verifica. Os carimbos são gratuitos e fáceis de encontrar: albergues, igrejas, postos de turismo, câmaras municipais e muitos cafés e bares dão-nos. Nesta rota podes carimbar em Caminha antes da travessia, em A Guarda à chegada a Espanha e em cada localidade galega até Santiago."
      - heading: "A regra dos 100 km e a Compostela"
        body: "Para receberes a Compostela tens de caminhar pelo menos os últimos 100 km até Santiago (ou pedalar 200 km). No Caminho Português, o início habitual de distância mínima é Tui, a cerca de 115 km. Se fizeres a rota da Costa a partir de Caminha e A Guarda, ultrapassas com folga o mínimo de 100 km — basta obteres dois carimbos por dia a partir do ponto dos 100 km para a tua credencial provar a distância."
    howTo:
      - name: "Obtém a credencial antes de começar"
        text: "Levanta um passaporte do peregrino no Porto (a Sé ou um posto de turismo), em Tui, ou pede-o com antecedência a uma Associação de Amigos do Caminho."
      - name: "Carimba-a todos os dias"
        text: "Obtém pelo menos um carimbo por dia, e dois por dia nos últimos 100 km, em albergues, igrejas, cafés, postos de turismo ou câmaras municipais."
      - name: "Caminha os últimos 100 km"
        text: "Percorre pelo menos os últimos 100 km a pé — Tui é o início clássico de distância mínima. Na rota da Costa a partir de Caminha e A Guarda estás bem acima desse mínimo."
      - name: "Pede a Compostela em Santiago"
        text: "Apresenta a tua credencial carimbada na Oficina do Peregrino em Santiago para receberes o teu certificado da Compostela."
    faq:
      - q: "Preciso de credencial para fazer o Caminho Português?"
        a: "Podes caminhar sem ela, mas precisas dela para dormir em albergues de peregrinos e para receber a Compostela em Santiago. É barata e fácil de obter no início, por isso quase todos os peregrinos a levam."
      - q: "Onde obtenho o passaporte do peregrino no Porto?"
        a: "A Sé do Porto (catedral) e os postos de turismo da cidade emitem credenciais. Se começares mais a sul, também a Sé de Lisboa; na Galiza, obtém-na em Tui."
      - q: "Quantos carimbos preciso por dia?"
        a: "Pelo menos um por dia na maior parte da rota, e dois por dia nos últimos 100 km até Santiago — a Oficina do Peregrino usa-os para verificar que caminhaste a distância exigida."
      - q: "De A Guarda a Santiago são mais de 100 km?"
        a: "Sim. Caminhar a rota da Costa a partir de A Guarda passando por Vigo, Redondela, Pontevedra e Padrón até Santiago ultrapassa com folga o mínimo de 100 km necessário para a Compostela."
