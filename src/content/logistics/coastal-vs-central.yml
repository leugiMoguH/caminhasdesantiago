i18n:
  en:
    metaTitle: "Coastal vs Central: Which Camino Portugués Route? (2026)"
    metaDescription: "Coastal or Central Camino Portugués? The honest 2026 comparison — scenery, difficulty, crowds, accommodation and who each route suits — so you can choose with confidence and not second-guess."
    h1: "Coastal vs Central: which Camino Portugués route?"
    lead: "Blunt answer: choose Coastal for sea views, fresh air and a slightly easier walk; choose Central for villages, history and classic Camino atmosphere. Both reach Santiago and join near Redondela. Here is how to pick without overthinking it."
    sections:
      - heading: "The Coastal route in one breath"
        body: "💡 The Coastal (Senda Litoral / Caminho da Costa) hugs the Atlantic through Portugal and southern Galicia — beaches, boardwalks, fishing towns like Baiona, and ocean breeze that takes the edge off summer heat. It is gently graded, scenic and increasingly popular. Best for first-timers, summer walkers and anyone who loves the sea."
      - heading: "The Central route in one breath"
        body: "The Central is the historic original: inland through Barcelos, Ponte de Lima and Tui, with Roman roads, medieval bridges, vineyards and a deeper sense of Camino tradition. Slightly more up-and-down and more villages with classic albergues. Best for history lovers and pilgrims chasing the traditional feel."
      - heading: "How they really differ"
        body: "Scenery: ocean vs countryside and old towns. Difficulty: Coastal is a touch flatter; Central has more rolling climbs. Crowds: Central is busier overall, but both fill in summer. Accommodation: Central has more frequent villages and beds; the Coastal's small seaside towns can be tighter. They merge near Redondela, so the final stretch to Santiago is shared."
      - heading: "Can't decide? Do both"
        body: "⚡ Many pilgrims walk the Coastal north from Porto, then cut inland via the Spiritual Variant or rejoin the Central — getting sea and history in one trip. If you only pick one: sea, simplicity and summer say Coastal; tradition, villages and history say Central. There is no wrong answer."
    faq:
      - q: "Is the Coastal or Central Camino Portugués better?"
        a: "Neither is objectively better. Coastal gives sea views, fresh air and a slightly easier walk; Central gives historic villages, Roman roads and classic Camino atmosphere. Both reach Santiago and merge near Redondela."
      - q: "Which Camino Portugués route is easier?"
        a: "The Coastal route is a touch flatter and gentler, with the ocean breeze easing summer heat. The Central has more rolling climbs. Both are achievable for a reasonably fit walker."
      - q: "Which route is less crowded?"
        a: "The Coastal is generally quieter than the busier Central, though both fill in peak summer and the shared final stretch to Santiago is busy regardless of which you walked."
      - q: "Can you combine the Coastal and Central routes?"
        a: "Yes, and many do. Walk the Coastal from Porto and cut inland via the Spiritual Variant or rejoin the Central, getting both sea and history in one Camino. The routes merge near Redondela."
  es:
    metaTitle: "Costa o Central: ¿qué ruta del Camino Portugués? (2026)"
    metaDescription: "¿Camino Portugués de la Costa o Central? La comparación honesta de 2026 — paisaje, dificultad, gente, alojamiento y a quién conviene cada ruta — para que elijas con confianza y sin dudar."
    h1: "Costa o Central: ¿qué ruta del Camino Portugués?"
    lead: "Respuesta directa: elige la Costa por las vistas al mar, el aire fresco y un camino algo más fácil; elige el Central por los pueblos, la historia y el ambiente clásico del Camino. Ambas llegan a Santiago y se unen cerca de Redondela. Así eliges sin darle vueltas."
    sections:
      - heading: "La ruta de la Costa en una frase"
        body: "💡 La Costa (Senda Litoral / Caminho da Costa) bordea el Atlántico por Portugal y el sur de Galicia — playas, pasarelas, pueblos pesqueros como Baiona y brisa marina que suaviza el calor del verano. Es de pendiente suave, escénica y cada vez más popular. Ideal para primerizos, caminantes de verano y quien ame el mar."
      - heading: "La ruta Central en una frase"
        body: "El Central es el original histórico: por el interior vía Barcelos, Ponte de Lima y Tui, con calzadas romanas, puentes medievales, viñedos y un sentido más profundo de la tradición jacobea. Algo más de sube y baja y más pueblos con albergues clásicos. Ideal para amantes de la historia y quien busque el sabor tradicional."
      - heading: "En qué se diferencian de verdad"
        body: "Paisaje: océano frente a campo y cascos antiguos. Dificultad: la Costa es algo más llana; el Central tiene más subidas onduladas. Gente: el Central es más concurrido en general, pero ambas se llenan en verano. Alojamiento: el Central tiene pueblos y camas más frecuentes; los pequeños pueblos costeros pueden ir más justos. Se unen cerca de Redondela, así que el tramo final a Santiago es compartido."
      - heading: "¿No te decides? Haz las dos"
        body: "⚡ Muchos peregrinos hacen la Costa al norte desde Oporto y luego cortan al interior por la Variante Espiritual o se unen al Central — mar e historia en un mismo viaje. Si solo eliges una: mar, sencillez y verano dicen Costa; tradición, pueblos e historia dicen Central. No hay respuesta equivocada."
    faq:
      - q: "¿Es mejor el Camino Portugués de la Costa o el Central?"
        a: "Ninguno es objetivamente mejor. La Costa da vistas al mar, aire fresco y un camino algo más fácil; el Central da pueblos históricos, calzadas romanas y ambiente clásico del Camino. Ambos llegan a Santiago y se unen cerca de Redondela."
      - q: "¿Qué ruta del Camino Portugués es más fácil?"
        a: "La ruta de la Costa es algo más llana y suave, con la brisa marina aliviando el calor del verano. El Central tiene más subidas onduladas. Ambas son asequibles para un caminante en forma razonable."
      - q: "¿Qué ruta tiene menos gente?"
        a: "La Costa suele ser más tranquila que el Central, más concurrido, aunque ambas se llenan en verano y el tramo final compartido a Santiago va concurrido sea cual sea la que hayas hecho."
      - q: "¿Se pueden combinar la Costa y el Central?"
        a: "Sí, y muchos lo hacen. Haz la Costa desde Oporto y corta al interior por la Variante Espiritual o únete al Central, con mar e historia en un mismo Camino. Las rutas se unen cerca de Redondela."
  pt:
    metaTitle: "Costa ou Central: que rota do Caminho Português? (2026)"
    metaDescription: "Caminho Português da Costa ou Central? A comparação honesta de 2026 — paisagem, dificuldade, gente, alojamento e a quem convém cada rota — para escolheres com confiança e sem hesitar."
    h1: "Costa ou Central: que rota do Caminho Português?"
    lead: "Resposta direta: escolhe a Costa pelas vistas de mar, ar fresco e um caminho um pouco mais fácil; escolhe o Central pelas aldeias, história e ambiente clássico do Caminho. Ambas chegam a Santiago e juntam-se perto de Redondela. Eis como escolher sem dar voltas."
    sections:
      - heading: "A rota da Costa numa frase"
        body: "💡 A Costa (Senda Litoral / Caminho da Costa) acompanha o Atlântico por Portugal e o sul da Galiza — praias, passadiços, vilas piscatórias como Baiona e brisa marítima que suaviza o calor do verão. É de declive suave, cénica e cada vez mais popular. Ideal para principiantes, caminhantes de verão e quem ama o mar."
      - heading: "A rota Central numa frase"
        body: "O Central é o original histórico: pelo interior via Barcelos, Ponte de Lima e Tui, com calçadas romanas, pontes medievais, vinhedos e um sentido mais profundo da tradição jacobeia. Um pouco mais de sobe e desce e mais aldeias com albergues clássicos. Ideal para amantes de história e quem procura o sabor tradicional."
      - heading: "Em que diferem mesmo"
        body: "Paisagem: oceano versus campo e centros históricos. Dificuldade: a Costa é um pouco mais plana; o Central tem mais subidas onduladas. Gente: o Central é mais movimentado no geral, mas ambas enchem no verão. Alojamento: o Central tem aldeias e camas mais frequentes; as pequenas vilas costeiras podem ir mais apertadas. Juntam-se perto de Redondela, por isso o troço final até Santiago é partilhado."
      - heading: "Não consegues decidir? Faz as duas"
        body: "⚡ Muitos peregrinos fazem a Costa para norte desde o Porto e depois cortam para o interior pela Variante Espiritual ou juntam-se ao Central — mar e história numa só viagem. Se só escolheres uma: mar, simplicidade e verão dizem Costa; tradição, aldeias e história dizem Central. Não há resposta errada."
    faq:
      - q: "É melhor o Caminho Português da Costa ou o Central?"
        a: "Nenhum é objetivamente melhor. A Costa dá vistas de mar, ar fresco e um caminho um pouco mais fácil; o Central dá aldeias históricas, calçadas romanas e ambiente clássico do Caminho. Ambos chegam a Santiago e juntam-se perto de Redondela."
      - q: "Que rota do Caminho Português é mais fácil?"
        a: "A rota da Costa é um pouco mais plana e suave, com a brisa marítima a aliviar o calor do verão. O Central tem mais subidas onduladas. Ambas são acessíveis para um caminhante em forma razoável."
      - q: "Que rota tem menos gente?"
        a: "A Costa costuma ser mais tranquila do que o Central, mais movimentado, embora ambas encham no verão e o troço final partilhado até Santiago seja movimentado seja qual for a que tenhas feito."
      - q: "Podem combinar-se a Costa e o Central?"
        a: "Sim, e muitos fazem-no. Faz a Costa desde o Porto e corta para o interior pela Variante Espiritual ou junta-te ao Central, com mar e história num só Caminho. As rotas juntam-se perto de Redondela."
