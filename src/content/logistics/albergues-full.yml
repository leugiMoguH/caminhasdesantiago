i18n:
  en:
    metaTitle: "What Happens If Albergues Are Full on the Camino Portugués? (2026)"
    metaDescription: "Albergue full on the Camino Portugués? Here's exactly what to do: the order to try beds, how to find a private room fast, and how to never be caught out — calm, practical 2026 advice."
    h1: "What happens if albergues are full on the Camino Portugués?"
    lead: "It is the fear every pilgrim carries: you arrive tired and the albergue is full. On the Camino Portugués this rarely ends in disaster — there is almost always a bed within reach if you know the order to try. Here is exactly what to do, before and on the day."
    sections:
      - heading: "First: it is more common than scary"
        body: "Beds run out mainly on summer weekends, around Holy Week, and in the small coastal villages with few beds (Oia, Baiona). In the cities — Vigo, Pontevedra, Padrón — the big public albergues are first-come, so they can fill by mid-afternoon in July and August, but those same towns also have dozens of private albergues, hostels and hotels. A full municipal albergue is not the end of the road; it is a signal to move to plan B."
      - heading: "The order to try when a bed falls through"
        body: "Work down this list in order. One: ask the hospitalero — they often phone the next albergue for you and know who has space. Two: check the private albergues in town, which take reservations and can hold a bed by phone. Three: open Booking.com for a guesthouse or hotel room (often only a little more than a private dorm split two ways). Four: if the town is genuinely full, take a short taxi or local bus to the next town with beds and return to the same spot tomorrow — your walk stays continuous."
      - heading: "How to avoid the problem entirely"
        body: "Leave early. Pilgrims who start at first light and arrive before 14:00 almost never miss a municipal bed in season. On weekends and in small towns, book one private bed the night before so you always have a guaranteed fallback. Carry a charged phone with Booking.com and a Camino accommodation app so you can act in five minutes, not panic for an hour."
      - heading: "When to just book ahead"
        body: "If a date is fixed (you have a flight, you are walking a weekend, or it is peak summer), stop gambling and reserve a private albergue or room. Booking one night ahead keeps you flexible while removing the only real risk. The cost of certainty is a few euros; the cost of no bed is a ruined evening."
    howTo:
      - name: "Ask the hospitalero first"
        text: "Before leaving the full albergue, ask the warden — they usually know which place in town still has beds and will often call ahead for you."
      - name: "Try the private albergues"
        text: "Private albergues take reservations and are rarely all full at once. Call or book online; a dorm bed runs about €15–22."
      - name: "Open Booking.com for a room"
        text: "Search the town on Booking.com for a guesthouse or hotel. Split between two, a private room is often barely more than two dorm beds."
      - name: "Hop to the next town if needed"
        text: "If the town is truly full, take a short bus or taxi to the next town with beds, sleep there, and return to the exact spot in the morning to keep your route unbroken."
    faq:
      - q: "What do you do if the albergue is full on the Camino Portugués?"
        a: "Ask the hospitalero (they often call ahead for you), then try the town's private albergues, then book a guesthouse or hotel room on Booking.com. If the whole town is full, take a short bus or taxi to the next town with beds and return to the same point the next morning."
      - q: "Do albergues fill up on the Camino Portugués?"
        a: "Mainly on summer weekends, around Holy Week, and in small coastal villages with few beds. The big public albergues in Vigo, Pontevedra and Padrón are first-come and can fill by mid-afternoon in July and August, but those cities also have many private albergues, hostels and hotels."
      - q: "Should I book albergues in advance to be safe?"
        a: "If your date is fixed, you're walking a weekend, or it's peak summer, yes — reserve one private bed the night before as a guaranteed fallback. The big municipal albergues can't be booked anyway, so booking a private place is your safety net."
  es:
    metaTitle: "¿Qué pasa si los albergues están llenos en el Camino Portugués? (2026)"
    metaDescription: "¿Albergue lleno en el Camino Portugués? Esto es exactamente qué hacer: el orden para buscar cama, cómo encontrar habitación privada rápido y cómo no quedarte sin sitio. Consejo práctico 2026."
    h1: "¿Qué pasa si los albergues están llenos en el Camino Portugués?"
    lead: "Es el miedo de todo peregrino: llegas cansado y el albergue está lleno. En el Camino Portugués esto rara vez acaba mal — casi siempre hay una cama cerca si sabes en qué orden buscar. Esto es exactamente qué hacer, antes y el mismo día."
    sections:
      - heading: "Primero: es más común que alarmante"
        body: "Las plazas se agotan sobre todo los fines de semana de verano, en Semana Santa y en los pueblos costeros pequeños con pocas camas (Oia, Baiona). En las ciudades —Vigo, Pontevedra, Padrón— los grandes albergues públicos son por orden de llegada, así que pueden llenarse a media tarde en julio y agosto, pero esos mismos pueblos tienen también decenas de albergues privados, hostales y hoteles. Un albergue municipal lleno no es el final del camino; es la señal para pasar al plan B."
      - heading: "El orden para buscar cuando te quedas sin cama"
        body: "Sigue esta lista en orden. Uno: pregunta al hospitalero — a menudo llama al siguiente albergue por ti y sabe quién tiene sitio. Dos: mira los albergues privados del pueblo, que admiten reserva y pueden guardarte una cama por teléfono. Tres: abre Booking.com para una pensión o un hotel (suele costar poco más que un albergue privado dividido entre dos). Cuatro: si el pueblo está realmente lleno, toma un taxi o bus local corto hasta el siguiente pueblo con camas y vuelve mañana al mismo punto — tu camino sigue siendo continuo."
      - heading: "Cómo evitar el problema por completo"
        body: "Sal temprano. Los peregrinos que arrancan al amanecer y llegan antes de las 14:00 casi nunca se quedan sin plaza municipal en temporada. En fines de semana y pueblos pequeños, reserva una cama privada la noche anterior para tener siempre un respaldo asegurado. Lleva el móvil cargado con Booking.com y una app de alojamiento del Camino para poder actuar en cinco minutos, no entrar en pánico durante una hora."
      - heading: "Cuándo conviene reservar directamente"
        body: "Si tienes una fecha fija (tienes un vuelo, caminas un fin de semana o es pleno verano), deja de arriesgarte y reserva un albergue privado o una habitación. Reservar una noche por adelantado te mantiene flexible y elimina el único riesgo real. La certeza cuesta unos euros; quedarte sin cama te arruina la tarde."
    howTo:
      - name: "Pregunta primero al hospitalero"
        text: "Antes de salir del albergue lleno, pregunta al hospitalero — suele saber qué sitio del pueblo tiene camas y a menudo llama por ti."
      - name: "Prueba los albergues privados"
        text: "Los albergues privados admiten reserva y rara vez se llenan todos a la vez. Llama o reserva online; una cama en litera cuesta unos 15–22 €."
      - name: "Abre Booking.com para una habitación"
        text: "Busca el pueblo en Booking.com para una pensión u hotel. Dividida entre dos, una habitación privada suele costar poco más que dos camas de litera."
      - name: "Salta al siguiente pueblo si hace falta"
        text: "Si el pueblo está realmente lleno, toma un bus o taxi corto al siguiente pueblo con camas, duerme allí y vuelve por la mañana al mismo punto para no romper tu ruta."
    faq:
      - q: "¿Qué haces si el albergue está lleno en el Camino Portugués?"
        a: "Pregunta al hospitalero (a menudo llama por ti), luego prueba los albergues privados del pueblo y después reserva una pensión u hotel en Booking.com. Si todo el pueblo está lleno, toma un bus o taxi corto al siguiente pueblo con camas y vuelve al mismo punto por la mañana."
      - q: "¿Se llenan los albergues en el Camino Portugués?"
        a: "Sobre todo los fines de semana de verano, en Semana Santa y en pueblos costeros pequeños con pocas camas. Los grandes albergues públicos de Vigo, Pontevedra y Padrón son por orden de llegada y pueden llenarse a media tarde en julio y agosto, pero esas ciudades tienen también muchos albergues privados, hostales y hoteles."
      - q: "¿Debo reservar los albergues con antelación para ir seguro?"
        a: "Si tu fecha es fija, caminas un fin de semana o es pleno verano, sí — reserva una cama privada la noche anterior como respaldo asegurado. Los grandes albergues municipales no se pueden reservar de todos modos, así que reservar un sitio privado es tu red de seguridad."
  pt:
    metaTitle: "O que acontece se os albergues estiverem cheios no Caminho Português? (2026)"
    metaDescription: "Albergue cheio no Caminho Português? Eis exatamente o que fazer: a ordem para procurar cama, como encontrar quarto privado depressa e como nunca ficar sem sítio. Conselho prático 2026."
    h1: "O que acontece se os albergues estiverem cheios no Caminho Português?"
    lead: "É o medo de todo o peregrino: chegas cansado e o albergue está cheio. No Caminho Português isto raramente acaba mal — quase sempre há uma cama por perto se souberes em que ordem procurar. Eis exatamente o que fazer, antes e no próprio dia."
    sections:
      - heading: "Primeiro: é mais comum do que assustador"
        body: "As camas esgotam-se sobretudo aos fins de semana de verão, na Páscoa e nas pequenas vilas costeiras com poucas camas (Oia, Baiona). Nas cidades —Vigo, Pontevedra, Padrón— os grandes albergues públicos são por ordem de chegada, por isso podem encher a meio da tarde em julho e agosto, mas essas mesmas vilas têm também dezenas de albergues privados, hostels e hotéis. Um albergue municipal cheio não é o fim do caminho; é o sinal para passar ao plano B."
      - heading: "A ordem para procurar quando ficas sem cama"
        body: "Segue esta lista por ordem. Um: pergunta ao hospitaleiro — muitas vezes telefona ao albergue seguinte por ti e sabe quem tem espaço. Dois: vê os albergues privados da vila, que aceitam reserva e podem guardar uma cama por telefone. Três: abre o Booking.com para uma pensão ou hotel (costuma custar pouco mais do que um albergue privado dividido por dois). Quatro: se a vila estiver mesmo cheia, apanha um táxi ou autocarro local curto até à vila seguinte com camas e regressa amanhã ao mesmo ponto — o teu caminho continua contínuo."
      - heading: "Como evitar o problema por completo"
        body: "Sai cedo. Os peregrinos que arrancam ao nascer do dia e chegam antes das 14:00 quase nunca ficam sem cama municipal em época alta. Aos fins de semana e em vilas pequenas, reserva uma cama privada na noite anterior para teres sempre um apoio garantido. Leva o telemóvel carregado com o Booking.com e uma app de alojamento do Caminho para poderes agir em cinco minutos, em vez de entrares em pânico durante uma hora."
      - heading: "Quando vale a pena reservar já"
        body: "Se tens uma data fixa (tens um voo, caminhas num fim de semana ou é pleno verão), deixa de arriscar e reserva um albergue privado ou um quarto. Reservar uma noite com antecedência mantém-te flexível e elimina o único risco real. A certeza custa uns euros; ficar sem cama estraga-te a noite."
    howTo:
      - name: "Pergunta primeiro ao hospitaleiro"
        text: "Antes de saíres do albergue cheio, pergunta ao hospitaleiro — costuma saber que sítio da vila tem camas e muitas vezes telefona por ti."
      - name: "Tenta os albergues privados"
        text: "Os albergues privados aceitam reserva e raramente enchem todos ao mesmo tempo. Liga ou reserva online; uma cama em beliche custa cerca de 15–22 €."
      - name: "Abre o Booking.com para um quarto"
        text: "Procura a vila no Booking.com para uma pensão ou hotel. Dividido por dois, um quarto privado costuma custar pouco mais do que duas camas de beliche."
      - name: "Salta para a vila seguinte se for preciso"
        text: "Se a vila estiver mesmo cheia, apanha um autocarro ou táxi curto até à vila seguinte com camas, dorme lá e regressa de manhã ao mesmo ponto para não quebrares o percurso."
    faq:
      - q: "O que fazer se o albergue estiver cheio no Caminho Português?"
        a: "Pergunta ao hospitaleiro (muitas vezes telefona por ti), depois tenta os albergues privados da vila e em seguida reserva uma pensão ou hotel no Booking.com. Se toda a vila estiver cheia, apanha um autocarro ou táxi curto até à vila seguinte com camas e regressa ao mesmo ponto de manhã."
      - q: "Os albergues enchem no Caminho Português?"
        a: "Sobretudo aos fins de semana de verão, na Páscoa e em pequenas vilas costeiras com poucas camas. Os grandes albergues públicos de Vigo, Pontevedra e Padrón são por ordem de chegada e podem encher a meio da tarde em julho e agosto, mas essas cidades têm também muitos albergues privados, hostels e hotéis."
      - q: "Devo reservar os albergues com antecedência para ir seguro?"
        a: "Se a tua data é fixa, caminhas num fim de semana ou é pleno verão, sim — reserva uma cama privada na noite anterior como apoio garantido. Os grandes albergues municipais não se podem reservar de qualquer forma, por isso reservar um sítio privado é a tua rede de segurança."
