i18n:
  en:
    metaTitle: "Camino Portugués Booking Strategy: How to Never Miss a Bed (2026)"
    metaDescription: "The smart way to book on the Camino Portugués in 2026: what to reserve, what to leave to chance, how far ahead, and the one-night-ahead system experienced pilgrims use to never sleep out."
    h1: "Camino Portugués booking strategy"
    lead: "Blunt answer: book almost nothing far ahead, but always keep one night booked in front of you. That single habit removes the only real risk — a full town — while keeping the freedom that makes the Camino worth walking."
    sections:
      - heading: "What to book and what to leave free"
        body: "💡 Book private albergues and rooms; never try to book municipal ones — they are first-come and unbookable. Reserve ahead for the predictable pinch points: small coastal villages (Oia, Baiona), any weekend, peak summer, and your first and last nights. Leave the big-city nights (Vigo, Pontevedra, Padrón) flexible, where large public albergues usually have space."
      - heading: "The one-night-ahead system"
        body: "Each afternoon, once you know how your body feels, book the next night's bed — a private albergue or room in the town you are aiming for. You walk the day with a guaranteed bed waiting, decide tomorrow based on today, and never gamble after a long stage. It costs five minutes and a few euros of certainty."
      - heading: "How far ahead is too far"
        body: "⚠️ Booking the whole trip night-by-night before you leave is the classic mistake: weather, blisters and good company all change your plan, and you end up paying to cancel or marching to a town you no longer want. Outside peak summer, one to two days ahead is plenty. Only fixed dates (a flight, a festival) justify locking the whole route."
      - heading: "Tools that actually help"
        body: "Use Booking.com for private rooms, guesthouses and many private albergues — it shows live prices and free-cancellation options. A Camino accommodation app helps you see what lies in the next town before you commit. Keep your phone charged and screenshots of key bookings, since rural signal can be patchy."
    faq:
      - q: "Should I book albergues in advance on the Camino Portugués?"
        a: "Book private albergues and rooms for the pinch points — small villages, weekends, peak summer, and your first and last nights. Don't try to book municipal albergues (they're first-come). Leave big-city nights flexible. The smart habit is to book just one night ahead."
      - q: "How far in advance should I book?"
        a: "Outside peak summer, one to two days ahead is plenty. Booking the whole route night-by-night before you start usually backfires, because weather, blisters and company change your plan. Only fixed dates like a flight justify locking everything."
      - q: "What is the safest way to never miss a bed?"
        a: "The one-night-ahead system: each afternoon, book the next night's private bed in the town you're heading to. You always have a guaranteed bed waiting while keeping day-to-day flexibility."
      - q: "What apps help with Camino Portugués accommodation?"
        a: "Booking.com for private rooms, guesthouses and many private albergues with live prices and free cancellation, plus a Camino accommodation app to preview what's in the next town before you commit."
  es:
    metaTitle: "Estrategia de reserva en el Camino Portugués: cómo no quedarte sin cama (2026)"
    metaDescription: "La forma inteligente de reservar en el Camino Portugués en 2026: qué reservar, qué dejar al azar, con cuánta antelación y el sistema de una noche por delante que usan los peregrinos con experiencia."
    h1: "Estrategia de reserva en el Camino Portugués"
    lead: "Respuesta directa: no reserves casi nada con mucha antelación, pero ten siempre una noche reservada por delante. Ese único hábito elimina el único riesgo real —un pueblo lleno— sin perder la libertad que hace que el Camino merezca la pena."
    sections:
      - heading: "Qué reservar y qué dejar libre"
        body: "💡 Reserva albergues privados y habitaciones; nunca intentes reservar los municipales — son por orden de llegada y no reservables. Reserva con antelación en los puntos previsibles: pueblos costeros pequeños (Oia, Baiona), cualquier fin de semana, verano alto y tu primera y última noche. Deja flexibles las noches de ciudad (Vigo, Pontevedra, Padrón), donde los grandes albergues públicos suelen tener sitio."
      - heading: "El sistema de una noche por delante"
        body: "Cada tarde, cuando ya sabes cómo está tu cuerpo, reserva la cama de la noche siguiente — un albergue privado o habitación en el pueblo al que apuntas. Caminas el día con una cama asegurada esperándote, decides mañana según hoy y nunca te arriesgas tras una etapa larga. Cuesta cinco minutos y unos euros de tranquilidad."
      - heading: "Cuánta antelación es demasiada"
        body: "⚠️ Reservar todo el viaje noche a noche antes de salir es el error clásico: el tiempo, las ampollas y la buena compañía cambian tu plan, y acabas pagando cancelaciones o caminando a un pueblo que ya no quieres. Fuera del verano alto, uno o dos días de antelación bastan. Solo las fechas fijas (un vuelo, una fiesta) justifican fijar toda la ruta."
      - heading: "Herramientas que de verdad ayudan"
        body: "Usa Booking.com para habitaciones privadas, pensiones y muchos albergues privados — muestra precios en vivo y opciones de cancelación gratis. Una app de alojamiento del Camino te deja ver qué hay en el siguiente pueblo antes de comprometerte. Lleva el móvil cargado y capturas de las reservas clave, porque la cobertura rural puede fallar."
    faq:
      - q: "¿Debo reservar los albergues con antelación en el Camino Portugués?"
        a: "Reserva albergues privados y habitaciones en los puntos críticos: pueblos pequeños, fines de semana, verano alto y tu primera y última noche. No intentes reservar los municipales (son por orden de llegada). Deja flexibles las noches de ciudad. El hábito inteligente es reservar solo una noche por delante."
      - q: "¿Con cuánta antelación debo reservar?"
        a: "Fuera del verano alto, uno o dos días bastan. Reservar toda la ruta noche a noche antes de salir suele salir mal, porque el tiempo, las ampollas y la compañía cambian el plan. Solo fechas fijas como un vuelo justifican fijarlo todo."
      - q: "¿Cuál es la forma más segura de no quedarte sin cama?"
        a: "El sistema de una noche por delante: cada tarde reserva la cama privada de la noche siguiente en el pueblo al que vas. Siempre tienes cama asegurada esperando sin perder flexibilidad diaria."
      - q: "¿Qué apps ayudan con el alojamiento del Camino Portugués?"
        a: "Booking.com para habitaciones, pensiones y muchos albergues privados con precios en vivo y cancelación gratis, más una app de alojamiento del Camino para ver qué hay en el siguiente pueblo antes de comprometerte."
  pt:
    metaTitle: "Estratégia de reserva no Caminho Português: como nunca ficar sem cama (2026)"
    metaDescription: "A forma inteligente de reservar no Caminho Português em 2026: o que reservar, o que deixar ao acaso, com que antecedência e o sistema de uma noite à frente que os peregrinos experientes usam."
    h1: "Estratégia de reserva no Caminho Português"
    lead: "Resposta direta: não reserves quase nada com muita antecedência, mas tem sempre uma noite reservada à tua frente. Esse único hábito elimina o único risco real —uma vila cheia— sem perder a liberdade que faz o Caminho valer a pena."
    sections:
      - heading: "O que reservar e o que deixar livre"
        body: "💡 Reserva albergues privados e quartos; nunca tentes reservar os municipais — são por ordem de chegada e não reserváveis. Reserva com antecedência nos pontos previsíveis: pequenas vilas costeiras (Oia, Baiona), qualquer fim de semana, verão alto e a tua primeira e última noite. Deixa flexíveis as noites de cidade (Vigo, Pontevedra, Padrón), onde os grandes albergues públicos costumam ter espaço."
      - heading: "O sistema de uma noite à frente"
        body: "Cada tarde, quando já sabes como está o teu corpo, reserva a cama da noite seguinte — um albergue privado ou quarto na vila a que apontas. Caminhas o dia com uma cama garantida à espera, decides amanhã com base no hoje e nunca arriscas após uma etapa longa. Custa cinco minutos e uns euros de tranquilidade."
      - heading: "Que antecedência é demasiada"
        body: "⚠️ Reservar toda a viagem noite a noite antes de partir é o erro clássico: o tempo, as bolhas e a boa companhia mudam o plano, e acabas a pagar cancelamentos ou a marchar para uma vila que já não queres. Fora do verão alto, um a dois dias de antecedência chegam. Só datas fixas (um voo, uma festa) justificam fixar toda a rota."
      - heading: "Ferramentas que ajudam mesmo"
        body: "Usa o Booking.com para quartos privados, pensões e muitos albergues privados — mostra preços ao vivo e opções de cancelamento grátis. Uma app de alojamento do Caminho deixa-te ver o que há na vila seguinte antes de te comprometeres. Leva o telemóvel carregado e capturas das reservas-chave, porque a rede rural pode falhar."
    faq:
      - q: "Devo reservar os albergues com antecedência no Caminho Português?"
        a: "Reserva albergues privados e quartos nos pontos críticos: vilas pequenas, fins de semana, verão alto e a tua primeira e última noite. Não tentes reservar os municipais (são por ordem de chegada). Deixa flexíveis as noites de cidade. O hábito inteligente é reservar só uma noite à frente."
      - q: "Com que antecedência devo reservar?"
        a: "Fora do verão alto, um a dois dias chegam. Reservar toda a rota noite a noite antes de partir costuma correr mal, porque o tempo, as bolhas e a companhia mudam o plano. Só datas fixas como um voo justificam fixar tudo."
      - q: "Qual é a forma mais segura de nunca ficar sem cama?"
        a: "O sistema de uma noite à frente: cada tarde reserva a cama privada da noite seguinte na vila para onde vais. Tens sempre cama garantida à espera sem perder flexibilidade diária."
      - q: "Que apps ajudam com o alojamento do Caminho Português?"
        a: "Booking.com para quartos, pensões e muitos albergues privados com preços ao vivo e cancelamento grátis, mais uma app de alojamento do Caminho para ver o que há na vila seguinte antes de te comprometeres."
