i18n:
  en:
    metaTitle: "Senda Litoral vs Coastal Camino (2026): Boardwalks, Tides & Which to Walk"
    metaDescription: "The Senda Litoral is the seaside boardwalk variant of the Portuguese Coastal Camino — how it differs from the waymarked Camino da Costa, what boardwalks and tides mean, and how to combine them."
    h1: "Senda Litoral vs the Coastal Camino: which seaside path to walk"
    lead: "On the Portuguese Coastal Camino two paths run north in parallel and pilgrims often mix them up. The official Camino da Costa is waymarked but dips inland at times; the Senda Litoral hugs the Atlantic on boardwalks and beach promenades. Here is how they differ and how to combine them."
    sections:
      - heading: "What the Senda Litoral is"
        body: "The Senda Litoral is the variant that stays as close to the Atlantic as possible — roughly 80% of it runs on promenades, wooden boardwalks and beaches, with around 35 km of boardwalk between Porto and the Galician coast. It is flat, scenic and right by the sea, but it is not waymarked end to end like the official route: you join and leave it from the Camino da Costa."
      - heading: "Senda Litoral vs Camino da Costa"
        body: "The Camino da Costa is the official, fully waymarked Coastal route. It follows the coast but turns inland onto lanes and woodland for short stretches, sometimes for shade, a village or a better viewpoint. The Senda Litoral stays at sea level on boardwalks and promenades — flatter and more direct along the shore, but more exposed to wind and sun with little shade. Both link the same towns, so many pilgrims walk the Senda Litoral where it is pleasant and rejoin the waymarked Camino where the boardwalk ends or detours."
      - heading: "Boardwalks, wind and tides"
        body: "The boardwalks (passadiços) are easy underfoot but exposed — Atlantic wind and rain hit hard, so a windproof layer matters even in summer. Some sections close or are temporarily rerouted for repairs or storm damage, so follow local signs. On beach and river-mouth stretches a very high tide can shorten the walkable sand, so it is worth checking tide times before low-lying sections."
      - heading: "On the northern stretch (Viana do Castelo → Caminha)"
        body: "On the stretch this guide covers, the Senda Litoral runs beside the Atlantic and then along the Minho estuary into Caminha — a flat riverside boardwalk with the Galician hills across the water. From Caminha you cross the Minho to A Guarda; from there the route is mostly the inland-leaning Camino da Costa through the Galician hills, where pure seaside boardwalk gives way to lanes and woodland."
    howTo:
      - name: "Follow the Senda Litoral for the sea"
        text: "Where you want beaches, boardwalks and flat walking right by the Atlantic, follow the Senda Litoral."
      - name: "Switch to the waymarked Camino da Costa when needed"
        text: "Where the boardwalk ends or detours, or the official arrows lead inland for shade or a village, follow the Camino da Costa waymarks."
      - name: "Check wind and tides"
        text: "Pack a windproof layer for the exposed boardwalks and check tide times before low beach or river-mouth sections."
      - name: "Rejoin for the river crossing"
        text: "Both paths converge on Caminha for the Minho crossing to A Guarda and the Galician stages."
    faq:
      - q: "What is the difference between the Senda Litoral and the Coastal Camino?"
        a: "The Camino da Costa is the official waymarked Coastal route, which sometimes turns inland; the Senda Litoral is the seaside variant that stays on boardwalks and beach promenades right by the Atlantic. They link the same towns and most pilgrims combine them."
      - q: "Is the Senda Litoral waymarked?"
        a: "Not continuously. It is well developed with promenades and boardwalks, but it is not waymarked end to end like the official Camino da Costa — you join and leave it from the waymarked route."
      - q: "Do tides or weather affect the Senda Litoral?"
        a: "Yes. The boardwalks are exposed to Atlantic wind and rain, and some sections close or detour for repairs. On beach and river-mouth stretches a very high tide reduces the walkable sand, so check tide times and follow local signs."
      - q: "Which is better on the northern Caminha stretch?"
        a: "Near Caminha the Senda Litoral is a flat, scenic riverside boardwalk along the Minho — pleasant and easy. After crossing to A Guarda the route follows the inland-leaning Camino da Costa through the Galician hills."
  es:
    metaTitle: "Senda Litoral vs Camino de la Costa (2026): Pasarelas, Mareas y Cuál Hacer"
    metaDescription: "La Senda Litoral es la variante junto al mar del Camino Portugués de la Costa — en qué se diferencia del Camino da Costa señalizado, qué implican las pasarelas y las mareas, y cómo combinarlas."
    h1: "Senda Litoral vs Camino de la Costa: qué camino junto al mar elegir"
    lead: "En el Camino Portugués de la Costa hay dos rutas que suben en paralelo y los peregrinos las confunden a menudo. El Camino da Costa oficial está señalizado pero a veces se mete tierra adentro; la Senda Litoral sigue el Atlántico por pasarelas y paseos de playa. Aquí tienes en qué se diferencian y cómo combinarlas."
    sections:
      - heading: "Qué es la Senda Litoral"
        body: "La Senda Litoral es la variante que se mantiene lo más cerca posible del Atlántico — alrededor del 80% discurre por paseos marítimos, pasarelas de madera y playas, con unos 35 km de pasarela entre Oporto y la costa gallega. Es llana, pintoresca y pegada al mar, pero no está señalizada de principio a fin como la ruta oficial: te incorporas y la dejas desde el Camino da Costa."
      - heading: "Senda Litoral vs Camino da Costa"
        body: "El Camino da Costa es la ruta costera oficial y totalmente señalizada. Sigue la costa pero se mete tierra adentro por caminos y bosque en tramos cortos, a veces por sombra, un pueblo o un mirador mejor. La Senda Litoral se mantiene a nivel del mar sobre pasarelas y paseos — más llana y directa junto a la orilla, pero más expuesta al viento y al sol y con poca sombra. Ambas enlazan los mismos pueblos, así que muchos peregrinos hacen la Senda Litoral donde es agradable y vuelven al Camino señalizado donde la pasarela termina o se desvía."
      - heading: "Pasarelas, viento y mareas"
        body: "Las pasarelas (passadiços) son cómodas de pisar pero expuestas — el viento y la lluvia del Atlántico pegan fuerte, así que una capa cortavientos importa incluso en verano. Algunos tramos cierran o se desvían temporalmente por obras o temporales, así que sigue la señalización local. En tramos de playa y desembocadura, una marea muy alta puede reducir la arena transitable, por lo que conviene consultar las mareas antes de los tramos bajos."
      - heading: "En el tramo norte (Viana do Castelo → Caminha)"
        body: "En el tramo que cubre esta guía, la Senda Litoral va junto al Atlántico y luego por el estuario del Miño hasta Caminha — una pasarela llana junto al río con las colinas gallegas al otro lado del agua. Desde Caminha cruzas el Miño hasta A Guarda; a partir de ahí la ruta es sobre todo el Camino da Costa, que tiende tierra adentro por las colinas gallegas, donde la pasarela junto al mar deja paso a caminos y bosque."
    howTo:
      - name: "Sigue la Senda Litoral para el mar"
        text: "Donde quieras playas, pasarelas y caminar llano pegado al Atlántico, sigue la Senda Litoral."
      - name: "Cambia al Camino da Costa señalizado cuando haga falta"
        text: "Donde la pasarela termina o se desvía, o las flechas oficiales llevan tierra adentro por sombra o un pueblo, sigue las marcas del Camino da Costa."
      - name: "Consulta viento y mareas"
        text: "Lleva una capa cortavientos para las pasarelas expuestas y consulta las mareas antes de los tramos bajos de playa o desembocadura."
      - name: "Vuelve a unirte para el cruce del río"
        text: "Ambos caminos confluyen en Caminha para el cruce del Miño hasta A Guarda y las etapas gallegas."
    faq:
      - q: "¿Cuál es la diferencia entre la Senda Litoral y el Camino de la Costa?"
        a: "El Camino da Costa es la ruta costera oficial y señalizada, que a veces se mete tierra adentro; la Senda Litoral es la variante junto al mar que se mantiene en pasarelas y paseos de playa pegada al Atlántico. Enlazan los mismos pueblos y la mayoría de los peregrinos las combinan."
      - q: "¿Está señalizada la Senda Litoral?"
        a: "No de forma continua. Está bien desarrollada con paseos y pasarelas, pero no está señalizada de principio a fin como el Camino da Costa oficial — te incorporas y la dejas desde la ruta señalizada."
      - q: "¿Afectan las mareas o el tiempo a la Senda Litoral?"
        a: "Sí. Las pasarelas están expuestas al viento y la lluvia del Atlántico, y algunos tramos cierran o se desvían por obras. En tramos de playa y desembocadura, una marea muy alta reduce la arena transitable, así que consulta las mareas y sigue la señalización local."
      - q: "¿Cuál es mejor en el tramo norte de Caminha?"
        a: "Cerca de Caminha la Senda Litoral es una pasarela llana y pintoresca junto al Miño — agradable y fácil. Tras cruzar a A Guarda la ruta sigue el Camino da Costa, que tiende tierra adentro por las colinas gallegas."
  pt:
    metaTitle: "Senda Litoral vs Caminho da Costa (2026): Passadiços, Marés e Qual Fazer"
    metaDescription: "A Senda Litoral é a variante junto ao mar do Caminho Português da Costa — em que difere do Caminho da Costa sinalizado, o que implicam os passadiços e as marés, e como combiná-los."
    h1: "Senda Litoral vs Caminho da Costa: que caminho junto ao mar escolher"
    lead: "No Caminho Português da Costa há dois percursos que sobem em paralelo e os peregrinos confundem-nos muitas vezes. O Caminho da Costa oficial está sinalizado mas por vezes vai para o interior; a Senda Litoral segue o Atlântico por passadiços e passeios de praia. Aqui tens em que diferem e como combiná-los."
    sections:
      - heading: "O que é a Senda Litoral"
        body: "A Senda Litoral é a variante que se mantém o mais perto possível do Atlântico — cerca de 80% segue por passeios marítimos, passadiços de madeira e praias, com uns 35 km de passadiço entre o Porto e a costa galega. É plana, panorâmica e mesmo junto ao mar, mas não está sinalizada de início ao fim como a rota oficial: juntas-te e sais dela a partir do Caminho da Costa."
      - heading: "Senda Litoral vs Caminho da Costa"
        body: "O Caminho da Costa é a rota costeira oficial e totalmente sinalizada. Segue a costa mas vai para o interior por caminhos e bosque em troços curtos, por vezes por sombra, uma aldeia ou um miradouro melhor. A Senda Litoral mantém-se ao nível do mar sobre passadiços e passeios — mais plana e direta junto à orla, mas mais exposta ao vento e ao sol e com pouca sombra. Ambas ligam as mesmas localidades, por isso muitos peregrinos fazem a Senda Litoral onde é agradável e voltam ao Caminho sinalizado onde o passadiço termina ou se desvia."
      - heading: "Passadiços, vento e marés"
        body: "Os passadiços são cómodos de pisar mas expostos — o vento e a chuva do Atlântico batem com força, por isso uma camada corta-vento conta mesmo no verão. Alguns troços fecham ou são desviados temporariamente por obras ou temporais, por isso segue a sinalização local. Em troços de praia e foz, uma maré muito alta pode reduzir a areia transitável, por isso vale a pena consultar as marés antes dos troços baixos."
      - heading: "No troço norte (Viana do Castelo → Caminha)"
        body: "No troço que este guia cobre, a Senda Litoral segue junto ao Atlântico e depois pelo estuário do Minho até Caminha — um passadiço plano junto ao rio com as colinas galegas do outro lado da água. De Caminha atravessas o Minho até A Guarda; a partir daí a rota é sobretudo o Caminho da Costa, que tende para o interior pelas colinas galegas, onde o passadiço junto ao mar dá lugar a caminhos e bosque."
    howTo:
      - name: "Segue a Senda Litoral pelo mar"
        text: "Onde quiseres praias, passadiços e caminhar plano mesmo junto ao Atlântico, segue a Senda Litoral."
      - name: "Muda para o Caminho da Costa sinalizado quando precisares"
        text: "Onde o passadiço termina ou se desvia, ou as setas oficiais levam para o interior por sombra ou uma aldeia, segue as marcas do Caminho da Costa."
      - name: "Confirma vento e marés"
        text: "Leva uma camada corta-vento para os passadiços expostos e confirma as marés antes dos troços baixos de praia ou foz."
      - name: "Junta-te de novo para a travessia do rio"
        text: "Ambos os caminhos convergem em Caminha para a travessia do Minho até A Guarda e as etapas galegas."
    faq:
      - q: "Qual é a diferença entre a Senda Litoral e o Caminho da Costa?"
        a: "O Caminho da Costa é a rota costeira oficial e sinalizada, que por vezes vai para o interior; a Senda Litoral é a variante junto ao mar que se mantém em passadiços e passeios de praia colada ao Atlântico. Ligam as mesmas localidades e a maioria dos peregrinos combina-as."
      - q: "A Senda Litoral está sinalizada?"
        a: "Não de forma contínua. Está bem desenvolvida com passeios e passadiços, mas não está sinalizada de início ao fim como o Caminho da Costa oficial — juntas-te e sais dela a partir da rota sinalizada."
      - q: "As marés ou o tempo afetam a Senda Litoral?"
        a: "Sim. Os passadiços estão expostos ao vento e à chuva do Atlântico, e alguns troços fecham ou desviam por obras. Em troços de praia e foz, uma maré muito alta reduz a areia transitável, por isso consulta as marés e segue a sinalização local."
      - q: "Qual é melhor no troço norte de Caminha?"
        a: "Perto de Caminha a Senda Litoral é um passadiço plano e panorâmico junto ao Minho — agradável e fácil. Depois de atravessar para A Guarda a rota segue o Caminho da Costa, que tende para o interior pelas colinas galegas."
