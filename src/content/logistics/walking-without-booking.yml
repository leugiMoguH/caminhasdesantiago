i18n:
  en:
    metaTitle: "Can You Walk the Camino Portugués Without Booking? (2026 Honest Answer)"
    metaDescription: "Can you walk the Camino Portugués without booking ahead? Yes — and here's exactly when it works, when it doesn't, and the simple habits that keep a no-booking pilgrim sleeping easy in 2026."
    h1: "Can you walk the Camino Portugués without booking?"
    lead: "Yes — thousands do it every year, arriving each afternoon and taking whatever bed is free. The traditional Camino runs on first-come municipal albergues. But 'no booking' works far better in some seasons than others. Here is the honest answer."
    sections:
      - heading: "The short answer"
        body: "Outside July and August, walking with zero reservations is genuinely easy on the Camino Portugués. Beds outnumber pilgrims most of the year, the public albergues are first-come by design, and arriving by early afternoon almost always gets you a bed. Many pilgrims consider this the purest way to walk — no schedule, no pressure, you stop where your legs say."
      - heading: "When no-booking works"
        body: "Spring (April–June) and autumn (September–October) on weekdays are ideal: pleasant weather, plenty of beds, light crowds. If you walk at a steady pace, start early and are flexible about which albergue you land in, you can walk the whole route without booking a single night and never sleep rough."
      - heading: "When it gets risky"
        body: "July and August, weekends year-round, Holy Week, and the small coastal villages (Oia, Baiona) are where pure no-booking bites. Few beds plus many pilgrims means the only people guaranteed a bed are those who booked or arrived very early. This is also true in the last 100 km near Santiago, which is busy regardless of season."
      - heading: "The hybrid most experienced pilgrims use"
        body: "Walk free most nights, but book one private bed ahead whenever you hit a tight spot — a small town, a weekend, a peak-summer city. You keep the freedom of the no-booking Camino while removing the single night that could go wrong. It costs a few euros and ten minutes, and it is why seasoned pilgrims rarely end up bedless."
    faq:
      - q: "Can you walk the Camino Portugués without booking accommodation?"
        a: "Yes. The route runs on first-come municipal albergues and outside peak summer there are usually more beds than pilgrims. Start early, arrive by early afternoon and stay flexible, and you can walk without booking. In July–August, on weekends and in small coastal villages, booking one private bed ahead is much safer."
      - q: "Is it better to book or walk freely on the Camino Portugués?"
        a: "Most experienced pilgrims use a hybrid: walk free for the freedom of it, but reserve one private bed ahead on tight nights — small towns, weekends, peak summer. You keep the spontaneity while removing the only real risk of no bed."
      - q: "When is it hardest to find a bed without booking?"
        a: "July and August, weekends all year, Holy Week, the small coastal villages of Oia and Baiona, and the final 100 km into Santiago. In those situations a reservation is the difference between a guaranteed bed and a gamble."
  es:
    metaTitle: "¿Se puede hacer el Camino Portugués sin reservar? (Respuesta honesta 2026)"
    metaDescription: "¿Se puede hacer el Camino Portugués sin reservar? Sí — y aquí está exactamente cuándo funciona, cuándo no, y los hábitos sencillos que hacen que un peregrino sin reserva duerma tranquilo en 2026."
    h1: "¿Se puede hacer el Camino Portugués sin reservar?"
    lead: "Sí — miles lo hacen cada año, llegando cada tarde y cogiendo la cama que esté libre. El Camino tradicional funciona con albergues municipales por orden de llegada. Pero 'sin reserva' funciona mucho mejor en unas épocas que en otras. Esta es la respuesta honesta."
    sections:
      - heading: "La respuesta corta"
        body: "Fuera de julio y agosto, caminar sin ninguna reserva es realmente fácil en el Camino Portugués. La mayor parte del año hay más camas que peregrinos, los albergues públicos son por orden de llegada por diseño, y llegar a primera hora de la tarde casi siempre te consigue cama. Muchos peregrinos lo consideran la forma más pura de caminar — sin horario, sin presión, paras donde te dicen las piernas."
      - heading: "Cuándo funciona ir sin reserva"
        body: "La primavera (abril–junio) y el otoño (septiembre–octubre) entre semana son ideales: buen tiempo, camas de sobra, poca gente. Si caminas a ritmo constante, sales temprano y eres flexible con el albergue que te toca, puedes hacer toda la ruta sin reservar ni una noche y no dormir nunca a la intemperie."
      - heading: "Cuándo se vuelve arriesgado"
        body: "Julio y agosto, los fines de semana todo el año, la Semana Santa y los pueblos costeros pequeños (Oia, Baiona) son donde el ir sin reserva pasa factura. Pocas camas más muchos peregrinos significa que los únicos con cama asegurada son los que reservaron o llegaron muy temprano. Lo mismo ocurre en los últimos 100 km hacia Santiago, concurridos en cualquier época."
      - heading: "El híbrido que usan los peregrinos con experiencia"
        body: "Camina libre casi todas las noches, pero reserva una cama privada por adelantado cuando llegues a un punto difícil — un pueblo pequeño, un fin de semana, una ciudad en pleno verano. Conservas la libertad del Camino sin reserva eliminando la única noche que podría salir mal. Cuesta unos euros y diez minutos, y por eso los peregrinos veteranos rara vez se quedan sin cama."
    faq:
      - q: "¿Se puede hacer el Camino Portugués sin reservar alojamiento?"
        a: "Sí. La ruta funciona con albergues municipales por orden de llegada y fuera del verano alto suele haber más camas que peregrinos. Sal temprano, llega a primera hora de la tarde y sé flexible, y podrás caminar sin reservar. En julio–agosto, fines de semana y pueblos costeros pequeños, reservar una cama privada por adelantado es mucho más seguro."
      - q: "¿Es mejor reservar o caminar libre en el Camino Portugués?"
        a: "La mayoría de los peregrinos con experiencia usa un híbrido: caminan libres por la libertad que da, pero reservan una cama privada por adelantado en las noches difíciles — pueblos pequeños, fines de semana, pleno verano. Conservas la espontaneidad eliminando el único riesgo real de quedarte sin cama."
      - q: "¿Cuándo es más difícil encontrar cama sin reservar?"
        a: "Julio y agosto, los fines de semana todo el año, la Semana Santa, los pueblos costeros de Oia y Baiona y los últimos 100 km hasta Santiago. En esas situaciones una reserva es la diferencia entre una cama asegurada y una apuesta."
  pt:
    metaTitle: "Pode fazer o Caminho Português sem reservar? (Resposta honesta 2026)"
    metaDescription: "Pode fazer o Caminho Português sem reservar? Sim — e eis exatamente quando funciona, quando não, e os hábitos simples que fazem um peregrino sem reserva dormir descansado em 2026."
    h1: "Pode fazer o Caminho Português sem reservar?"
    lead: "Sim — milhares fazem-no todos os anos, chegando cada tarde e ficando com a cama que estiver livre. O Caminho tradicional funciona com albergues municipais por ordem de chegada. Mas 'sem reserva' funciona muito melhor numas épocas do que noutras. Esta é a resposta honesta."
    sections:
      - heading: "A resposta curta"
        body: "Fora de julho e agosto, caminhar sem qualquer reserva é realmente fácil no Caminho Português. Na maior parte do ano há mais camas do que peregrinos, os albergues públicos são por ordem de chegada por princípio, e chegar ao início da tarde quase sempre te garante cama. Muitos peregrinos consideram esta a forma mais pura de caminhar — sem horário, sem pressão, paras onde as pernas mandam."
      - heading: "Quando funciona ir sem reserva"
        body: "A primavera (abril–junho) e o outono (setembro–outubro) durante a semana são ideais: bom tempo, camas de sobra, pouca gente. Se caminhares a ritmo constante, saíres cedo e fores flexível quanto ao albergue que te calha, podes fazer todo o percurso sem reservar uma única noite e nunca dormir ao relento."
      - heading: "Quando se torna arriscado"
        body: "Julho e agosto, os fins de semana todo o ano, a Páscoa e as pequenas vilas costeiras (Oia, Baiona) são onde o ir sem reserva pesa. Poucas camas mais muitos peregrinos significa que os únicos com cama garantida são os que reservaram ou chegaram muito cedo. O mesmo acontece nos últimos 100 km até Santiago, movimentados em qualquer época."
      - heading: "O híbrido que os peregrinos experientes usam"
        body: "Caminha livre quase todas as noites, mas reserva uma cama privada com antecedência sempre que chegares a um ponto apertado — uma vila pequena, um fim de semana, uma cidade em pleno verão. Manténs a liberdade do Caminho sem reserva eliminando a única noite que podia correr mal. Custa uns euros e dez minutos, e é por isso que os peregrinos experientes raramente ficam sem cama."
    faq:
      - q: "Pode fazer-se o Caminho Português sem reservar alojamento?"
        a: "Sim. O percurso funciona com albergues municipais por ordem de chegada e fora do verão alto costuma haver mais camas do que peregrinos. Sai cedo, chega ao início da tarde e sê flexível, e poderás caminhar sem reservar. Em julho–agosto, fins de semana e pequenas vilas costeiras, reservar uma cama privada com antecedência é muito mais seguro."
      - q: "É melhor reservar ou caminhar livre no Caminho Português?"
        a: "A maioria dos peregrinos experientes usa um híbrido: caminham livres pela liberdade que dá, mas reservam uma cama privada com antecedência nas noites apertadas — vilas pequenas, fins de semana, pleno verão. Manténs a espontaneidade eliminando o único risco real de ficar sem cama."
      - q: "Quando é mais difícil encontrar cama sem reservar?"
        a: "Julho e agosto, os fins de semana todo o ano, a Páscoa, as vilas costeiras de Oia e Baiona e os últimos 100 km até Santiago. Nessas situações uma reserva é a diferença entre uma cama garantida e uma aposta."
