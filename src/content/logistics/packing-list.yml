i18n:
  en:
    metaTitle: "Camino Portugués Packing List: What Pilgrims Actually Carry (2026)"
    metaDescription: "A no-fluff Camino Portugués packing list for 2026: the weight rule, what genuinely matters, what to leave behind, and the small items pilgrims always wish they'd brought."
    h1: "Camino Portugués packing list"
    lead: "Blunt answer: carry under 10% of your body weight and you will be glad every single day. The Coastal route is mild, so you need less than you think. Here is what actually matters, what to skip, and the small things people forget."
    sections:
      - heading: "The one rule that matters"
        body: "⚠️ Keep your loaded pack under about 10% of your body weight — for most people that is 6–8 kg plus water. Every extra kilo is felt by day three and is the single biggest cause of sore shoulders and quitting. When in doubt, leave it out; you can buy almost anything along the way."
      - heading: "What genuinely earns its place"
        body: "Broken-in trail shoes or light boots; two or three quick-dry walking outfits (wear one, wash one); a light waterproof jacket (Galicia is green for a reason); sandals for evenings and showers; a fast-dry towel; a basic toiletry and foot-care kit; a phone, charger and small power bank; your credential, ID and a debit/credit card plus some cash. That is the backbone of the whole list."
      - heading: "What to leave at home"
        body: "💡 Skip the 'just in case' pile: more than three changes of clothes, heavy books, a big first-aid kit, multiple pairs of shoes, and bulky toiletries. Albergues provide blankets; many have kitchens. You are walking through towns with shops and pharmacies, not a wilderness — restock as you go rather than carrying it all."
      - heading: "The small things people wish they'd packed"
        body: "⚡ The cheap items that save your trip: earplugs (dorms snore), blister plasters and tape applied before the blister, a refillable water bottle, a few euros in coins for some albergues and machines, a lightweight sleeping liner, and a small headtorch for early starts and dark dorms."
    faq:
      - q: "How much should my backpack weigh on the Camino Portugués?"
        a: "Under about 10% of your body weight — for most people 6–8 kg plus water. Every extra kilo is felt by day three and is the main cause of sore shoulders and quitting. When in doubt, leave it out and restock along the way."
      - q: "What should I pack for the Camino Portugués?"
        a: "Broken-in trail shoes, two or three quick-dry outfits, a light waterproof, shower sandals, a fast-dry towel, basic toiletries and foot care, phone and charger, and your credential, ID and cards plus some cash. That covers it."
      - q: "What should I NOT bring on the Camino Portugués?"
        a: "Skip the 'just in case' pile: more than three changes of clothes, heavy books, a big first-aid kit, extra shoes and bulky toiletries. You pass towns with shops and pharmacies daily, so restock as you go rather than carrying everything."
      - q: "What small items do pilgrims forget?"
        a: "Earplugs for snoring dorms, blister plasters and tape applied early, a refillable bottle, some coins for albergues and machines, a light sleeping liner, and a small headtorch for early starts."
  es:
    metaTitle: "Lista de equipaje del Camino Portugués: qué llevan de verdad los peregrinos (2026)"
    metaDescription: "Lista de equipaje del Camino Portugués sin relleno para 2026: la regla del peso, lo que de verdad importa, lo que dejar en casa y los pequeños objetos que los peregrinos desearían haber traído."
    h1: "Lista de equipaje del Camino Portugués"
    lead: "Respuesta directa: lleva menos del 10 % de tu peso corporal y lo agradecerás cada día. La ruta de la Costa es suave, así que necesitas menos de lo que crees. Esto es lo que de verdad importa, lo que saltarte y lo que la gente olvida."
    sections:
      - heading: "La única regla que importa"
        body: "⚠️ Mantén la mochila cargada por debajo de un 10 % de tu peso corporal — para la mayoría son 6–8 kg más el agua. Cada kilo de más se nota al tercer día y es la mayor causa de hombros doloridos y de abandonos. En la duda, déjalo; puedes comprar casi cualquier cosa por el camino."
      - heading: "Lo que de verdad se gana su sitio"
        body: "Zapatillas de trail o botas ligeras ya domadas; dos o tres conjuntos de secado rápido (uno puesto, otro lavado); un chubasquero ligero (Galicia es verde por algo); sandalias para la tarde y la ducha; toalla de secado rápido; un neceser básico y kit de cuidado de pies; móvil, cargador y una pequeña batería externa; tu credencial, documento y una tarjeta más algo de efectivo. Esa es la columna vertebral de toda la lista."
      - heading: "Lo que dejar en casa"
        body: "💡 Sáltate el montón del 'por si acaso': más de tres mudas, libros pesados, un botiquín grande, varios pares de zapatos y neceseres voluminosos. Los albergues dan mantas; muchos tienen cocina. Caminas por pueblos con tiendas y farmacias, no por un desierto — reabastece sobre la marcha en vez de cargarlo todo."
      - heading: "Las pequeñas cosas que se desean haber traído"
        body: "⚡ Los objetos baratos que salvan el viaje: tapones para los oídos (los dormitorios roncan), apósitos y esparadrapo para ampollas puestos antes de que salga la ampolla, botella recargable, unos euros en monedas para algunos albergues y máquinas, una sábana-saco ligera y un pequeño frontal para las salidas temprano y los dormitorios oscuros."
    faq:
      - q: "¿Cuánto debe pesar mi mochila en el Camino Portugués?"
        a: "Por debajo de un 10 % de tu peso corporal — para la mayoría 6–8 kg más el agua. Cada kilo de más se nota al tercer día y es la principal causa de hombros doloridos y abandonos. En la duda, déjalo y reabastece por el camino."
      - q: "¿Qué debo llevar al Camino Portugués?"
        a: "Zapatillas de trail domadas, dos o tres conjuntos de secado rápido, un chubasquero ligero, sandalias de ducha, toalla de secado rápido, neceser básico y cuidado de pies, móvil y cargador, y tu credencial, documento y tarjetas más algo de efectivo. Con eso basta."
      - q: "¿Qué NO debo llevar al Camino Portugués?"
        a: "Sáltate el 'por si acaso': más de tres mudas, libros pesados, un botiquín grande, zapatos de más y neceseres voluminosos. Pasas por pueblos con tiendas y farmacias a diario, así que reabastece sobre la marcha en vez de cargarlo todo."
      - q: "¿Qué pequeños objetos olvidan los peregrinos?"
        a: "Tapones para dormitorios ruidosos, apósitos y esparadrapo puestos pronto, botella recargable, monedas para albergues y máquinas, una sábana-saco ligera y un pequeño frontal para las salidas temprano."
  pt:
    metaTitle: "Lista de bagagem do Caminho Português: o que os peregrinos levam mesmo (2026)"
    metaDescription: "Lista de bagagem do Caminho Português sem enchimento para 2026: a regra do peso, o que importa mesmo, o que deixar em casa e os pequenos objetos que os peregrinos gostariam de ter levado."
    h1: "Lista de bagagem do Caminho Português"
    lead: "Resposta direta: leva menos de 10 % do teu peso corporal e vais agradecer todos os dias. A rota da Costa é suave, por isso precisas de menos do que pensas. Eis o que importa mesmo, o que saltar e o que as pessoas esquecem."
    sections:
      - heading: "A única regra que importa"
        body: "⚠️ Mantém a mochila carregada abaixo de cerca de 10 % do teu peso corporal — para a maioria são 6–8 kg mais a água. Cada quilo a mais sente-se ao terceiro dia e é a maior causa de ombros doridos e de desistências. Na dúvida, deixa; podes comprar quase tudo pelo caminho."
      - heading: "O que ganha mesmo o seu lugar"
        body: "Ténis de trail ou botas leves já amaciadas; dois ou três conjuntos de secagem rápida (um vestido, outro lavado); um corta-vento impermeável leve (a Galiza é verde por alguma razão); sandálias para a noite e o duche; toalha de secagem rápida; um nécessaire básico e kit de cuidado dos pés; telemóvel, carregador e uma pequena bateria externa; a tua credencial, documento e um cartão mais algum dinheiro. Essa é a espinha dorsal de toda a lista."
      - heading: "O que deixar em casa"
        body: "💡 Salta a pilha do 'caso seja preciso': mais de três mudas, livros pesados, um estojo de primeiros socorros grande, vários pares de sapatos e nécessaires volumosos. Os albergues dão cobertores; muitos têm cozinha. Caminhas por vilas com lojas e farmácias, não por um deserto — reabastece pelo caminho em vez de carregar tudo."
      - heading: "As pequenas coisas que se gostaria de ter levado"
        body: "⚡ Os objetos baratos que salvam a viagem: tampões para os ouvidos (os dormitórios ressonam), pensos e adesivo para bolhas postos antes de a bolha sair, garrafa recarregável, uns euros em moedas para alguns albergues e máquinas, um saco-cama lençol leve e uma pequena lanterna de cabeça para as saídas cedo e os dormitórios escuros."
    faq:
      - q: "Quanto deve pesar a minha mochila no Caminho Português?"
        a: "Abaixo de cerca de 10 % do teu peso corporal — para a maioria 6–8 kg mais a água. Cada quilo a mais sente-se ao terceiro dia e é a principal causa de ombros doridos e desistências. Na dúvida, deixa e reabastece pelo caminho."
      - q: "O que devo levar para o Caminho Português?"
        a: "Ténis de trail amaciados, dois ou três conjuntos de secagem rápida, um corta-vento leve, sandálias de duche, toalha de secagem rápida, nécessaire básico e cuidado dos pés, telemóvel e carregador, e a tua credencial, documento e cartões mais algum dinheiro. Com isso chega."
      - q: "O que NÃO devo levar para o Caminho Português?"
        a: "Salta o 'caso seja preciso': mais de três mudas, livros pesados, um estojo grande de primeiros socorros, sapatos a mais e nécessaires volumosos. Passas por vilas com lojas e farmácias diariamente, por isso reabastece pelo caminho em vez de carregar tudo."
      - q: "Que pequenos objetos os peregrinos esquecem?"
        a: "Tampões para dormitórios ruidosos, pensos e adesivo postos cedo, garrafa recarregável, moedas para albergues e máquinas, um saco-cama lençol leve e uma pequena lanterna de cabeça para as saídas cedo."
