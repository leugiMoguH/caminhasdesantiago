i18n:
  en:
    metaTitle: "When Is the Best Time to Walk the Camino Portugués? (2026)"
    metaDescription: "The best time to walk the Camino Portugués in 2026: month-by-month weather, crowds and bed availability, plus the trade-offs of spring, summer, autumn and winter on the Coastal route."
    h1: "When is the best time to walk the Camino Portugués?"
    lead: "Blunt answer: May, June and September are the sweet spot — warm enough, dry enough, and far easier for beds than peak summer. Here is the honest month-by-month picture so you can pick the trade-off that suits you."
    sections:
      - heading: "The sweet spot: May–June and September"
        body: "💡 Late spring and September give you long days, comfortable walking temperatures (high teens to mid-20s °C), a lively but not overwhelming pilgrim community, and beds that are findable without stress if you start early. For most people this is simply the best time to walk the Coastal route."
      - heading: "July–August: hot and busy"
        body: "⚠️ Peak summer brings the most pilgrims and the most heat. The coast is cooler than inland, but afternoons can be draining and the small albergues fill earliest. It is walkable and fun if you start at dawn and book ahead on tight nights — just go in with eyes open about crowds and beds."
      - heading: "April and October: quieter, cooler, wetter"
        body: "Shoulder months trade crowds for the chance of rain and shorter days. Beds are easy, the trail is peaceful, and the Galician green is at its best — but pack proper rain gear and check that smaller private albergues are open, as some close out of season."
      - heading: "November–March: solitude with caveats"
        body: "⚡ Winter is for the prepared. Many private albergues and seasonal cafés close, daylight is short, and rain and wind off the Atlantic are real. You will have the path almost to yourself and the cities stay open, but plan accommodation carefully and do not count on every village having a bed."
    faq:
      - q: "What is the best month to walk the Camino Portugués?"
        a: "May, June and September are the sweet spot: warm, mostly dry, lively but not overcrowded, and far easier for beds than July–August. April and October are quieter and cooler but wetter."
      - q: "Is it too hot to walk the Camino Portugués in summer?"
        a: "July and August are hot, though the coast is cooler than inland. It's very walkable if you start at dawn, carry water and rest in the afternoon — but it's also the busiest time, so book ahead on tight nights."
      - q: "Can you walk the Camino Portugués in winter?"
        a: "Yes, but it's for the prepared. Many private albergues and cafés close, days are short, and Atlantic rain and wind are likely. You'll have the trail almost to yourself, but plan accommodation carefully as not every village will have a bed."
      - q: "When is the Camino Portugués least crowded?"
        a: "November to March is quietest by far, followed by April and late October. If you want solitude with manageable weather, the shoulder months of April and October are the best balance."
  es:
    metaTitle: "¿Cuál es la mejor época para hacer el Camino Portugués? (2026)"
    metaDescription: "La mejor época para hacer el Camino Portugués en 2026: clima, gente y disponibilidad de camas mes a mes, con los pros y contras de primavera, verano, otoño e invierno en la ruta de la Costa."
    h1: "¿Cuál es la mejor época para hacer el Camino Portugués?"
    lead: "Respuesta directa: mayo, junio y septiembre son el punto dulce — con calor suficiente, secos y mucho más fáciles para conseguir cama que el verano alto. Esta es la foto honesta mes a mes para que elijas el equilibrio que te conviene."
    sections:
      - heading: "El punto dulce: mayo–junio y septiembre"
        body: "💡 La primavera tardía y septiembre dan días largos, temperaturas cómodas para caminar (de 17 a 25 °C), una comunidad peregrina animada pero no abrumadora, y camas que se encuentran sin estrés si sales temprano. Para la mayoría es sencillamente la mejor época para la ruta de la Costa."
      - heading: "Julio–agosto: calor y mucha gente"
        body: "⚠️ El verano alto trae más peregrinos y más calor. La costa es más fresca que el interior, pero las tardes pueden agotar y los albergues pequeños se llenan antes. Es transitable y divertido si sales al amanecer y reservas las noches difíciles — solo ve con los ojos abiertos sobre gente y camas."
      - heading: "Abril y octubre: más tranquilo, más fresco, más lluvia"
        body: "Los meses de transición cambian la multitud por la posibilidad de lluvia y días más cortos. Las camas son fáciles, el camino está tranquilo y el verde gallego luce al máximo — pero lleva buen equipo de lluvia y confirma que los albergues privados pequeños abren, ya que algunos cierran fuera de temporada."
      - heading: "Noviembre–marzo: soledad con matices"
        body: "⚡ El invierno es para quien va preparado. Muchos albergues privados y cafés de temporada cierran, hay poca luz y la lluvia y el viento del Atlántico son reales. Tendrás el camino casi para ti y las ciudades siguen abiertas, pero planifica el alojamiento con cuidado y no cuentes con que todos los pueblos tengan cama."
    faq:
      - q: "¿Cuál es el mejor mes para hacer el Camino Portugués?"
        a: "Mayo, junio y septiembre son el punto dulce: cálidos, casi secos, animados pero no masificados y mucho más fáciles para camas que julio–agosto. Abril y octubre son más tranquilos y frescos pero más lluviosos."
      - q: "¿Hace demasiado calor en verano en el Camino Portugués?"
        a: "Julio y agosto son calurosos, aunque la costa es más fresca que el interior. Es muy transitable si sales al amanecer, llevas agua y descansas por la tarde — pero es la época más concurrida, así que reserva las noches difíciles."
      - q: "¿Se puede hacer el Camino Portugués en invierno?"
        a: "Sí, pero es para quien va preparado. Muchos albergues privados y cafés cierran, los días son cortos y la lluvia y el viento atlántico son probables. Tendrás el camino casi para ti, pero planifica el alojamiento porque no todos los pueblos tendrán cama."
      - q: "¿Cuándo hay menos gente en el Camino Portugués?"
        a: "De noviembre a marzo es lo más tranquilo, seguido de abril y finales de octubre. Si quieres soledad con un clima manejable, los meses de transición de abril y octubre son el mejor equilibrio."
  pt:
    metaTitle: "Qual é a melhor altura para fazer o Caminho Português? (2026)"
    metaDescription: "A melhor altura para fazer o Caminho Português em 2026: clima, gente e disponibilidade de camas mês a mês, com os prós e contras de primavera, verão, outono e inverno na rota da Costa."
    h1: "Qual é a melhor altura para fazer o Caminho Português?"
    lead: "Resposta direta: maio, junho e setembro são o ponto ideal — quentes que chegue, secos e muito mais fáceis para arranjar cama do que o verão alto. Eis o retrato honesto mês a mês para escolheres o equilíbrio que te convém."
    sections:
      - heading: "O ponto ideal: maio–junho e setembro"
        body: "💡 A primavera tardia e setembro dão dias longos, temperaturas confortáveis para caminhar (dos 17 aos 25 °C), uma comunidade peregrina animada mas não esmagadora, e camas que se encontram sem stress se saíres cedo. Para a maioria é simplesmente a melhor altura para a rota da Costa."
      - heading: "Julho–agosto: calor e muita gente"
        body: "⚠️ O verão alto traz mais peregrinos e mais calor. A costa é mais fresca do que o interior, mas as tardes podem ser cansativas e os albergues pequenos enchem mais cedo. É caminhável e divertido se saíres ao amanhecer e reservares nas noites apertadas — apenas vai com os olhos abertos quanto a gente e camas."
      - heading: "Abril e outubro: mais calmo, mais fresco, mais chuva"
        body: "Os meses de transição trocam a multidão pela hipótese de chuva e dias mais curtos. As camas são fáceis, o caminho está tranquilo e o verde galego está no auge — mas leva bom equipamento de chuva e confirma que os albergues privados pequenos abrem, já que alguns fecham fora de época."
      - heading: "Novembro–março: solidão com ressalvas"
        body: "⚡ O inverno é para quem vai preparado. Muitos albergues privados e cafés de época fecham, há pouca luz e a chuva e o vento do Atlântico são reais. Terás o caminho quase só para ti e as cidades continuam abertas, mas planeia o alojamento com cuidado e não contes que todas as aldeias tenham cama."
    faq:
      - q: "Qual é o melhor mês para fazer o Caminho Português?"
        a: "Maio, junho e setembro são o ponto ideal: quentes, quase secos, animados mas não sobrelotados e muito mais fáceis para camas do que julho–agosto. Abril e outubro são mais calmos e frescos mas mais chuvosos."
      - q: "Está demasiado calor no verão no Caminho Português?"
        a: "Julho e agosto são quentes, embora a costa seja mais fresca do que o interior. É muito caminhável se saíres ao amanhecer, levares água e descansares à tarde — mas é a época mais movimentada, por isso reserva nas noites apertadas."
      - q: "Pode fazer-se o Caminho Português no inverno?"
        a: "Sim, mas é para quem vai preparado. Muitos albergues privados e cafés fecham, os dias são curtos e a chuva e o vento atlântico são prováveis. Terás o caminho quase só para ti, mas planeia o alojamento porque nem todas as aldeias terão cama."
      - q: "Quando há menos gente no Caminho Português?"
        a: "De novembro a março é o mais tranquilo, seguido de abril e fim de outubro. Se queres solidão com clima gerível, os meses de transição de abril e outubro são o melhor equilíbrio."
