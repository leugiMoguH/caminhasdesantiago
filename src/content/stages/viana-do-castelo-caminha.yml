i18n:
  en:
    metaTitle: "Viana do Castelo to Caminha (27.8 km): Coastal Route Stage Guide + Variants (2026)"
    metaDescription: "The Viana do Castelo to Caminha stage of the Portuguese Coastal Camino: 27.8 km, both route variants (official inland vs beach boardwalks), the one climb, surfaces, where to break the stage at Vila Praia de Âncora, and how to plan the Minho crossing waiting at the end."
    h1: "Viana do Castelo → Caminha"
    lead: "One of the longest flat days on the Portuguese Coastal Camino — about 27.8 km following the Atlantic shoreline north from Viana do Castelo to Caminha, the last Portuguese town before the crossing into Spain. Long but never hard: one modest climb, ocean views most of the day, and a decision to make at the end about how you cross the Minho."
    sections:
      - heading: "Distance and difficulty"
        body: "Roughly 27.8 km (sources vary between about 26.6 and 27.8 km depending on the variant walked). There are no hard climbs — one modest rise of around 100 m mid-stage, which can feel strenuous on a hot afternoon after 14 km of walking — but the sheer length and long cobblestone sections make it a moderate day. Allow 6–8 hours at a steady pace, plus stops."
      - heading: "The two variants: official route vs the coast"
        body: "This stage has two recognised lines. The official waymarked route runs slightly inland through the parishes of Areosa and Carreço on quiet lanes and farm tracks. The coastal variant follows the Senda Litoral — boardwalks, seafront paths and the Ecovia do Litoral Norte — hugging the beaches instead. Both variants converge at Vila Praia de Âncora for the final approach to Caminha, so you cannot go far wrong; most pilgrims mix the two, taking the boardwalks where the inland route drifts away from the views."
      - heading: "Terrain and surfaces"
        body: "Much of the route runs on the Senda Litoral, the coastal boardwalk and seafront paths, joined by minor roads. Surfaces break down to roughly 16.5 km of asphalt, 8.5 km of cobblestone and 3 km of footpath. The cobbles are the quiet enemy of this stage — by late afternoon they pound tired feet — so cushioned footwear and a sock change at the halfway point help more than they sound like they would."
      - heading: "The stage, section by section"
        body: "Leaving Viana do Castelo you cross the Lima and follow the shore through Areosa and Carreço, where windmill ruins and the Montedor lighthouse — Portugal's northernmost — mark the approach to the stage's single climb. Over the rise, the route drops to the long beaches around Afife and Gelfa, with a pine-forest stretch before Vila Praia de Âncora, the natural lunch stop at roughly the 19 km mark. The final 8 km run past Moledo beach with the Minho estuary and Spanish hills ahead, arriving in Caminha's medieval square."
      - heading: "Breaking the stage at Vila Praia de Âncora"
        body: "If 28 km is more than you want, Vila Praia de Âncora splits the day cleanly: about 19 km from Viana, with a beach, restaurants, accommodation and a train station on the Minho line. Stopping there leaves a short 8–9 km morning into Caminha — and puts you at the dock early enough to catch a morning boat across to A Guarda the same day."
      - heading: "Arriving in Caminha: plan the crossing first"
        body: "The stage ends in Caminha at the mouth of the Minho river, facing A Guarda (Spain) across the water. Before you settle in, sort tomorrow's crossing: licensed water taxis run daily — roughly every 30 minutes in season, €6, about 10 minutes — but boats are small and high-season demand is real. Book online with Xacobeo Transfer or call Taxi Boat Peregrinos, then enjoy the town. Caminha rewards the evening: a compact medieval centre, the Igreja Matriz, and dinner on the square."
      - heading: "Where to sleep and eat in Caminha"
        body: "Caminha has a municipal albergue plus private hostels, guesthouses and hotels — enough beds that walk-ins work outside July and August, though the albergue fills first. Our Caminha where-to-stay and where-to-eat guides cover verified options with prices; pilgrim menus in town start around €8."
      - heading: "GPX and waymarking"
        body: "The stage is fully waymarked with the standard yellow arrows; the coastal variant additionally follows the continuous Senda Litoral/Ecovia signage, so navigation is easy even without a track. If you like a GPX backup, the AllTrails recording 'Camino Portugués Coastal: Viana do Castelo to Vila Praia de Âncora' covers the main walking line and shows the elevation profile of the mid-stage climb."
    faq:
      - q: "How long is the Viana do Castelo to Caminha stage?"
        a: "About 27.8 km on the Coastal Route, though some guides measure it at roughly 26.6 km depending on the variant. It is mostly flat, with one modest climb of around 100 m, and typically takes 6–8 hours."
      - q: "Is the Viana do Castelo to Caminha stage hard?"
        a: "It is rated moderate — not because of climbing, but because of its length and long cobblestone sections. With reasonable fitness it is comfortable, but cushioned footwear is recommended."
      - q: "Should I walk the official route or the coastal variant?"
        a: "Both work and both converge at Vila Praia de Âncora. The official route runs slightly inland through Areosa and Carreço; the coastal variant follows the Senda Litoral boardwalks along the beaches. Most pilgrims mix the two, favouring the boardwalks for the views."
      - q: "Can I split the stage somewhere?"
        a: "Yes — Vila Praia de Âncora, about 19 km from Viana do Castelo, has accommodation, restaurants and a train station. Stopping there leaves an easy 8–9 km into Caminha the next morning."
      - q: "What happens at the end of the stage in Caminha?"
        a: "Caminha sits on the Minho river opposite A Guarda, Spain. The crossing runs daily by licensed water taxi (~€6, about 10 minutes) — book ahead in season — or you can take the overland detour via Valença and Tui."
  es:
    metaTitle: "Viana do Castelo a Caminha (27,8 km): Guía de la Etapa + Variantes (2026)"
    metaDescription: "La etapa Viana do Castelo–Caminha del Camino Portugués de la Costa: 27,8 km, las dos variantes (oficial interior vs pasarelas de playa), la única subida, superficies, dónde partir la etapa en Vila Praia de Âncora y cómo planificar el cruce del Miño que espera al final."
    h1: "Viana do Castelo → Caminha"
    lead: "Uno de los días llanos más largos del Camino Portugués de la Costa — unos 27,8 km siguiendo la costa atlántica hacia el norte desde Viana do Castelo hasta Caminha, el último pueblo portugués antes del cruce a España. Largo pero nunca duro: una subida moderada, vistas al océano casi todo el día y una decisión al final sobre cómo cruzar el Miño."
    sections:
      - heading: "Distancia y dificultad"
        body: "Aproximadamente 27,8 km (las fuentes varían entre unos 26,6 y 27,8 km según la variante). No hay subidas duras — solo un repecho de unos 100 m a mitad de etapa, que puede hacerse pesado en una tarde calurosa tras 14 km — pero la longitud y los largos tramos de adoquín la convierten en una jornada moderada. Calcula 6–8 horas a buen ritmo, más las paradas."
      - heading: "Las dos variantes: ruta oficial vs costa"
        body: "Esta etapa tiene dos trazados reconocidos. La ruta oficial señalizada va ligeramente hacia el interior por las parroquias de Areosa y Carreço, por caminos tranquilos y pistas agrícolas. La variante costera sigue la Senda Litoral — pasarelas, paseos marítimos y la Ecovia do Litoral Norte — pegada a las playas. Ambas convergen en Vila Praia de Âncora para la aproximación final a Caminha, así que es difícil equivocarse; la mayoría de los peregrinos mezcla las dos, tomando las pasarelas donde la ruta interior se aleja de las vistas."
      - heading: "Terreno y superficies"
        body: "Gran parte del recorrido va por la Senda Litoral, el paseo costero y caminos junto al mar, combinados con carreteras secundarias. Las superficies son aproximadamente 16,5 km de asfalto, 8,5 km de adoquín y 3 km de sendero. El adoquín es el enemigo silencioso de esta etapa — al final de la tarde castiga los pies cansados — así que un calzado amortiguado y un cambio de calcetines a mitad de camino ayudan más de lo que parece."
      - heading: "La etapa, tramo a tramo"
        body: "Al salir de Viana do Castelo se cruza el Lima y se sigue la costa por Areosa y Carreço, donde ruinas de molinos y el faro de Montedor — el más septentrional de Portugal — anuncian la única subida de la etapa. Superado el alto, la ruta baja a las largas playas de Afife y Gelfa, con un tramo de pinar antes de Vila Praia de Âncora, la parada natural para comer hacia el km 19. Los últimos 8 km pasan por la playa de Moledo con el estuario del Miño y las colinas españolas de frente, hasta llegar a la plaza medieval de Caminha."
      - heading: "Partir la etapa en Vila Praia de Âncora"
        body: "Si 28 km son demasiados, Vila Praia de Âncora divide el día limpiamente: a unos 19 km de Viana, con playa, restaurantes, alojamiento y estación de tren en la línea del Miño. Parar allí deja una mañana corta de 8–9 km hasta Caminha — y te pone en el muelle lo bastante pronto para tomar un barco matinal a A Guarda el mismo día."
      - heading: "Llegada a Caminha: planifica primero el cruce"
        body: "La etapa termina en Caminha, en la desembocadura del Miño, frente a A Guarda (España). Antes de instalarte, resuelve el cruce de mañana: los taxi-barco autorizados operan a diario — cada 30 minutos en temporada, 6 €, unos 10 minutos — pero los barcos son pequeños y la demanda en temporada alta es real. Reserva online con Xacobeo Transfer o llama a Taxi Boat Peregrinos, y luego disfruta del pueblo: centro medieval compacto, la Igreja Matriz y cena en la plaza."
      - heading: "Dónde dormir y comer en Caminha"
        body: "Caminha tiene un albergue municipal además de hostales privados, pensiones y hoteles — suficientes camas para llegar sin reserva fuera de julio y agosto, aunque el albergue se llena primero. Nuestras guías de dónde dormir y dónde comer en Caminha cubren opciones verificadas con precios; los menús del peregrino parten de unos 8 €."
      - heading: "GPX y señalización"
        body: "La etapa está completamente señalizada con las flechas amarillas estándar; la variante costera sigue además la señalización continua de la Senda Litoral/Ecovia, así que la navegación es fácil incluso sin track. Si quieres un GPX de respaldo, la grabación de AllTrails 'Camino Portugués Coastal: Viana do Castelo to Vila Praia de Âncora' cubre el trazado principal y muestra el perfil de la subida de mitad de etapa."
    faq:
      - q: "¿Cuántos kilómetros tiene la etapa Viana do Castelo–Caminha?"
        a: "Unos 27,8 km por la Ruta de la Costa, aunque algunas guías la miden en torno a 26,6 km según la variante. Es mayormente llana, con un repecho de unos 100 m, y suele tardar 6–8 horas."
      - q: "¿Es difícil la etapa Viana do Castelo–Caminha?"
        a: "Se considera moderada — no por el desnivel, sino por su longitud y los largos tramos de adoquín. Con una forma física razonable es cómoda, pero se recomienda calzado amortiguado."
      - q: "¿Ruta oficial o variante costera?"
        a: "Ambas funcionan y convergen en Vila Praia de Âncora. La oficial va ligeramente hacia el interior por Areosa y Carreço; la costera sigue las pasarelas de la Senda Litoral junto a las playas. La mayoría mezcla las dos."
      - q: "¿Puedo partir la etapa en algún punto?"
        a: "Sí — Vila Praia de Âncora, a unos 19 km de Viana do Castelo, tiene alojamiento, restaurantes y estación de tren. Parar allí deja unos 8–9 km fáciles hasta Caminha a la mañana siguiente."
      - q: "¿Qué ocurre al final de la etapa en Caminha?"
        a: "Caminha está en el río Miño, frente a A Guarda (España). El cruce funciona a diario en taxi-barco autorizado (~6 €, unos 10 minutos) — reserva en temporada — o puedes tomar el desvío terrestre por Valença y Tui."
  pt:
    metaTitle: "Viana do Castelo a Caminha (27,8 km): Guia da Etapa + Variantes (2026)"
    metaDescription: "A etapa Viana do Castelo–Caminha do Caminho Português da Costa: 27,8 km, as duas variantes (oficial interior vs passadiços de praia), a única subida, pisos, onde dividir a etapa em Vila Praia de Âncora e como planear a travessia do Minho que espera no fim."
    h1: "Viana do Castelo → Caminha"
    lead: "Um dos dias planos mais longos do Caminho Português da Costa — cerca de 27,8 km seguindo a costa atlântica para norte, de Viana do Castelo até Caminha, a última vila portuguesa antes da travessia para Espanha. Longo mas nunca duro: uma subida moderada, vistas de oceano quase todo o dia e uma decisão no fim sobre como atravessar o Minho."
    sections:
      - heading: "Distância e dificuldade"
        body: "Aproximadamente 27,8 km (as fontes variam entre cerca de 26,6 e 27,8 km consoante a variante). Não há subidas duras — apenas uma rampa de cerca de 100 m a meio da etapa, que pode pesar numa tarde quente após 14 km — mas a extensão e os longos troços de calçada tornam-na um dia moderado. Conte com 6–8 horas a bom ritmo, mais as paragens."
      - heading: "As duas variantes: rota oficial vs costa"
        body: "Esta etapa tem dois traçados reconhecidos. A rota oficial sinalizada segue ligeiramente pelo interior, pelas freguesias de Areosa e Carreço, por caminhos tranquilos e trilhos agrícolas. A variante costeira segue a Senda Litoral — passadiços, marginais e a Ecovia do Litoral Norte — colada às praias. Ambas convergem em Vila Praia de Âncora para a aproximação final a Caminha, por isso é difícil errar; a maioria dos peregrinos mistura as duas, preferindo os passadiços onde a rota interior se afasta das vistas."
      - heading: "Terreno e pisos"
        body: "Grande parte do percurso segue a Senda Litoral, o passadiço costeiro e caminhos junto ao mar, combinados com estradas secundárias. Os pisos são cerca de 16,5 km de asfalto, 8,5 km de calçada e 3 km de trilho. A calçada é o inimigo silencioso desta etapa — ao fim da tarde castiga os pés cansados — por isso calçado amortecido e uma troca de meias a meio do caminho ajudam mais do que parece."
      - heading: "A etapa, troço a troço"
        body: "Ao sair de Viana do Castelo cruza-se o Lima e segue-se a costa por Areosa e Carreço, onde ruínas de moinhos e o farol de Montedor — o mais setentrional de Portugal — anunciam a única subida da etapa. Passado o alto, a rota desce às longas praias de Afife e da Gelfa, com um troço de pinhal antes de Vila Praia de Âncora, a paragem natural para almoço por volta do km 19. Os últimos 8 km passam pela praia de Moledo com o estuário do Minho e as colinas espanholas em frente, até à praça medieval de Caminha."
      - heading: "Dividir a etapa em Vila Praia de Âncora"
        body: "Se 28 km forem demasiados, Vila Praia de Âncora divide o dia de forma limpa: a cerca de 19 km de Viana, com praia, restaurantes, alojamento e estação de comboio na Linha do Minho. Parar aí deixa uma manhã curta de 8–9 km até Caminha — e coloca-o no cais cedo o suficiente para apanhar um barco matinal para A Guarda no mesmo dia."
      - heading: "Chegada a Caminha: planeie primeiro a travessia"
        body: "A etapa termina em Caminha, na foz do rio Minho, em frente a A Guarda (Espanha). Antes de se instalar, resolva a travessia de amanhã: os táxis fluviais licenciados operam diariamente — de 30 em 30 minutos na época alta, €6, cerca de 10 minutos — mas os barcos são pequenos e a procura na época alta é real. Reserve online com a Xacobeo Transfer ou ligue à Taxi Boat Peregrinos, e depois aproveite a vila: centro medieval compacto, a Igreja Matriz e jantar na praça."
      - heading: "Onde dormir e comer em Caminha"
        body: "Caminha tem um albergue municipal além de hostels privados, pensões e hotéis — camas suficientes para chegar sem reserva fora de julho e agosto, embora o albergue encha primeiro. Os nossos guias de onde ficar e onde comer em Caminha cobrem opções verificadas com preços; os menus do peregrino partem de cerca de €8."
      - heading: "GPX e sinalização"
        body: "A etapa está completamente sinalizada com as setas amarelas habituais; a variante costeira segue ainda a sinalização contínua da Senda Litoral/Ecovia, pelo que a navegação é fácil mesmo sem track. Se quiser um GPX de reserva, a gravação do AllTrails 'Camino Portugués Coastal: Viana do Castelo to Vila Praia de Âncora' cobre o traçado principal e mostra o perfil da subida a meio da etapa."
    faq:
      - q: "Qual a distância da etapa Viana do Castelo–Caminha?"
        a: "Cerca de 27,8 km pela Rota da Costa, embora alguns guias a meçam em torno de 26,6 km consoante a variante. É maioritariamente plana, com uma rampa de cerca de 100 m, e demora normalmente 6–8 horas."
      - q: "A etapa Viana do Castelo–Caminha é difícil?"
        a: "É considerada moderada — não pelo desnível, mas pela extensão e pelos longos troços de calçada. Com forma física razoável é confortável, mas recomenda-se calçado amortecido."
      - q: "Rota oficial ou variante costeira?"
        a: "Ambas funcionam e convergem em Vila Praia de Âncora. A oficial segue ligeiramente pelo interior por Areosa e Carreço; a costeira segue os passadiços da Senda Litoral junto às praias. A maioria mistura as duas."
      - q: "Posso dividir a etapa nalgum ponto?"
        a: "Sim — Vila Praia de Âncora, a cerca de 19 km de Viana do Castelo, tem alojamento, restaurantes e estação de comboio. Parar aí deixa 8–9 km fáceis até Caminha na manhã seguinte."
      - q: "O que acontece no fim da etapa, em Caminha?"
        a: "Caminha fica no rio Minho, em frente a A Guarda (Espanha). A travessia funciona diariamente em táxi fluvial licenciado (~€6, cerca de 10 minutos) — reserve na época alta — ou pode fazer o desvio terrestre via Valença e Tui."
