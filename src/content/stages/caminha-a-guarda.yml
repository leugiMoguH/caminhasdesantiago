i18n:
  en:
    metaTitle: "Caminha → A Guarda: How to Cross the Minho River in 2026 (€6, 10 min)"
    metaDescription: "How the Caminha to A Guarda crossing works in 2026: water taxis run daily — every 30 minutes in season — for €6, the ride takes ~10 minutes, and you walk ~1.5 km into A Guarda. Boarding point, time-zone trap, bikes, and the overland backup."
    h1: "Caminha → A Guarda (the Minho crossing)"
    lead: "This short stage is really a river crossing. There is no bridge at Caminha, so you cross the Minho by boat — about 10 minutes on the water — and then walk a little over a kilometre into A Guarda on the Spanish bank. In 2026 the crossing runs daily: two licensed water-taxi services replaced the old ferry, and a new municipal ferry is expected this summer."
    sections:
      - heading: "How the crossing works in 2026"
        body: "Two licensed operators run the crossing daily. Taxi Boat Peregrinos departs roughly every 30 minutes between 07:00 and 17:00 (€6 per person, €7 with a bicycle; bookings on +351 913 254 110 or at the dock). Xacobeo Transfer — the service backed by the Xunta de Galicia and both border municipalities — runs about hourly between 07:30 and 15:30 (€6, €8 with a bike) and sells tickets online. The ride itself takes about 10 minutes. The old Santa Rita de Cássia ferry stopped in 2020 because of river-mouth siltation and will be dismantled; a new shallow-draught municipal ferry carrying 50–60 passengers is announced for summer 2026 but is not yet operating."
      - heading: "Where you board in Caminha"
        body: "Boats leave from the Cais de Caminha on the northern edge of the old town, about 400 metres from the main square (Praça do Conselho) — walk north toward the river and the dock is signposted. There is no large terminal: boarding is informal, from the dock steps or a pontoon depending on the tide. Arrive 10–15 minutes early in high season, because some of the boats are small speedboats with space for only around six passengers, and a full boat means waiting for the next departure."
      - heading: "Booking, bikes and payment"
        body: "Booking is not mandatory but is sensible from April to October, when pilgrim traffic peaks. Xacobeo Transfer's online ticketing is the easiest guarantee of a seat; Taxi Boat Peregrinos takes phone bookings. Both operators carry bicycles for a small surcharge (€7 total with Taxi Boat Peregrinos, €8 with Xacobeo Transfer). Bring small euro notes — dock payment is usually cash, and operators rarely have change for €50."
      - heading: "The time-zone trap"
        body: "Boats run on Portuguese time, but Spain is one hour ahead. A 10:00 departure from Caminha lands you in Spain at roughly 11:10 local time. This matters more than it sounds: if you are aiming for lunch in A Guarda or a specific albergue check-in, add the lost hour to your plan. Phones usually switch automatically mid-river."
      - heading: "The walk into A Guarda"
        body: "Water taxis land at Camposancos / A Pasaxe on the Spanish side, roughly 1.5 km south of A Guarda town centre — about a 20-minute flat walk during which the yellow Camino arrows resume almost immediately. A Guarda is a working Galician fishing town with a full set of pilgrim services; the climb to the Monte de Santa Trega castro above town is the classic side trip if you have an afternoon to spare."
      - heading: "When is the crossing unreliable?"
        body: "The dependable window is April to October. In the off-season departures are fewer and cancel more easily in bad weather, and even in summer individual crossings can be dropped when the estuary is rough or heavily silted — the same assoreamento that grounded the old ferry. The rule that never fails: confirm the day's boats the evening before, online, by phone, or at your albergue."
      - heading: "If no boat is running"
        body: "When weather or siltation stops everything, the guaranteed alternative is the overland detour: train from Caminha to Valença on the CP Minho line (~35 minutes, ~€3.60), then cross the Tui–Valença international bridge on foot. This switches you from the Coastal Route to the Camino Portugués Interior — both reach Santiago. Full step-by-step in our overland detour guide."
      - heading: "Stage logistics at a glance"
        body: "Distance on foot: about 2 km including the dock approach in Caminha and the walk in from the landing. Difficulty: easy — the only real variables are boat times and the time change. Many pilgrims pair the crossing with the next walking stage to Oia (about 13 km from A Guarda) on the same day; if you crossed in the afternoon, sleeping in A Guarda and starting fresh is the more comfortable plan."
    faq:
      - q: "How do you cross from Caminha to A Guarda?"
        a: "By boat across the Minho river — there is no bridge at Caminha. Two licensed water-taxi services run daily: Taxi Boat Peregrinos (every 30 minutes, 07:00–17:00) and Xacobeo Transfer (roughly hourly, 07:30–15:30, online booking). €6 per person, about 10 minutes on the water."
      - q: "How much does the Caminha boat cost?"
        a: "€6 per person one-way with either operator. With a bicycle: €7 on Taxi Boat Peregrinos, €8 on Xacobeo Transfer."
      - q: "Do I need to book the crossing in advance?"
        a: "Not strictly, but it is recommended in high season (April–October) — some boats carry only about six passengers. Xacobeo Transfer sells tickets online; Taxi Boat Peregrinos takes bookings on +351 913 254 110."
      - q: "How far is it from the landing to A Guarda?"
        a: "Water taxis land at Camposancos / A Pasaxe, about 1.5 km — roughly a 20-minute flat walk — south of A Guarda town centre, where the Camino waymarks resume."
      - q: "Is the old Caminha ferry coming back?"
        a: "No — the Santa Rita de Cássia (stopped 2020) will be dismantled. A new shallow-draught municipal ferry carrying 50–60 passengers is announced for summer 2026 but is not yet operating."
      - q: "What if no boat is crossing?"
        a: "Take the overland detour: a train from Caminha to Valença (~35 min, ~€3.60), then walk across the Tui–Valença international bridge into Spain. This connects you to the Camino Portugués Interior."
  es:
    metaTitle: "Caminha → A Guarda: Cómo Cruzar el Río Miño en 2026 (6 €, 10 min)"
    metaDescription: "Cómo funciona el cruce Caminha–A Guarda en 2026: los taxi-barco operan a diario — cada 30 minutos en temporada — por 6 €, la travesía dura ~10 minutos y se camina ~1,5 km hasta A Guarda. Embarque, trampa horaria, bicis y la alternativa terrestre."
    h1: "Caminha → A Guarda (el cruce del Miño)"
    lead: "Esta etapa corta es en realidad un cruce de río. No hay puente en Caminha, así que se cruza el Miño en barco — unos 10 minutos sobre el agua — y luego se camina algo más de un kilómetro hasta A Guarda, en la orilla española. En 2026 el cruce funciona a diario: dos servicios de taxi-barco autorizados sustituyeron al antiguo ferry, y hay un nuevo ferry municipal previsto para este verano."
    sections:
      - heading: "Cómo funciona el cruce en 2026"
        body: "Dos operadores autorizados cruzan a diario. Taxi Boat Peregrinos sale aproximadamente cada 30 minutos entre las 07:00 y las 17:00 (6 € por persona, 7 € con bicicleta; reservas en el +351 913 254 110 o en el muelle). Xacobeo Transfer — el servicio respaldado por la Xunta de Galicia y ambos municipios fronterizos — opera más o menos cada hora entre las 07:30 y las 15:30 (6 €, 8 € con bici) y vende billetes online. La travesía dura unos 10 minutos. El antiguo ferry Santa Rita de Cássia dejó de operar en 2020 por la sedimentación de la desembocadura y será desguazado; hay un nuevo ferry municipal de poco calado para 50–60 pasajeros anunciado para el verano de 2026, pero aún no opera."
      - heading: "Dónde se embarca en Caminha"
        body: "Los barcos salen del Cais de Caminha, en el borde norte del casco antiguo, a unos 400 metros de la plaza principal (Praça do Conselho) — camina hacia el río y el muelle está señalizado. No hay terminal grande: el embarque es informal, desde las escaleras del muelle o un pantalán según la marea. Llega 10–15 minutos antes en temporada alta, porque algunos barcos son lanchas pequeñas con espacio para unos seis pasajeros, y un barco lleno significa esperar a la siguiente salida."
      - heading: "Reserva, bicis y pago"
        body: "Reservar no es obligatorio pero sí sensato de abril a octubre, cuando el tráfico de peregrinos alcanza su pico. El billete online de Xacobeo Transfer es la garantía más fácil de plaza; Taxi Boat Peregrinos acepta reservas por teléfono. Ambos operadores llevan bicicletas por un pequeño suplemento (7 € en total con Taxi Boat Peregrinos, 8 € con Xacobeo Transfer). Lleva billetes pequeños en euros — en el muelle se paga normalmente en efectivo."
      - heading: "La trampa del huso horario"
        body: "Los barcos funcionan con hora portuguesa, pero España va una hora por delante. Una salida de Caminha a las 10:00 te deja en España hacia las 11:10 hora local. Importa más de lo que parece: si apuntas a comer en A Guarda o a un check-in concreto de albergue, suma la hora perdida a tu plan. Los móviles suelen cambiar automáticamente a mitad del río."
      - heading: "La caminata hasta A Guarda"
        body: "Los taxi-barco desembarcan en Camposancos / A Pasaxe, en el lado español, a unos 1,5 km al sur del centro de A Guarda — unos 20 minutos de caminata llana en la que las flechas amarillas reaparecen casi de inmediato. A Guarda es un pueblo pesquero gallego con todos los servicios para peregrinos; la subida al castro del Monte de Santa Trega es la excursión clásica si te sobra una tarde."
      - heading: "¿Cuándo es poco fiable el cruce?"
        body: "La ventana fiable va de abril a octubre. Fuera de temporada hay menos salidas y se cancelan con más facilidad por mal tiempo, e incluso en verano pueden caerse cruces concretos cuando el estuario está agitado o muy sedimentado — el mismo assoreamento que inmovilizó al antiguo ferry. La regla que nunca falla: confirma los barcos del día la tarde anterior, online, por teléfono o en tu albergue."
      - heading: "Si no hay barco"
        body: "Cuando el tiempo o la sedimentación lo detienen todo, la alternativa garantizada es el desvío terrestre: tren de Caminha a Valença por la línea del Miño (~35 minutos, ~3,60 €) y cruzar a pie el puente internacional Tui–Valença. Esto te pasa de la Ruta de la Costa al Camino Portugués Interior — ambos llegan a Santiago."
      - heading: "Logística de la etapa de un vistazo"
        body: "Distancia a pie: unos 2 km incluyendo el acceso al muelle en Caminha y la caminata desde el desembarco. Dificultad: fácil — las únicas variables reales son los horarios de barco y el cambio de hora. Muchos peregrinos encadenan el cruce con la siguiente etapa hasta Oia (unos 13 km desde A Guarda) el mismo día; si cruzaste por la tarde, dormir en A Guarda y salir fresco es el plan más cómodo."
    faq:
      - q: "¿Cómo se cruza de Caminha a A Guarda?"
        a: "En barco por el río Miño — no hay puente en Caminha. Dos taxi-barco autorizados operan a diario: Taxi Boat Peregrinos (cada 30 minutos, 07:00–17:00) y Xacobeo Transfer (aprox. cada hora, 07:30–15:30, reserva online). 6 € por persona, unos 10 minutos."
      - q: "¿Cuánto cuesta el barco de Caminha?"
        a: "6 € por persona (ida) con cualquiera de los dos operadores. Con bicicleta: 7 € en Taxi Boat Peregrinos, 8 € en Xacobeo Transfer."
      - q: "¿Hay que reservar el cruce con antelación?"
        a: "No es obligatorio, pero sí recomendable en temporada alta (abril–octubre) — algunos barcos llevan solo unos seis pasajeros. Xacobeo Transfer vende billetes online; Taxi Boat Peregrinos acepta reservas en el +351 913 254 110."
      - q: "¿Qué distancia hay del desembarco a A Guarda?"
        a: "Los taxi-barco desembarcan en Camposancos / A Pasaxe, a unos 1,5 km — unos 20 minutos de caminata llana — al sur del centro de A Guarda, donde reaparecen las señales del Camino."
      - q: "¿Volverá el antiguo ferry de Caminha?"
        a: "No — el Santa Rita de Cássia (parado desde 2020) será desguazado. Hay un nuevo ferry municipal de poco calado para 50–60 pasajeros anunciado para el verano de 2026, pero aún no opera."
      - q: "¿Qué hago si no hay barco?"
        a: "Toma el desvío terrestre: un tren de Caminha a Valença (~35 min, ~3,60 €) y luego cruza a pie el puente internacional Tui–Valença. Esto te conecta con el Camino Portugués Interior."
  pt:
    metaTitle: "Caminha → A Guarda: Como Atravessar o Rio Minho em 2026 (€6, 10 min)"
    metaDescription: "Como funciona a travessia Caminha–A Guarda em 2026: os táxis fluviais operam diariamente — de 30 em 30 minutos na época alta — por €6, a viagem demora ~10 minutos e caminha-se ~1,5 km até A Guarda. Embarque, armadilha horária, bicicletas e a alternativa terrestre."
    h1: "Caminha → A Guarda (a travessia do Minho)"
    lead: "Esta etapa curta é, na verdade, uma travessia de rio. Não há ponte em Caminha, por isso atravessa-se o Minho de barco — cerca de 10 minutos sobre a água — e caminha-se pouco mais de um quilómetro até A Guarda, na margem espanhola. Em 2026 a travessia funciona diariamente: dois táxis fluviais licenciados substituíram o antigo ferry, e está previsto um novo ferry municipal para este verão."
    sections:
      - heading: "Como funciona a travessia em 2026"
        body: "Dois operadores licenciados atravessam diariamente. A Taxi Boat Peregrinos parte aproximadamente de 30 em 30 minutos entre as 07:00 e as 17:00 (€6 por pessoa, €7 com bicicleta; reservas pelo +351 913 254 110 ou no cais). A Xacobeo Transfer — o serviço apoiado pela Xunta de Galicia e pelos dois municípios fronteiriços — opera aproximadamente de hora em hora entre as 07:30 e as 15:30 (€6, €8 com bicicleta) e vende bilhetes online. A viagem demora cerca de 10 minutos. O antigo ferry Santa Rita de Cássia parou em 2020 devido ao assoreamento da foz e será desmantelado; está anunciado um novo ferry municipal de calado reduzido para 50–60 passageiros para o verão de 2026, mas ainda não opera."
      - heading: "Onde se embarca em Caminha"
        body: "Os barcos partem do Cais de Caminha, no limite norte do centro histórico, a cerca de 400 metros da praça principal (Praça do Conselho) — caminhe em direção ao rio e o cais está sinalizado. Não há terminal grande: o embarque é informal, pelas escadas do cais ou por um pontão consoante a maré. Chegue 10–15 minutos antes na época alta, porque alguns barcos são lanchas pequenas com espaço para cerca de seis passageiros, e um barco cheio significa esperar pela partida seguinte."
      - heading: "Reserva, bicicletas e pagamento"
        body: "Reservar não é obrigatório mas é sensato de abril a outubro, quando o tráfego de peregrinos atinge o pico. O bilhete online da Xacobeo Transfer é a garantia mais fácil de lugar; a Taxi Boat Peregrinos aceita reservas por telefone. Ambos os operadores transportam bicicletas por um pequeno suplemento (€7 no total com a Taxi Boat Peregrinos, €8 com a Xacobeo Transfer). Leve notas pequenas em euros — no cais o pagamento é normalmente em dinheiro."
      - heading: "A armadilha do fuso horário"
        body: "Os barcos funcionam com a hora portuguesa, mas a Espanha está uma hora à frente. Uma partida de Caminha às 10:00 deixa-o em Espanha por volta das 11:10 hora local. Importa mais do que parece: se aponta para almoçar em A Guarda ou para um check-in específico de albergue, some a hora perdida ao plano. Os telemóveis normalmente mudam automaticamente a meio do rio."
      - heading: "A caminhada até A Guarda"
        body: "Os táxis fluviais desembarcam em Camposancos / A Pasaxe, no lado espanhol, a cerca de 1,5 km a sul do centro de A Guarda — cerca de 20 minutos de caminhada plana, na qual as setas amarelas reaparecem quase de imediato. A Guarda é uma vila piscatória galega com todos os serviços para peregrinos; a subida ao castro do Monte de Santa Trega é o passeio clássico se sobrar uma tarde."
      - heading: "Quando é que a travessia é pouco fiável?"
        body: "A janela fiável vai de abril a outubro. Fora de época há menos partidas e cancelam-se com mais facilidade com mau tempo, e mesmo no verão travessias individuais podem cair quando o estuário está agitado ou muito assoreado — o mesmo assoreamento que imobilizou o antigo ferry. A regra que nunca falha: confirme os barcos do dia na véspera, online, por telefone ou no albergue."
      - heading: "Se não houver barco"
        body: "Quando o tempo ou o assoreamento param tudo, a alternativa garantida é o desvio terrestre: comboio de Caminha para Valença pela Linha do Minho (~35 minutos, ~€3,60) e atravessar a pé a ponte internacional Tui–Valença. Isto passa-o da Rota da Costa para o Caminho Português Interior — ambos chegam a Santiago."
      - heading: "Logística da etapa em resumo"
        body: "Distância a pé: cerca de 2 km incluindo o acesso ao cais em Caminha e a caminhada desde o desembarque. Dificuldade: fácil — as únicas variáveis reais são os horários dos barcos e a mudança de hora. Muitos peregrinos encadeiam a travessia com a etapa seguinte até Oia (cerca de 13 km desde A Guarda) no mesmo dia; se atravessou à tarde, dormir em A Guarda e partir fresco é o plano mais confortável."
    faq:
      - q: "Como se atravessa de Caminha para A Guarda?"
        a: "De barco pelo rio Minho — não há ponte em Caminha. Dois táxis fluviais licenciados operam diariamente: Taxi Boat Peregrinos (de 30 em 30 minutos, 07:00–17:00) e Xacobeo Transfer (aprox. de hora em hora, 07:30–15:30, reserva online). €6 por pessoa, cerca de 10 minutos."
      - q: "Quanto custa o barco de Caminha?"
        a: "€6 por pessoa (ida) com qualquer dos operadores. Com bicicleta: €7 na Taxi Boat Peregrinos, €8 na Xacobeo Transfer."
      - q: "É preciso reservar a travessia com antecedência?"
        a: "Não é obrigatório, mas é recomendável na época alta (abril–outubro) — alguns barcos levam apenas cerca de seis passageiros. A Xacobeo Transfer vende bilhetes online; a Taxi Boat Peregrinos aceita reservas pelo +351 913 254 110."
      - q: "Qual a distância do desembarque até A Guarda?"
        a: "Os táxis fluviais desembarcam em Camposancos / A Pasaxe, a cerca de 1,5 km — cerca de 20 minutos de caminhada plana — a sul do centro de A Guarda, onde recomeçam as marcas do Caminho."
      - q: "O antigo ferry de Caminha vai voltar?"
        a: "Não — o Santa Rita de Cássia (parado desde 2020) será desmantelado. Está anunciado um novo ferry municipal de calado reduzido para 50–60 passageiros para o verão de 2026, mas ainda não opera."
      - q: "E se não houver barco?"
        a: "Faça o desvio terrestre: um comboio de Caminha para Valença (~35 min, ~€3,60) e depois atravesse a pé a ponte internacional Tui–Valença. Isto liga-o ao Caminho Português Interior."
