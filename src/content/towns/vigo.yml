i18n:
  en:
    metaTitle: "Where to Stay in Vigo (2026): Public Albergue (93 Beds, €10) & City Guide"
    metaDescription: "Vigo, Galicia's largest city, on the Portuguese Coastal Camino. The Xunta pilgrim albergue (93 beds, €10, first-come), where to stay by neighbourhood, full city services, transport links and the onward route to Redondela."
    h1: "Vigo"
    lead: "Vigo is the largest city on the whole Portuguese Camino — a working Atlantic port of around 290,000 people at the head of its ría. After the long, mostly flat day from Baiona, it offers everything a pilgrim might need: a big, cheap public albergue, every service under one roof, and major train, bus and air links. The catch is the sprawling urban approach, where the route's waymarking is among the patchiest on the coast."
    sections:
      - heading: "Where pilgrims stay"
        body: "The headline option is the Xunta de Galicia public albergue in Ribeira do Berbés, in the old town by the port: 93 beds at €10, open all year, with disposable sheets and blankets included. It does not take reservations — beds go by order of arrival from the early afternoon — so in busy months arrive early or have a backup. Because Vigo is a full city, private hostels, guesthouses and hotels across the centre give you a guaranteed bed when the albergue is full."
      - heading: "A real city on the Camino"
        body: "Vigo is a change of pace after the small coastal towns: a granite old town climbing from the harbour, the famous oyster street (Rúa da Pescadería) where women shuck oysters at street stalls, big shops, and a seafront looking out to the Cíes Islands — a national park reachable by ferry in summer. It is the place to resupply, replace worn gear, see a pharmacy or doctor, and rest a tired body before the hills toward Redondela."
      - heading: "Transport and continuing to Redondela"
        body: "Vigo is the region's transport hub: high-speed and regional trains from Urzáiz and Vigo-Guixar (to Santiago, Pontevedra and Porto), a central bus station, and buses to Peinador airport — useful if you are starting or ending a stretch here. Walking on, the next stage climbs out of the city to Redondela, where the Coastal Route meets the Central Camino. Waymarking improves once you leave the urban edge, but a maps app helps through the streets."
    faq:
      - q: "Where can pilgrims stay in Vigo?"
        a: "The main pilgrim option is the Xunta de Galicia public albergue in Ribeira do Berbés (93 beds, €10, open all year, first-come — no reservations). As Vigo is a large city, plenty of private hostels, guesthouses and hotels across the centre offer a guaranteed bed when the albergue fills."
      - q: "Does the Vigo public albergue take reservations?"
        a: "No. The Xunta albergue assigns its 93 beds on a first-come, first-served basis from the early afternoon and does not accept advance bookings. In high season, arrive early or have a private room as a backup."
      - q: "Can I take a train or fly from Vigo?"
        a: "Yes. Vigo has two train stations — Urzáiz (high-speed) and Vigo-Guixar — with services to Santiago, Pontevedra and Porto, a central bus station, and bus links to Peinador airport. It is a common place to start, pause or finish a section of the Coastal Camino."
  es:
    metaTitle: "Dónde Dormir en Vigo (2026): Albergue Público (93 Plazas, 10 €) y Guía de la Ciudad"
    metaDescription: "Vigo, la mayor ciudad de Galicia, en el Camino Portugués de la Costa. Albergue de peregrinos de la Xunta (93 plazas, 10 €, por orden de llegada), dónde dormir por barrios, servicios, transporte y ruta hacia Redondela."
    h1: "Vigo"
    lead: "Vigo es la ciudad más grande de todo el Camino Portugués: un puerto atlántico en activo de unos 290.000 habitantes al fondo de su ría. Tras la jornada larga y casi llana desde Baiona, ofrece todo lo que un peregrino pueda necesitar: un albergue público grande y barato, todos los servicios en un mismo sitio y grandes conexiones de tren, autobús y avión. La pega es la extensa entrada urbana, donde la señalización es de las más irregulares de la costa."
    sections:
      - heading: "Dónde duermen los peregrinos"
        body: "La opción estrella es el albergue público de la Xunta de Galicia en la Ribeira do Berbés, en el casco viejo junto al puerto: 93 plazas a 10 €, abierto todo el año, con sábanas desechables y mantas incluidas. No admite reservas —las plazas se dan por orden de llegada desde primera hora de la tarde—, así que en los meses de más afluencia conviene llegar pronto o tener un plan B. Como Vigo es una ciudad completa, los hostales privados, pensiones y hoteles del centro garantizan cama cuando el albergue se llena."
      - heading: "Una ciudad de verdad en el Camino"
        body: "Vigo es un cambio de ritmo tras los pequeños pueblos costeros: un casco viejo de granito que trepa desde el puerto, la famosa calle de las ostras (Rúa da Pescadería), donde las ostreras las abren en los puestos de la calle, grandes comercios y un frente marítimo que mira a las Islas Cíes, parque nacional al que se llega en barco en verano. Es el lugar para reabastecerte, reponer equipo gastado, ver una farmacia o un médico y descansar antes de las cuestas hacia Redondela."
      - heading: "Transporte y continuar hacia Redondela"
        body: "Vigo es el nudo de transporte de la región: trenes de alta velocidad y regionales desde Urzáiz y Vigo-Guixar (a Santiago, Pontevedra y Oporto), una estación central de autobuses y buses al aeropuerto de Peinador, útil si empiezas o terminas un tramo aquí. Al seguir, la etapa siguiente sube desde la ciudad hacia Redondela, donde el Camino de la Costa se une al Central. La señalización mejora al dejar el borde urbano, pero una app de mapas ayuda entre las calles."
    faq:
      - q: "¿Dónde pueden alojarse los peregrinos en Vigo?"
        a: "La opción principal es el albergue público de la Xunta de Galicia en la Ribeira do Berbés (93 plazas, 10 €, todo el año, por orden de llegada, sin reservas). Al ser Vigo una gran ciudad, numerosos hostales, pensiones y hoteles del centro ofrecen cama asegurada cuando el albergue se llena."
      - q: "¿El albergue público de Vigo admite reservas?"
        a: "No. El albergue de la Xunta asigna sus 93 plazas por orden de llegada desde primera hora de la tarde y no acepta reservas anticipadas. En temporada alta, llega pronto o ten una habitación privada como alternativa."
      - q: "¿Puedo coger un tren o volar desde Vigo?"
        a: "Sí. Vigo tiene dos estaciones de tren —Urzáiz (alta velocidad) y Vigo-Guixar— con servicios a Santiago, Pontevedra y Oporto, una estación central de autobuses y buses al aeropuerto de Peinador. Es un lugar habitual para empezar, hacer una pausa o terminar un tramo del Camino de la Costa."
  pt:
    metaTitle: "Onde Ficar em Vigo (2026): Albergue Público (93 Camas, 10 €) e Guia da Cidade"
    metaDescription: "Vigo, a maior cidade da Galiza, no Caminho Português da Costa. Albergue de peregrinos da Xunta (93 camas, 10 €, por ordem de chegada), onde ficar por bairros, serviços, transportes e percurso até Redondela."
    h1: "Vigo"
    lead: "Vigo é a maior cidade de todo o Caminho Português: um porto atlântico em atividade de cerca de 290.000 habitantes no fundo da sua ria. Após o dia longo e quase plano desde Baiona, oferece tudo o que um peregrino possa precisar: um albergue público grande e barato, todos os serviços no mesmo sítio e grandes ligações de comboio, autocarro e avião. O senão é a extensa entrada urbana, onde a sinalização é das mais irregulares da costa."
    sections:
      - heading: "Onde os peregrinos ficam"
        body: "A opção de destaque é o albergue público da Xunta de Galicia na Ribeira do Berbés, no centro histórico junto ao porto: 93 camas a 10 €, aberto todo o ano, com lençóis descartáveis e cobertores incluídos. Não aceita reservas — as camas são dadas por ordem de chegada a partir do início da tarde —, por isso nos meses de mais afluência convém chegar cedo ou ter um plano B. Como Vigo é uma cidade completa, os hostels privados, pensões e hotéis do centro garantem cama quando o albergue enche."
      - heading: "Uma cidade a sério no Caminho"
        body: "Vigo é uma mudança de ritmo após as pequenas vilas costeiras: um centro histórico de granito que sobe desde o porto, a famosa rua das ostras (Rúa da Pescadería), onde as ostreiras as abrem nas bancas da rua, grandes lojas e uma frente marítima virada para as Ilhas Cíes, parque nacional alcançável de barco no verão. É o lugar para te reabasteceres, repor equipamento gasto, ver uma farmácia ou médico e descansar antes das subidas para Redondela."
      - heading: "Transportes e continuar para Redondela"
        body: "Vigo é o nó de transportes da região: comboios de alta velocidade e regionais desde Urzáiz e Vigo-Guixar (para Santiago, Pontevedra e Porto), uma estação central de autocarros e autocarros para o aeroporto de Peinador, úteis se começas ou terminas um troço aqui. Ao seguir, a etapa seguinte sobe da cidade para Redondela, onde o Caminho da Costa se junta ao Central. A sinalização melhora ao deixar a orla urbana, mas uma app de mapas ajuda entre as ruas."
    faq:
      - q: "Onde podem ficar os peregrinos em Vigo?"
        a: "A opção principal é o albergue público da Xunta de Galicia na Ribeira do Berbés (93 camas, 10 €, todo o ano, por ordem de chegada, sem reservas). Sendo Vigo uma grande cidade, vários hostels, pensões e hotéis do centro oferecem cama garantida quando o albergue enche."
      - q: "O albergue público de Vigo aceita reservas?"
        a: "Não. O albergue da Xunta atribui as suas 93 camas por ordem de chegada a partir do início da tarde e não aceita reservas antecipadas. Na época alta, chega cedo ou tem um quarto privado como alternativa."
      - q: "Posso apanhar um comboio ou voar de Vigo?"
        a: "Sim. Vigo tem duas estações de comboio — Urzáiz (alta velocidade) e Vigo-Guixar — com ligações a Santiago, Pontevedra e Porto, uma estação central de autocarros e autocarros para o aeroporto de Peinador. É um lugar habitual para começar, fazer uma pausa ou terminar um troço do Caminho da Costa."
