whereToStay:
  en:
    intro: "Vigo is Galicia's largest city — around 290,000 people — so beds are plentiful and varied, but the pilgrim line runs through a sprawling urban approach. The public albergue is the cheapest option but does not take reservations, so if you arrive late or want a guaranteed room, these are the areas to look at."
    areas:
      - name: "Casco Vello & Ribeira do Berbés"
        blurb: "The old maritime quarter is where the Camino arrives and where the public albergue sits, in Ribeira do Berbés by the port. Staying in the Casco Vello keeps you among the oyster bars and tapas streets, with the next morning's waymarks right outside."
        bookingQuery: "Vigo Casco Vello"
        anchor: "hotels and guesthouses in Vigo's Casco Vello"
      - name: "Around the stations (Urzáiz / Vigo-Guixar)"
        blurb: "If you are catching an early train on to Santiago or Porto, or arriving by rail, rooms near Urzáiz and Vigo-Guixar stations save a cross-city walk with a full pack — handy on a rest day or a transit stop."
        bookingQuery: "Vigo Urzaiz station"
        anchor: "stays near Vigo's train stations"
      - name: "Samil seafront"
        blurb: "The litoral variant passes Samil beach on the way in. Seafront rooms here are quieter than the centre and look out over the Cíes Islands — a calmer base if you want the bay rather than the city at your door."
        bookingQuery: "Vigo Samil beach"
        anchor: "seafront rooms near Samil beach"
  es:
    intro: "Vigo es la ciudad más grande de Galicia —unos 290.000 habitantes—, así que hay camas de sobra y variadas, pero la ruta del peregrino atraviesa una extensa entrada urbana. El albergue público es la opción más barata pero no admite reservas, así que si llegas tarde o quieres una habitación asegurada, estas son las zonas a mirar."
    areas:
      - name: "Casco Vello y Ribeira do Berbés"
        blurb: "El casco viejo marinero es por donde llega el Camino y donde está el albergue público, en la Ribeira do Berbés junto al puerto. Dormir en el Casco Vello te deja entre las ostrerías y las calles de tapas, con las flechas de la mañana a la puerta."
        bookingQuery: "Vigo Casco Vello"
        anchor: "hoteles y pensiones en el Casco Vello de Vigo"
      - name: "Junto a las estaciones (Urzáiz / Vigo-Guixar)"
        blurb: "Si vas a coger un tren temprano hacia Santiago o Oporto, o llegas en tren, las habitaciones cerca de las estaciones de Urzáiz y Vigo-Guixar te ahorran cruzar la ciudad con la mochila a cuestas: práctico en un día de descanso o una parada de tránsito."
        bookingQuery: "Vigo estación Urzaiz"
        anchor: "alojamientos cerca de las estaciones de tren de Vigo"
      - name: "Frente marítima de Samil"
        blurb: "La variante litoral pasa por la playa de Samil al entrar. Las habitaciones frente al mar son más tranquilas que el centro y miran a las Islas Cíes: una base más serena si prefieres la bahía a la ciudad en la puerta."
        bookingQuery: "Vigo playa Samil"
        anchor: "habitaciones frente al mar cerca de la playa de Samil"
  pt:
    intro: "Vigo é a maior cidade da Galiza — cerca de 290.000 habitantes —, por isso há camas de sobra e variadas, mas o percurso do peregrino atravessa uma extensa entrada urbana. O albergue público é a opção mais barata mas não aceita reservas, por isso se chegares tarde ou quiseres um quarto garantido, estas são as zonas a considerar."
    areas:
      - name: "Casco Vello e Ribeira do Berbés"
        blurb: "O casco antigo marítimo é por onde chega o Caminho e onde fica o albergue público, na Ribeira do Berbés junto ao porto. Ficar no Casco Vello deixa-te entre as ostreiras e as ruas de tapas, com as setas da manhã à porta."
        bookingQuery: "Vigo Casco Vello"
        anchor: "hotéis e pensões no Casco Vello de Vigo"
      - name: "Junto às estações (Urzáiz / Vigo-Guixar)"
        blurb: "Se vais apanhar um comboio cedo para Santiago ou Porto, ou chegas de comboio, os quartos perto das estações de Urzáiz e Vigo-Guixar poupam-te atravessar a cidade com a mochila às costas: prático num dia de descanso ou numa paragem de trânsito."
        bookingQuery: "Vigo estação Urzaiz"
        anchor: "alojamentos perto das estações de comboio de Vigo"
      - name: "Frente marítima de Samil"
        blurb: "A variante litoral passa pela praia de Samil à entrada. Os quartos à beira-mar são mais tranquilos do que o centro e olham para as Ilhas Cíes: uma base mais serena se preferes a baía à cidade à porta."
        bookingQuery: "Vigo praia Samil"
        anchor: "quartos à beira-mar perto da praia de Samil"
