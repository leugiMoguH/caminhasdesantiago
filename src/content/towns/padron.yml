whereToStay:
  en:
    intro: "Padrón is the last stop before Santiago, so its beds are in demand from pilgrims timing a final short day into the city. There is a public albergue and several private ones, plus hotels; the public albergue is cheapest but first-come, so in summer have a backup or book a private bed ahead."
    areas:
      - name: "Town centre by the river"
        blurb: "The heart of Padrón around the Santiago church and the riverside gardens keeps you among the tapas bars, the pepper stalls and the route out toward Santiago — the natural base for the last night on the Camino."
        bookingQuery: "Padron centro"
        anchor: "hotels and guesthouses in central Padrón"
      - name: "Near the station"
        blurb: "Padrón has a train station with frequent links to Santiago, so rooms nearby suit anyone planning to ride in, send luggage ahead, or start the final stage early without a cross-town walk."
        bookingQuery: "Padron estación"
        anchor: "stays near Padrón station"
  es:
    intro: "Padrón es la última parada antes de Santiago, así que sus plazas tienen demanda entre quienes calculan una corta jornada final hacia la ciudad. Hay un albergue público y varios privados, además de hoteles; el público es el más barato pero por orden de llegada, así que en verano ten un plan B o reserva una plaza privada con antelación."
    areas:
      - name: "Centro junto al río"
        blurb: "El corazón de Padrón, en torno a la iglesia de Santiago y los jardines junto al río, te deja entre los bares de tapas, los puestos de pimientos y la salida hacia Santiago: la base natural para la última noche del Camino."
        bookingQuery: "Padron centro"
        anchor: "hoteles y pensiones en el centro de Padrón"
      - name: "Junto a la estación"
        blurb: "Padrón tiene estación de tren con enlaces frecuentes a Santiago, así que las habitaciones cercanas convienen a quien piense llegar en tren, enviar la mochila por delante o empezar la etapa final temprano sin cruzar el pueblo."
        bookingQuery: "Padron estación"
        anchor: "alojamientos cerca de la estación de Padrón"
  pt:
    intro: "Padrón é a última paragem antes de Santiago, por isso as suas camas têm procura entre quem calcula uma curta jornada final até à cidade. Há um albergue público e vários privados, além de hotéis; o público é o mais barato mas por ordem de chegada, por isso no verão tem um plano B ou reserva uma cama privada com antecedência."
    areas:
      - name: "Centro junto ao rio"
        blurb: "O coração de Padrón, em redor da igreja de Santiago e dos jardins junto ao rio, deixa-te entre os bares de tapas, as bancas de pimentos e a saída para Santiago: a base natural para a última noite do Caminho."
        bookingQuery: "Padron centro"
        anchor: "hotéis e pensões no centro de Padrón"
      - name: "Junto à estação"
        blurb: "Padrón tem estação de comboio com ligações frequentes a Santiago, por isso os quartos próximos convêm a quem pense chegar de comboio, enviar a mochila à frente ou começar a etapa final cedo sem atravessar a vila."
        bookingQuery: "Padron estação"
        anchor: "alojamentos perto da estação de Padrón"
