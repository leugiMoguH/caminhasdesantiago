whereToStay:
  en:
    intro: "Oia is a tiny coastal parish, so beds are very limited and almost all are in small private albergues that take reservations — book ahead, especially May to October, because there is no large municipal hostel to fall back on. Most pilgrim accommodation sits in Viladesuso, the part of the parish the Camino passes through."
    areas:
      - name: "Viladesuso (on the route)"
        blurb: "The waymarked Camino runs through Viladesuso, where the main pilgrim albergue, a bar-restaurant and a small shop sit right on the coast. Staying here means you can eat, resupply and sleep without leaving the route."
        bookingQuery: "Viladesuso Oia"
        anchor: "guesthouses and inns in Viladesuso"
      - name: "By the monastery & Oia seafront"
        blurb: "Around the great seafront monastery the village has a handful of rooms with Atlantic views — a quiet, scenic base if you want the sound of the sea and an early start along the shore toward Baiona."
        bookingQuery: "Oia Pontevedra"
        anchor: "rooms near the Oia monastery"
  es:
    intro: "Oia es una pequeña parroquia costera, así que las plazas son muy limitadas y casi todas están en pequeños albergues privados que admiten reserva: reserva con antelación, sobre todo de mayo a octubre, porque no hay un gran albergue municipal como alternativa. La mayoría del alojamiento de peregrinos está en Viladesuso, la parte de la parroquia por la que pasa el Camino."
    areas:
      - name: "Viladesuso (en la ruta)"
        blurb: "El Camino señalizado atraviesa Viladesuso, donde el albergue de peregrinos principal, un bar-restaurante y una pequeña tienda están justo en la costa. Dormir aquí te permite comer, reabastecerte y descansar sin salir de la ruta."
        bookingQuery: "Viladesuso Oia"
        anchor: "pensiones y posadas en Viladesuso"
      - name: "Junto al monasterio y el frente marítimo de Oia"
        blurb: "En torno al gran monasterio frente al mar, el pueblo tiene unas pocas habitaciones con vistas al Atlántico: una base tranquila y con encanto si quieres el sonido del mar y un comienzo temprano por la costa rumbo a Baiona."
        bookingQuery: "Oia Pontevedra"
        anchor: "habitaciones cerca del monasterio de Oia"
  pt:
    intro: "Oia é uma pequena paróquia costeira, por isso as camas são muito limitadas e quase todas estão em pequenos albergues privados que aceitam reserva: reserva com antecedência, sobretudo de maio a outubro, porque não há um grande albergue municipal como alternativa. A maioria do alojamento de peregrinos fica em Viladesuso, a parte da paróquia por onde passa o Caminho."
    areas:
      - name: "Viladesuso (no percurso)"
        blurb: "O Caminho sinalizado atravessa Viladesuso, onde o albergue de peregrinos principal, um bar-restaurante e uma pequena loja ficam mesmo na costa. Ficar aqui permite-te comer, reabastecer e descansar sem sair do percurso."
        bookingQuery: "Viladesuso Oia"
        anchor: "pensões e estalagens em Viladesuso"
      - name: "Junto ao mosteiro e à frente marítima de Oia"
        blurb: "Em redor do grande mosteiro à beira-mar, a aldeia tem alguns quartos com vista para o Atlântico: uma base tranquila e cénica se queres o som do mar e uma partida cedo pela costa em direção a Baiona."
        bookingQuery: "Oia Pontevedra"
        anchor: "quartos perto do mosteiro de Oia"
