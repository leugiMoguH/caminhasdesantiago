whereToStay:
  en:
    intro: "Baiona is compact, so almost anywhere puts you within a short walk of the Camino. The trade-off is beds: the town has only private albergues — no municipal one — and fills fast in July and August, so book ahead in summer. These are the areas pilgrims choose between."
    areas:
      - name: "Old town & Monterreal fortress"
        blurb: "The historic core wrapped around the Monterreal peninsula has the most character — narrow streets, the seafront promenade and the morning arrows all start here. Staying in the casco histórico means restaurants and the next day's route are on your doorstep."
        bookingQuery: "Baiona old town"
        anchor: "guesthouses and small hotels in Baiona's old town"
      - name: "Seafront & Praia Ladeira"
        blurb: "East of the centre the long Ladeira beach and Sabarís promenade offer quieter, often better-value rooms with sea views — a relaxed end to the hilly day from Oia, and you rejoin the waymarks along the bay next morning."
        bookingQuery: "Baiona Praia Ladeira"
        anchor: "seafront stays near Praia Ladeira"
      - name: "Parador de Baiona"
        blurb: "For a rest-day splurge, the state-run Parador sits inside the fortress walls on its own peninsula with Atlantic views all round — the standout address in town if you want one memorable night off the bunk."
        bookingQuery: "Parador de Baiona"
        anchor: "the Parador de Baiona inside the fortress"
  es:
    intro: "Baiona es compacta, así que casi cualquier alojamiento te deja a pocos minutos a pie del Camino. El punto débil son las plazas: el pueblo solo tiene albergues privados —no hay municipal— y se llenan rápido en julio y agosto, así que reserva con antelación en verano. Estas son las zonas entre las que eligen los peregrinos."
    areas:
      - name: "Casco histórico y fortaleza de Monterreal"
        blurb: "El casco antiguo en torno a la península de Monterreal es el de más encanto: callejuelas, el paseo marítimo y las flechas de la mañana arrancan aquí. Dormir en el casco histórico deja los restaurantes y la ruta del día siguiente a un paso."
        bookingQuery: "Baiona casco histórico"
        anchor: "pensiones y hoteles pequeños en el casco histórico de Baiona"
      - name: "Frente marítima y Praia Ladeira"
        blurb: "Al este del centro, la larga playa de Ladeira y el paseo de Sabarís ofrecen habitaciones más tranquilas y a menudo de mejor precio, con vistas al mar: un final relajado tras la etapa con cuestas desde Oia, y al día siguiente retomas las marcas junto a la bahía."
        bookingQuery: "Baiona Praia Ladeira"
        anchor: "alojamientos frente al mar cerca de Praia Ladeira"
      - name: "Parador de Baiona"
        blurb: "Para un capricho de día de descanso, el Parador estatal se alza dentro de las murallas de la fortaleza, en su propia península con vistas atlánticas en todas direcciones: la dirección más especial del pueblo si quieres una noche memorable fuera de la litera."
        bookingQuery: "Parador de Baiona"
        anchor: "el Parador de Baiona dentro de la fortaleza"
  pt:
    intro: "Baiona é compacta, por isso quase qualquer alojamento te deixa a poucos minutos a pé do Caminho. O ponto fraco são as camas: a vila só tem albergues privados — não há municipal — e enchem depressa em julho e agosto, por isso reserva com antecedência no verão. Estas são as zonas entre as quais os peregrinos escolhem."
    areas:
      - name: "Centro histórico e fortaleza de Monterreal"
        blurb: "O centro histórico em redor da península de Monterreal é o de mais carácter: ruas estreitas, o passeio marítimo e as setas da manhã começam aqui. Ficar no casco histórico deixa os restaurantes e o percurso do dia seguinte à porta."
        bookingQuery: "Baiona centro histórico"
        anchor: "pensões e pequenos hotéis no centro histórico de Baiona"
      - name: "Frente marítima e Praia Ladeira"
        blurb: "A leste do centro, a longa praia da Ladeira e o passeio de Sabarís oferecem quartos mais tranquilos e muitas vezes com melhor preço, com vista de mar: um final relaxado após a etapa com subidas desde Oia, e no dia seguinte voltas às marcas junto à baía."
        bookingQuery: "Baiona Praia Ladeira"
        anchor: "alojamentos à beira-mar perto da Praia Ladeira"
      - name: "Parador de Baiona"
        blurb: "Para um mimo de dia de descanso, o Parador estatal ergue-se dentro das muralhas da fortaleza, na sua própria península com vistas atlânticas em todas as direções: a morada mais especial da vila se quiseres uma noite memorável fora do beliche."
        bookingQuery: "Parador de Baiona"
        anchor: "o Parador de Baiona dentro da fortaleza"
