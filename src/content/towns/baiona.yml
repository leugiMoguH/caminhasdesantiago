i18n:
  en:
    metaTitle: "Where to Stay in Baiona (2026): Best Pilgrim Albergues in the Fortress Town"
    metaDescription: "Baiona, Galicia: the seaside fortress town on the Portuguese Coastal Camino between Oia and Vigo. Private pilgrim albergues (Estela do Mar 28 beds, Baionamar 18 beds), where to stay, services and onward route."
    h1: "Baiona"
    lead: "Baiona is a handsome seaside town on the Galician coast, the end of the hilly stage from Oia and a favourite overnight on the Portuguese Coastal Camino. Wrapped around the Monterreal fortress — now a Parador — it is famous as the first place in Europe to learn that Columbus had reached the New World, when the caravel Pinta sailed in here in March 1493."
    sections:
      - heading: "Where pilgrims stay"
        body: "Unlike A Guarda or Vigo, Baiona has no municipal albergue — pilgrim beds are in two private albergues. Estela do Mar is open all year with 28 beds (about €18–21 in the dormitory, plus a few private rooms) and sits 100 m from the old town. Hostel Baionamar has 18 beds (about €17–21) and opens 1 March to 31 October. Both are small, so in July and August it pays to reserve ahead; otherwise the town's hotels and guesthouses fill the gap."
      - heading: "What to see while you are here"
        body: "Walk the walls of the Monterreal fortress around the peninsula for sweeping Atlantic views, see the replica of the caravel Pinta moored in the harbour, and wander the arcaded streets of the old town. It is a genuine resort town of around 12,000, busiest in summer, with a long seafront and good seafood."
      - heading: "Continuing to Vigo"
        body: "From Baiona the Coastal Camino follows the bay north toward Vigo — a long but mostly flat day past the Ramallosa Roman bridge and the beaches of Playa América and Samil. Remember that Spain runs one hour ahead of Portugal, and that waymarking gets patchy on the urban approach into Vigo, so start early."
    faq:
      - q: "Where can pilgrims stay in Baiona?"
        a: "In two private albergues: Estela do Mar (28 beds, about €18–21, open all year) and Hostel Baionamar (18 beds, about €17–21, open 1 March–31 October). Baiona has no municipal albergue, so book ahead in July and August or fall back on the town's hotels and guesthouses."
      - q: "Does Baiona have a municipal pilgrim albergue?"
        a: "No. Unlike A Guarda and Vigo, Baiona's pilgrim beds are all in private albergues. That means fewer beds overall, so reserving ahead in high summer is wise."
      - q: "Why is Baiona famous?"
        a: "It was the first place in Europe to hear that Columbus had reached the Americas — the caravel Pinta arrived in Baiona in March 1493. A full-size replica is moored in the harbour, and the Monterreal fortress on the peninsula is now a Parador hotel."
  es:
    metaTitle: "Dónde Dormir en Baiona (2026): Mejores Albergues de Peregrinos junto a la Fortaleza"
    metaDescription: "Baiona, Galicia: la villa marinera con fortaleza en el Camino Portugués de la Costa entre Oia y Vigo. Albergues privados de peregrinos (Estela do Mar 28 plazas, Baionamar 18 plazas), dónde dormir, servicios y ruta."
    h1: "Baiona"
    lead: "Baiona es una elegante villa marinera de la costa gallega, final de la etapa con cuestas desde Oia y una de las paradas favoritas del Camino Portugués de la Costa. Abrazada a la fortaleza de Monterreal —hoy Parador—, es famosa por ser el primer lugar de Europa en saber que Colón había llegado al Nuevo Mundo, cuando la carabela Pinta arribó aquí en marzo de 1493."
    sections:
      - heading: "Dónde duermen los peregrinos"
        body: "A diferencia de A Guarda o Vigo, Baiona no tiene albergue municipal: las plazas de peregrino están en dos albergues privados. Estela do Mar abre todo el año con 28 plazas (unos 18–21 € en litera, más algunas habitaciones privadas) y está a 100 m del casco antiguo. Hostel Baionamar tiene 18 plazas (unos 17–21 €) y abre del 1 de marzo al 31 de octubre. Ambos son pequeños, así que en julio y agosto conviene reservar; si no, los hoteles y pensiones del pueblo cubren el resto."
      - heading: "Qué ver mientras estás aquí"
        body: "Recorre las murallas de la fortaleza de Monterreal por la península para disfrutar de amplias vistas atlánticas, contempla la réplica de la carabela Pinta amarrada en el puerto y pasea por las calles soportaladas del casco antiguo. Es una auténtica villa turística de unos 12.000 habitantes, con su momento álgido en verano, con un largo paseo marítimo y buen marisco."
      - heading: "Continuar hacia Vigo"
        body: "Desde Baiona el Camino de la Costa sigue la bahía hacia el norte rumbo a Vigo: una jornada larga pero casi llana, pasando el puente romano de A Ramallosa y las playas de Playa América y Samil. Recuerda que España va una hora por delante de Portugal y que la señalización se vuelve irregular en la entrada urbana a Vigo, así que sal temprano."
    faq:
      - q: "¿Dónde pueden alojarse los peregrinos en Baiona?"
        a: "En dos albergues privados: Estela do Mar (28 plazas, unos 18–21 €, todo el año) y Hostel Baionamar (18 plazas, unos 17–21 €, del 1 de marzo al 31 de octubre). Baiona no tiene albergue municipal, así que reserva en julio y agosto o recurre a los hoteles y pensiones del pueblo."
      - q: "¿Tiene Baiona albergue municipal de peregrinos?"
        a: "No. A diferencia de A Guarda y Vigo, las plazas de peregrino de Baiona están todas en albergues privados. Eso significa menos camas en total, por lo que conviene reservar con antelación en pleno verano."
      - q: "¿Por qué es famosa Baiona?"
        a: "Fue el primer lugar de Europa en saber que Colón había llegado a América: la carabela Pinta arribó a Baiona en marzo de 1493. En el puerto está amarrada una réplica a tamaño real, y la fortaleza de Monterreal, en la península, es hoy un Parador."
