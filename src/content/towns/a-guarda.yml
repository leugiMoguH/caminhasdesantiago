      - heading: "Serviços na vila"
        body: "Como localidade de cerca de 10.000 habitantes, A Guarda tem restaurantes e cafés, supermercados, multibancos e farmácia. Carimbe a sua credencial no albergue e lembre-se de que a Espanha está uma hora à frente de Portugal."
      - heading: "Continuar o Caminho"
        body: "A partir de A Guarda as setas amarelas seguem para norte pela costa galega em direção a Oia e Baiona. O primeiro troço acompanha a linha de costa antes de subir para o interior."
    faq:
      - q: "Onde podem ficar os peregrinos em A Guarda?"
        a: "O Albergue de Peregrinos de A Guarda (municipal, 36 camas, 10 €, todo o ano) e o Albergue O Peirao (privado, 16 camas, 15–17 €, de 1 de abril a 30 de outubro)."
      - q: "Como se chega a A Guarda no Caminho da Costa?"
        a: "Atravessando o rio Minho a partir de Caminha (Portugal) — atualmente de táxi fluvial, já que o ferry oficial está suspenso — e caminhando cerca de 1,5 km desde o desembarque de Camposancos até A Guarda."
      - q: "A Guarda tem lojas e multibancos?"
        a: "Sim. A Guarda é uma vila de cerca de 10.000 habitantes com restaurantes, supermercados, multibancos e farmácia, além de carimbos no albergue de peregrinos."
