whereToStay:
  en:
    intro: "Redondela is the junction town where the Coastal Camino rejoins the Central Portuguese route, so it sees plenty of pilgrims and has both a public and several private albergues. The public Casa da Torre is central but does not take bookings; if you want a guaranteed bed or arrive late, the private albergues and the town's small hotels are the answer."
    areas:
      - name: "Historic centre (Praza de Ribadavia)"
        blurb: "The old core around Praza de Ribadavia holds the Casa da Torre albergue, the arrows, the bars and the morning route out of town — the obvious place to stay so everything is on foot."
        bookingQuery: "Redondela centro"
        anchor: "small hotels and guesthouses in central Redondela"
      - name: "Near the station & viaducts"
        blurb: "If you plan to train on to Pontevedra or Vigo, rooms near the station and the great railway viaducts save a walk with your pack and put you a step ahead for an early departure."
        bookingQuery: "Redondela estación"
        anchor: "stays near Redondela station"
  es:
    intro: "Redondela es el pueblo de cruce donde el Camino de la Costa se reúne con la ruta Central portuguesa, así que ve pasar a muchos peregrinos y tiene un albergue público y varios privados. El público Casa da Torre es céntrico pero no admite reservas; si quieres cama asegurada o llegas tarde, la respuesta son los albergues privados y los pequeños hoteles del pueblo."
    areas:
      - name: "Casco histórico (Praza de Ribadavia)"
        blurb: "El casco antiguo en torno a la Praza de Ribadavia reúne el albergue Casa da Torre, las flechas, los bares y la salida de la mañana: el sitio lógico para alojarse y tenerlo todo a pie."
        bookingQuery: "Redondela centro"
        anchor: "pequeños hoteles y pensiones en el centro de Redondela"
      - name: "Junto a la estación y los viaductos"
        blurb: "Si piensas seguir en tren a Pontevedra o Vigo, las habitaciones cerca de la estación y los grandes viaductos ferroviarios te ahorran caminar con la mochila y te dejan listo para salir temprano."
        bookingQuery: "Redondela estación"
        anchor: "alojamientos cerca de la estación de Redondela"
  pt:
    intro: "Redondela é a vila de cruzamento onde o Caminho da Costa se junta à rota Central portuguesa, por isso vê passar muitos peregrinos e tem um albergue público e vários privados. O público Casa da Torre é central mas não aceita reservas; se queres cama garantida ou chegas tarde, a resposta são os albergues privados e os pequenos hotéis da vila."
    areas:
      - name: "Centro histórico (Praza de Ribadavia)"
        blurb: "O centro antigo em redor da Praza de Ribadavia reúne o albergue Casa da Torre, as setas, os bares e a saída da manhã: o sítio lógico para ficar e ter tudo a pé."
        bookingQuery: "Redondela centro"
        anchor: "pequenos hotéis e pensões no centro de Redondela"
      - name: "Junto à estação e aos viadutos"
        blurb: "Se pensas seguir de comboio para Pontevedra ou Vigo, os quartos perto da estação e dos grandes viadutos ferroviários poupam-te caminhar com a mochila e deixam-te pronto para partir cedo."
        bookingQuery: "Redondela estação"
        anchor: "alojamentos perto da estação de Redondela"
