whereToStay:
  en:
    intro: "Pontevedra is a real rest-day city with one of the finest car-free old towns in Spain, so accommodation is plentiful — from the public albergue to small hostels and hotels among the granite squares. The public albergue is cheapest but does not take bookings; the old town is where most pilgrims want to be."
    areas:
      - name: "Zona monumental (car-free old town)"
        blurb: "The pedestrianised old town — Praza da Leña, the Pilgrim Virgin church, dozens of tapas bars — is the heart of Pontevedra and where small hostels and characterful hotels cluster. Stay here and you step out of your door into the best of the city."
        bookingQuery: "Pontevedra casco antiguo"
        anchor: "hotels and hostels in Pontevedra's old town"
      - name: "Near the stations"
        blurb: "If you are taking the train on to Caldas or Santiago, or arriving by rail, rooms near the combined train and bus station save a cross-city walk with a full pack — handy for an early start or a transit night."
        bookingQuery: "Pontevedra estación"
        anchor: "stays near Pontevedra's train and bus station"
  es:
    intro: "Pontevedra es una auténtica ciudad para un día de descanso, con uno de los mejores cascos antiguos peatonales de España, así que el alojamiento abunda: desde el albergue público hasta pequeños hostales y hoteles entre las plazas de granito. El albergue público es el más barato pero no admite reservas; el casco antiguo es donde la mayoría de los peregrinos quiere estar."
    areas:
      - name: "Zona monumental (casco peatonal)"
        blurb: "El casco antiguo peatonal —Praza da Leña, la iglesia de la Virgen Peregrina, decenas de bares de tapas— es el corazón de Pontevedra y donde se concentran los pequeños hostales y hoteles con encanto. Aloja aquí y sales por la puerta a lo mejor de la ciudad."
        bookingQuery: "Pontevedra casco antiguo"
        anchor: "hoteles y hostales en el casco antiguo de Pontevedra"
      - name: "Junto a las estaciones"
        blurb: "Si vas a seguir en tren a Caldas o Santiago, o llegas en tren, las habitaciones cerca de la estación conjunta de tren y autobús te ahorran cruzar la ciudad con la mochila: práctico para salir temprano o pasar una noche de tránsito."
        bookingQuery: "Pontevedra estación"
        anchor: "alojamientos cerca de la estación de Pontevedra"
  pt:
    intro: "Pontevedra é uma autêntica cidade para um dia de descanso, com um dos melhores centros antigos pedonais de Espanha, por isso o alojamento abunda: desde o albergue público a pequenos hostels e hotéis entre as praças de granito. O albergue público é o mais barato mas não aceita reservas; o centro antigo é onde a maioria dos peregrinos quer estar."
    areas:
      - name: "Zona monumental (centro pedonal)"
        blurb: "O centro antigo pedonal —Praza da Leña, a igreja da Virgem Peregrina, dezenas de bares de tapas— é o coração de Pontevedra e onde se concentram os pequenos hostels e hotéis com carácter. Fica aqui e sais à porta para o melhor da cidade."
        bookingQuery: "Pontevedra centro histórico"
        anchor: "hotéis e hostels no centro antigo de Pontevedra"
      - name: "Junto às estações"
        blurb: "Se vais seguir de comboio para Caldas ou Santiago, ou chegas de comboio, os quartos perto da estação conjunta de comboio e autocarro poupam-te atravessar a cidade com a mochila: prático para partir cedo ou passar uma noite de trânsito."
        bookingQuery: "Pontevedra estação"
        anchor: "alojamentos perto da estação de Pontevedra"
