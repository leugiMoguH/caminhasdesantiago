      metaTitle: "Horario del Ferry Caminha–A Guarda 2026: Precios y Taxi-Barco"
      metaDescription: "Actualizado junio 2026. Varios barcos autorizados cruzan el Miño a diario: desde cada 30 minutos, 6 € por persona (7–8 € con bici), reserva online disponible. Nuevo ferry municipal previsto este verano — detalles, horarios y la ruta alternativa terrestre."
