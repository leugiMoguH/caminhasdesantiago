      faq:
        - q: "¿Cuánto cuesta el cruce de Caminha a A Guarda?"
          a: "El ferry oficial Santa Rita de Cássia (2,50 € por adulto) está suspendido desde 2023 por la sedimentación del río. El cruce en funcionamiento es ahora el taxi-marítimo Xacobeo Transfer: aproximadamente 6 € por persona (ida), u 8 € con bicicleta. Pescadores locales también operan taxis-marítimos informales por unos 5–6 € por persona."
        - q: "¿Está funcionando el ferry de Caminha?"
          a: "El ferry regular Santa Rita de Cássia está suspendido (desde 2023) por el assoreamento — la sedimentación en la desembocadura del Miño. Los cruces se realizan mediante el servicio Xacobeo Transfer y taxis-marítimos de pescadores, pero sin horario fijo. Confirma siempre la tarde anterior."
        - q: "¿Qué es el problema del assoreamento en el ferry de Caminha?"
          a: "El assoreamento es la acumulación de arena y sedimentos en la desembocadura del Miño. Cuando es importante, la Santa Rita de Cássia no puede atracar, por lo que el ferry regular está suspendido. Embarcaciones de menor calado (Xacobeo Transfer, Xávegas) sí pueden cruzar."
        - q: "¿Qué alternativas hay para cruzar a A Guarda?"
          a: "Dos opciones: (1) Taxi-marítimo — Xacobeo Transfer (~6 €, 8 € con bici) o barcas informales de pescadores (~5–6 € por persona); contacta con la oficina de turismo de Caminha (+351 258 921 952) para los operadores actuales. (2) Desvío terrestre por Valença–Tui: tren CP de Caminha a Valença (~35 min, ~3,60 €) y cruzar a pie el puente internacional Tui–Valença (1,5 km) hacia el Camino Portugués Interior."
        - q: "¿Cómo ir de Caminha a A Guarda en tren?"
          a: "No hay tren directo. Toma el CP Linha do Minho de Caminha a Valença (~35 min, ~3,60 €), camina ~1 km hasta el Puente Internacional Valença–Tui y cruza a pie a Tui (España, ~25 min). Desde Tui sigue el Camino Portugués Interior o toma un taxi a A Guarda (~30 km). Este percurso cambia de la Ruta Costera a la Interior."
      trainDetour:
