caminha-a-guarda:
  # ── Language-neutral facts (single source of truth) ──────────────────────────
  # Crossing operates daily via several licensed water-taxi services. The official
  # Santa Rita de Cássia ferry stopped in 2020; a new municipal ferry is
  # announced for summer 2026 but not yet operating.
  status: running
  lastVerified: "2026-06-12"
  crossingMinutes: 10

  route:
    fromTown: Caminha
    fromCountry: PT
    fromDock: Cais de Caminha
    fromPostalCode: "4910"
    toTown: A Guarda
    toCountry: ES
    toLanding: Camposancos

  geo:
    lat: 41.8734
    lng: -8.8358

  # Primary recommended crossing (online booking available).
  currentCrossing:
    mode: water-taxi
    operator: Xacobeo Transfer
    url: https://xacobeotransfer.com
    adultEUR: 6
    bikeEUR: 8
    note: Crossing backed by the Xunta de Galicia, Concello da Guarda and Câmara Municipal de Caminha. Runs daily, including Mondays.

  # Main licensed operators running the 2026 season (other boats also cross).
  scheduledOperators:
    - name: Taxi Boat Peregrinos
      frequency: every-30-min
      hours: "07:00–17:00"
      adultEUR: 6
      bikeEUR: 7
      phone: "+351913254110"
      url: https://taxiboatperegrinos.com
      booking: phone-or-dock
    - name: Xacobeo Transfer
      frequency: hourly
      hours: "07:30–15:30"
      adultEUR: 6
      bikeEUR: 8
      url: https://xacobeotransfer.com
      booking: online
      note: Official-backed service since April 2022. Daily, including Mondays. Online tickets.
    - name: Taxi Mar Caminha
      frequency: daily
      hours: "All year (winter ~1 departure/day)"
      adultEUR: 6
      bikeEUR: 7
      phone: "+351915955827"
      url: https://www.taximarcaminha.com
      booking: online
      note: Authorized year-round service from Bar do Ferry (Av. Dr. Dantas Carneiro) to Camposancos. Online booking; e-bike €10.

  # Historical official ferry — stopped 2020, vessel to be dismantled.
  officialFerry:
    vessel: Santa Rita de Cássia
    stoppedSince: "2020"
    fares:
      - { key: adult,     priceEUR: 2.50 }
      - { key: child0_4,  priceEUR: 0 }
      - { key: child4_12, priceEUR: 1.50 }
      - { key: bicycle,   priceEUR: 1.50 }
      - { key: return,    priceEUR: 5.00 }

  # Announced municipal replacement (Câmara de Caminha, Dec 2025 / May 2026).
  upcomingFerry:
    expectedSeason: "Summer 2026"
    capacityPassengers: "50–60"
    status: announced
    note: Shallow-draught vessel suited to the silted river mouth. Municipality budgeted dock repair and dredging (~€30–40k). The Santa Rita de Cássia will be dismantled, not returned to service.

  # Additional water-taxi operators (no fixed published timetable — confirm direct).
  operators:
    - { name: "Popeye the Sailor Man (taxi boat)", phone: "+351925880712" }
    - { name: 'Taxi Mar "Pauco"',  phone: "+351917217568" }
    - { name: 'Taximar "Nuno"',    phone: "+351914532531" }
    - { name: "Mário Taxi Mar",    phone: "+351919237021" }

  contacts:
    touristOfficePhone: "+351258921952"
    camaraPhone: "+351258919400"
    ferryOperatorPhone: "+351258921000"
    ferryOperatorAddress: "Cais de Caminha, 4910 Caminha"

  # ── Translatable structured strings (NOT long-form prose) ────────────────────
  i18n:
    en:
      metaTitle: "Caminha to A Guarda Ferry Timetable 2026: Times, Prices & Water Taxi"
      metaDescription: "Updated June 2026. Several licensed boats cross the Minho daily: from every 30 minutes, €6 per person (€7–8 with bike), online booking available. New municipal ferry expected this summer — full details, timetables and the overland backup route."
      breadcrumb:
        - { name: Home, item: "/en/" }
        - { name: Caminha Guide, item: "/en/caminha-guide/" }
        - { name: Ferry & Logistics, item: "/en/caminha/ferry-and-logistics/" }
      keyFacts:
        - { value: "~10 min", label: "Crossing time" }
        - { value: "€6", label: "Per person (one-way)" }
        - { value: "Daily", label: "Water taxis, every 30 min" }
        - { value: "Summer 2026", label: "New ferry expected" }
      operatorLabels:
        operator: "Operator"
        frequency: "Frequency"
        hours: "Hours"
        price: "Price"
        bike: "With bike"
        booking: "Booking"
        every-30-min: "Every 30 minutes"
        hourly: "Hourly"
        daily: "Daily (reduced in winter)"
        online: "Online (website)"
        phone-or-dock: "Phone or at the dock"
      fareLabels:
        adult: "Adult (one-way)"
        child0_4: "Child under 4"
        child4_12: "Child 4–12"
        bicycle: "Bicycle"
        return: "Return ticket"
      fareNotes:
        adult: "Historical fare — vessel stopped in 2020"
        child0_4: "No seat allocation"
        child4_12: "ID or passport could be requested"
        bicycle: "Additional charge on top of passenger fare"
        return: "Slight saving vs two singles"
      tips:
        - "In high season (April–October) boats fill fast — book Xacobeo Transfer online or call Taxi Boat Peregrinos the day before."
        - "Boats run on Portuguese time; Spain is one hour ahead. A 10:00 departure lands in Spain at ~11:10 local time."
        - "Carry small euro notes — dock payment is often cash."
        - "Crossing can be choppy in autumn — secure loose items on your pack."
        - "Your credencial can get a special crossing stamp on request."
        - "If weather stops all boats, the Valença–Tui train detour is always available."
      faq:
        - q: "Is the Caminha ferry running?"
          a: "The old Santa Rita de Cássia ferry stopped in 2020 and will be dismantled, but the crossing itself operates daily. Several licensed water-taxi services run it, including Taxi Boat Peregrinos / Capitão Mário (every 30 minutes, 07:00–17:00, Apr–Oct), Xacobeo Transfer (roughly hourly, online booking, year-round), Taxi Mar Caminha and Popeye the Sailor Man. A new municipal ferry is expected in summer 2026."
        - q: "How much does the Caminha to A Guarda crossing cost?"
          a: "€6 per person one-way with the main operators. With a bicycle it is about €7–8 (e-bikes can be more). The crossing takes about 10 minutes."
        - q: "Do I need to book the Caminha boat in advance?"
          a: "Not strictly, but it is recommended in high season — some boats carry only around six passengers. Xacobeo Transfer sells tickets online; Taxi Boat Peregrinos takes bookings by phone (+351 913 254 110) or at the dock."
        - q: "Can I take a bike across from Caminha to A Guarda?"
          a: "Yes. The operators carry bicycles for a small surcharge — typically €7 with Taxi Boat Peregrinos or Taxi Mar Caminha, €8 with Xacobeo Transfer (electric bikes can cost more)."
        - q: "What is the new Caminha ferry planned for 2026?"
          a: "The Câmara Municipal de Caminha announced a new shallow-draught ferry with capacity for roughly 50–60 passengers, expected for summer 2026. The municipality has budgeted dock repair and dredging. Until it launches, the water taxis remain the operating crossing."
        - q: "What are the alternatives if no boat is crossing?"
          a: "Take the overland detour: the CP Minho line train from Caminha to Valença (~35 min, ~€3.60), then walk 1.5 km across the international Tui–Valença bridge into Spain. This switches you from the Coastal Route to the Camino Portugués Interior."
      trainDetour:
        - { from: Caminha, to: "Viana do Castelo", duration: "~20 min", fare: "€2.50", frequency: "Hourly (weekdays)" }
        - { from: "Viana do Castelo", to: "Valença", duration: "~55 min", fare: "€3.60 (Caminha→Valença direct)", frequency: "Roughly hourly on weekdays; reduced weekends" }
        - { from: "Valença", to: "Tui (walk)", duration: "~25 min on foot", fare: "Free", frequency: "Bridge open 24/7" }
