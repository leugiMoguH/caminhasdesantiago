      faq:
        - q: "Quanto custa a travessia de Caminha para A Guarda?"
          a: "O ferry oficial Santa Rita de Cássia (€2,50 por adulto) está suspenso desde 2023 devido ao assoreamento do rio. A travessia em funcionamento é agora o táxi fluvial Xacobeo Transfer: aproximadamente €6 por pessoa (ida), ou €8 com bicicleta. Pescadores locais também operam táxis fluviais informais por cerca de €5–6 por pessoa."
        - q: "O ferry de Caminha está a funcionar?"
          a: "O ferry regular Santa Rita de Cássia está suspenso (desde 2023) devido ao assoreamento — a sedimentação na foz do rio Minho. As travessias fazem-se através do serviço Xacobeo Transfer e de táxis fluviais de pescadores, mas sem horário fixo. Confirme sempre na véspera."
        - q: "O que é o problema do assoreamento no ferry de Caminha?"
          a: "O assoreamento é a acumulação de areia e sedimentos na foz do rio Minho. Quando é grave, a Santa Rita de Cássia não consegue atracar, pelo que o ferry regular está suspenso. Embarcações de menor calado (Xacobeo Transfer, Xávegas) ainda conseguem atravessar."
        - q: "Quais são as alternativas para atravessar para A Guarda?"
          a: "Duas opções: (1) Táxi fluvial — Xacobeo Transfer (~€6, €8 com bicicleta) ou barcos informais de pescadores (~€5–6 por pessoa); contacte o Posto de Turismo de Caminha (+351 258 921 952) para os operadores atuais. (2) Desvio terrestre via Valença–Tui: comboio da Linha do Minho de Caminha para Valença (~35 min, ~€3,60) e atravessar a pé a ponte internacional Tui–Valença (1,5 km) para a Rota Portuguesa Interior."
        - q: "Como vou de Caminha para A Guarda de comboio?"
          a: "Não existe comboio direto. Tome o comboio da Linha do Minho de Caminha para Valença (~35 min, ~€3,60), caminhe ~1 km até à ponte internacional Tui–Valença e atravesse a pé para Tui, Espanha (~25 min). A partir de Tui siga o Caminho Português Interior ou tome um táxi para A Guarda (~30 km). Este percurso muda da Rota Costeira para a Interior."
