      fareNotes:
        adult: "Tarifa histórica — el barco dejó de operar en 2020"
        child0_4: "Sin asiento asignado"
        child4_12: "Pueden pedir DNI o pasaporte"
        bicycle: "Cargo adicional sobre la tarifa de pasajero"
        return: "Leve ahorro frente a dos billetes sencillos"
      tips:
        - "En temporada alta (abril–octubre) los barcos se llenan rápido — reserva Xacobeo Transfer online o llama a Taxi Boat Peregrinos el día anterior."
        - "Los barcos funcionan con hora portuguesa; España va una hora por delante. Una salida a las 10:00 llega a España a las ~11:10 hora local."
        - "Lleva billetes pequeños en euros — en el muelle se suele pagar en efectivo."
        - "La travesía puede ser movida en otoño — asegura los objetos sueltos de la mochila."
        - "Pueden sellar tu credencial con un sello especial de la travesía si lo pides."
        - "Si el tiempo detiene todos los barcos, el desvío en tren Valença–Tui siempre está disponible."
      faq:
        - q: "¿Está funcionando el ferry de Caminha?"
          a: "El antiguo ferry Santa Rita de Cássia dejó de operar en 2020 y será desguazado, pero el cruce funciona a diario. Lo operan varios servicios de taxi-barco autorizados, entre ellos Taxi Boat Peregrinos / Capitão Mário (cada 30 minutos, 07:00–17:00, abr–oct), Xacobeo Transfer (aprox. cada hora, reserva online, todo el año), Taxi Mar Caminha y Popeye the Sailor Man. Un nuevo ferry municipal está previsto para el verano de 2026."
        - q: "¿Cuánto cuesta el cruce de Caminha a A Guarda?"
          a: "6 € por persona (ida) con los operadores principales. Con bicicleta suele costar 7–8 € (las eléctricas pueden costar más). La travesía dura unos 10 minutos."
        - q: "¿Hay que reservar el barco de Caminha con antelación?"
          a: "No es obligatorio, pero sí recomendable en temporada alta — algunos barcos solo llevan unos seis pasajeros. Xacobeo Transfer vende billetes online; Taxi Boat Peregrinos acepta reservas por teléfono (+351 913 254 110) o en el muelle."
        - q: "¿Puedo cruzar con bicicleta de Caminha a A Guarda?"
          a: "Sí. Los operadores llevan bicicletas por un pequeño suplemento — normalmente 7 € con Taxi Boat Peregrinos o Taxi Mar Caminha, 8 € con Xacobeo Transfer (las bicis eléctricas pueden costar más)."
        - q: "¿Qué es el nuevo ferry de Caminha previsto para 2026?"
          a: "La Câmara Municipal de Caminha anunció un nuevo ferry de poco calado con capacidad para unos 50–60 pasajeros, previsto para el verano de 2026. El municipio ha presupuestado la reparación del muelle y el dragado. Hasta su estreno, los taxi-barco son el cruce operativo."
        - q: "¿Qué alternativas hay si no cruza ningún barco?"
          a: "El desvío terrestre: tren de la línea del Miño de Caminha a Valença (~35 min, ~3,60 €) y cruzar a pie el puente internacional Tui–Valença (1,5 km). Esto te cambia de la Ruta de la Costa al Camino Portugués Interior."
      trainDetour:
