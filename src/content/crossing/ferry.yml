      tips:
        - "Confirm a boat is crossing the evening before — ask at your albergue."
        - "The official ferry has been suspended since 2023; plan for the Xacobeo water taxi (~€6)."
        - "Carry small change in euros — operators rarely have change for large notes."
        - "Crossing can be choppy in autumn — secure loose items on your pack."
        - "Your credencial can get a special crossing stamp on request."
        - "If no boat runs, the Valença–Tui train detour is always available."
      faq:
        - q: "How much does the Caminha to A Guarda crossing cost?"
          a: "The official Santa Rita de Cássia ferry (€2.50 per adult) has been suspended since 2023 due to river siltation. The operating crossing is now the Xacobeo Transfer water taxi: approximately €6 per person one-way, or €8 with a bicycle. Local fishermen also run informal water taxis at roughly €5–6 per person."
        - q: "Is the Caminha ferry running?"
          a: "The scheduled Santa Rita de Cássia ferry is suspended (since 2023) because of assoreamento — siltation at the Minho river mouth. Crossings still happen via the Xacobeo Transfer service and informal fishermen's water taxis, but there is no fixed timetable. Always verify the evening before."
        - q: "What is the assoreamento problem with the Caminha ferry?"
          a: "Assoreamento is the build-up of sand and sediment at the Minho river mouth. When it is severe the Santa Rita de Cássia cannot reach the dock, which is why the scheduled ferry has been suspended. Smaller, shallow-draught water taxis (Xacobeo Transfer, Xávegas) can still cross."
        - q: "What are the alternatives to cross to A Guarda?"
          a: "Two options: (1) Water taxi — Xacobeo Transfer (~€6, €8 with bike) or informal fishermen's boats (~€5–6 per person); contact the Caminha tourist office (+351 258 921 952) for current operators. (2) Overland via Valença–Tui: take the CP Minho line train from Caminha to Valença (~35 min, ~€3.60), then walk 1.5 km across the international Tui–Valença bridge onto the Camino Portugués Interior."
        - q: "How do I get from Caminha to A Guarda by train?"
          a: "There is no direct train to A Guarda. Take the CP Minho line train from Caminha to Valença (~35 minutes, ~€3.60 one-way), walk ~1 km to the Tui–Valença international bridge and cross on foot into Tui, Spain (~25 minutes). From Tui follow the Camino Portugués Interior, or take a taxi to A Guarda (~30 km by road). This route switches you from the Coastal to the Interior Route."
      trainDetour:
