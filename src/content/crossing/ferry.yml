    en:
      metaTitle: "Caminha to A Guarda Ferry — Schedule, Alternatives & Siltation Warnings"
      metaDescription: "Complete guide to the Caminha–A Guarda Minho river crossing. Summer/winter timetables, fare table, the real story on seasonal siltation (assoreamento), Xávegas water taxi alternatives, and the overland train detour via Valença–Tui."
