      faq:
        - q: "O ferry de Caminha está a funcionar?"
          a: "O antigo ferry Santa Rita de Cássia parou em 2020 e vai ser desmantelado, mas a travessia funciona diariamente. É operada por vários serviços de táxi fluvial licenciados, entre eles Taxi Boat Peregrinos / Capitão Mário (de 30 em 30 minutos, 07:00–17:00, abr–out), Xacobeo Transfer (aprox. de hora em hora, reserva online, todo o ano), Taxi Mar Caminha e Popeye the Sailor Man. Está previsto um novo ferry municipal para o verão de 2026."
        - q: "Quanto custa a travessia de Caminha para A Guarda?"
          a: "€6 por pessoa (ida) com os operadores principais. Com bicicleta costuma custar €7–8 (as elétricas podem custar mais). A travessia demora cerca de 10 minutos."
        - q: "É preciso reservar o barco de Caminha com antecedência?"
          a: "Não é obrigatório, mas é recomendável na época alta — alguns barcos levam apenas cerca de seis passageiros. A Xacobeo Transfer vende bilhetes online; a Taxi Boat Peregrinos aceita reservas por telefone (+351 913 254 110) ou no cais."
        - q: "Posso atravessar com bicicleta de Caminha para A Guarda?"
          a: "Sim. Os operadores transportam bicicletas por um pequeno suplemento — normalmente €7 com a Taxi Boat Peregrinos ou a Taxi Mar Caminha, €8 com a Xacobeo Transfer (as bicicletas elétricas podem custar mais)."
        - q: "O que é o novo ferry de Caminha previsto para 2026?"
          a: "A Câmara Municipal de Caminha anunciou um novo ferry de calado reduzido com capacidade para cerca de 50–60 passageiros, previsto para o verão de 2026. O município orçamentou a reparação do cais e a dragagem. Até ao lançamento, os táxis fluviais são a travessia em funcionamento."
        - q: "Quais são as alternativas se nenhum barco atravessar?"
          a: "O desvio terrestre: comboio da Linha do Minho de Caminha para Valença (~35 min, ~€3,60) e atravessar a pé a ponte internacional Tui–Valença (1,5 km). Isto muda-o da Rota da Costa para o Caminho Português Interior."
