<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Offline · Way to Santiago Guide</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #f8faf8;
        color: #1e293b;
      }
      .card {
        max-width: 30rem;
        text-align: center;
        background: #fff;
        border: 1px solid #d6e3d8;
        border-radius: 20px;
        padding: 40px 28px;
        box-shadow: 0 10px 30px rgba(23, 77, 43, 0.08);
      }
      .icon {
        width: 56px;
        height: 56px;
        margin: 0 auto 16px;
        color: #174d2b;
      }
      h1 { font-size: 1.4rem; margin: 0 0 8px; color: #174d2b; }
      p { font-size: 0.95rem; line-height: 1.6; color: #475569; margin: 0 0 20px; }
      .hint { font-size: 0.8rem; color: #94a3b8; margin-top: 20px; }
      button {
        appearance: none;
        border: 0;
        cursor: pointer;
        background: #174d2b;
        color: #fff;
        font-weight: 700;
        font-size: 0.9rem;
        padding: 12px 22px;
        border-radius: 12px;
      }
      button:hover { background: #0f3a20; }
    </style>
  </head>
  <body>
    <div class="card">
      <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 20h.01M8.5 16.5a5 5 0 017 0M5 13a9 9 0 0114 0M2 9.5a13 13 0 0120 0" />
        <line x1="3" y1="3" x2="21" y2="21" stroke-linecap="round" />
      </svg>
      <h1>You're offline</h1>
      <p>
        No connection right now — common on the trail. Pages you've already opened
        stay available offline. Reconnect to load new ones.
      </p>
      <button type="button" onclick="location.reload()">Try again</button>
      <p class="hint">Way to Santiago Guide · Camino Portugués da Costa</p>
    </div>
  </body>
</html>
